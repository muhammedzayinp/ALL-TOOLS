<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex to RGB Converter - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .color-preview {
            width: 100%;
            height: 100px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            background: #6366f1;
        }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
        }
        .input-group input:focus { 
            outline: none; 
            border-color: #6366f1; 
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .result-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .result-item .label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }
        .result-item .value.red { color: #EF4444; }
        .result-item .value.green { color: #10B981; }
        .result-item .value.blue { color: #3B82F6; }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .swap-icon {
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 1.5rem;
            margin: 4px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .swap-icon:hover {
            color: rgba(255,255,255,0.5);
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔄</span>
        <h1>Hex to RGB Converter</h1>
        <p class="desc">Convert hexadecimal color codes to RGB values instantly</p>
        
        <div class="color-preview" id="colorPreview">
            <span id="hexDisplay">#6366F1</span>
        </div>
        
        <div class="input-group">
            <label>Enter Hex Color</label>
            <input type="text" id="hexInput" value="#6366f1" placeholder="#000000 or #000" oninput="convertHex()">
        </div>
        
        <div class="swap-icon" onclick="swapConversion()">⇅</div>
        
        <div class="input-group" style="display:none;" id="rgbInputGroup">
            <label>Enter RGB Values</label>
            <div style="display:flex;gap:8px;">
                <input type="number" id="rInput" placeholder="R" min="0" max="255" style="flex:1;" oninput="convertRGB()">
                <input type="number" id="gInput" placeholder="G" min="0" max="255" style="flex:1;" oninput="convertRGB()">
                <input type="number" id="bInput" placeholder="B" min="0" max="255" style="flex:1;" oninput="convertRGB()">
            </div>
        </div>
        
        <div class="result-grid">
            <div class="result-item">
                <div class="label">Red</div>
                <div class="value red" id="redValue">99</div>
            </div>
            <div class="result-item">
                <div class="label">Green</div>
                <div class="value green" id="greenValue">102</div>
            </div>
            <div class="result-item">
                <div class="label">Blue</div>
                <div class="value blue" id="blueValue">241</div>
            </div>
        </div>
        
        <button class="btn" onclick="convertHex()">🔄 Convert Hex to RGB</button>
        <button class="btn-secondary" onclick="copyRGB()">📋 Copy RGB Values</button>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

    <script>
        let isRGBMode = false;

        function convertHex() {
            isRGBMode = false;
            document.getElementById('rgbInputGroup').style.display = 'none';
            
            let hex = document.getElementById('hexInput').value.trim();
            
            // Auto-add # if missing
            if (hex && !hex.startsWith('#')) {
                hex = '#' + hex;
            }
            
            // Handle shorthand hex
            if (/^#([0-9a-fA-F]{3})$/.test(hex)) {
                hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
            }
            
            // Validate hex
            if (!/^#([0-9a-fA-F]{6})$/.test(hex)) {
                document.getElementById('colorPreview').style.background = '#1a1a2e';
                document.getElementById('hexDisplay').textContent = 'Invalid Hex';
                document.getElementById('redValue').textContent = '--';
                document.getElementById('greenValue').textContent = '--';
                document.getElementById('blueValue').textContent = '--';
                return;
            }
            
            document.getElementById('hexInput').value = hex;
            
            // Extract RGB
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            
            // Update display
            document.getElementById('colorPreview').style.background = hex;
            document.getElementById('hexDisplay').textContent = hex.toUpperCase();
            document.getElementById('redValue').textContent = r;
            document.getElementById('greenValue').textContent = g;
            document.getElementById('blueValue').textContent = b;
            
            // Update RGB inputs if visible
            document.getElementById('rInput').value = r;
            document.getElementById('gInput').value = g;
            document.getElementById('bInput').value = b;
        }

        function convertRGB() {
            isRGBMode = true;
            document.getElementById('rgbInputGroup').style.display = 'block';
            
            const r = parseInt(document.getElementById('rInput').value) || 0;
            const g = parseInt(document.getElementById('gInput').value) || 0;
            const b = parseInt(document.getElementById('bInput').value) || 0;
            
            // Clamp values
            const clamp = (v) => Math.min(255, Math.max(0, v));
            const cr = clamp(r);
            const cg = clamp(g);
            const cb = clamp(b);
            
            // Convert to hex
            const hex = '#' + [cr, cg, cb].map(v => v.toString(16).padStart(2, '0')).join('');
            
            // Update display
            document.getElementById('colorPreview').style.background = hex;
            document.getElementById('hexDisplay').textContent = hex.toUpperCase();
            document.getElementById('redValue').textContent = cr;
            document.getElementById('greenValue').textContent = cg;
            document.getElementById('blueValue').textContent = cb;
            document.getElementById('hexInput').value = hex;
        }

        function swapConversion() {
            const hexInput = document.getElementById('hexInput');
            const rgbGroup = document.getElementById('rgbInputGroup');
            
            if (isRGBMode) {
                // Switch to hex mode
                isRGBMode = false;
                rgbGroup.style.display = 'none';
                hexInput.style.display = 'block';
                document.querySelector('.input-group label').textContent = 'Enter Hex Color';
                convertHex();
            } else {
                // Switch to RGB mode
                isRGBMode = true;
                rgbGroup.style.display = 'block';
                hexInput.style.display = 'block';
                document.querySelector('.input-group label').textContent = 'Enter Hex Color';
                convertRGB();
            }
        }

        function copyRGB() {
            const r = document.getElementById('redValue').textContent;
            const g = document.getElementById('greenValue').textContent;
            const b = document.getElementById('blueValue').textContent;
            
            if (r === '--') {
                alert('Please enter a valid color first');
                return;
            }
            
            const rgbString = `rgb(${r}, ${g}, ${b})`;
            navigator.clipboard.writeText(rgbString).then(() => {
                alert('✅ RGB values copied: ' + rgbString);
            }).catch(() => {
                // Fallback
                const textArea = document.createElement('textarea');
                textArea.value = rgbString;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('✅ RGB values copied: ' + rgbString);
            });
        }

        // Initial conversion
        convertHex();
    </script>
</body>
</html>
