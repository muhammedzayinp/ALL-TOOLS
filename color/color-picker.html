<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .color-preview {
            width: 100%;
            height: 120px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input[type="color"] {
            width: 100%;
            height: 60px;
            padding: 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            cursor: pointer;
        }
        .input-group input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input[type="text"]:focus { 
            outline: none; 
            border-color: #6366f1; 
        }
        
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
            margin: 16px 0;
        }
        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .color-swatch:hover {
            transform: scale(1.08);
            border-color: rgba(255,255,255,0.2);
        }
        .color-swatch .hex-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: rgba(255,255,255,0.3);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .color-swatch:hover .hex-label {
            opacity: 1;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .info-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .info-item .label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-item .value {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🎨</span>
        <h1>Color Picker</h1>
        <p class="desc">Pick, convert, and explore colors with ease</p>
        
        <div class="color-preview" id="colorPreview" style="background:#6366f1;">
            <span id="hexDisplay">#6366F1</span>
        </div>
        
        <div class="input-group">
            <label>Pick a color</label>
            <input type="color" id="colorPicker" value="#6366f1" onchange="updateColor(this.value)">
        </div>
        
        <div class="input-group">
            <label>Enter hex code</label>
            <input type="text" id="hexInput" value="#6366f1" placeholder="#000000" oninput="updateFromHex(this.value)">
        </div>
        
        <div class="info-grid">
            <div class="info-item">
                <div class="label">RGB</div>
                <div class="value" id="rgbValue">(99, 102, 241)</div>
            </div>
            <div class="info-item">
                <div class="label">HSL</div>
                <div class="value" id="hslValue">(239, 84%, 67%)</div>
            </div>
        </div>
        
        <button class="btn" onclick="randomColor()">🎲 Random Color</button>
        
        <div style="margin-top: 16px;">
            <label style="display:block;font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:8px;">Popular Colors</label>
            <div class="color-grid" id="popularColors"></div>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        const popularColors = [
            '#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#6366F1',
            '#8B5CF6', '#EC4899', '#F472B6', '#14B8A6', '#F97316',
            '#6B7280', '#1F2937', '#FFFFFF', '#000000', '#DC2626'
        ];

        function updateColor(hex) {
            hex = hex.toLowerCase();
            document.getElementById('colorPicker').value = hex;
            document.getElementById('hexInput').value = hex;
            document.getElementById('colorPreview').style.background = hex;
            document.getElementById('hexDisplay').textContent = hex.toUpperCase();
            
            // Update RGB
            const rgb = hexToRgb(hex);
            document.getElementById('rgbValue').textContent = `(${rgb.r}, ${rgb.g}, ${rgb.b})`;
            
            // Update HSL
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            document.getElementById('hslValue').textContent = `(${hsl.h}°, ${hsl.s}%, ${hsl.l}%)`;
        }

        function updateFromHex(hex) {
            if (/^#[0-9a-fA-F]{6}$/.test(hex) || /^#[0-9a-fA-F]{3}$/.test(hex)) {
                if (hex.length === 4) {
                    hex = '#' + hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];
                }
                updateColor(hex);
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function randomColor() {
            const hex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            updateColor(hex);
        }

        // Initialize popular colors
        function initPopularColors() {
            const grid = document.getElementById('popularColors');
            popularColors.forEach(hex => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.background = hex;
                swatch.innerHTML = `<span class="hex-label">${hex}</span>`;
                swatch.onclick = () => updateColor(hex);
                grid.appendChild(swatch);
            });
        }

        // Initial setup
        initPopularColors();
        updateColor('#6366f1');
    </script>
</body>
</html>
