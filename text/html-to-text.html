<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to Text</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
        }
        .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn-group button {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            flex: 1;
            min-width: 80px;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-group button.primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            border: none;
        }
        .btn-group button.primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }
        .result.show { display: block; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .stats { display: flex; gap: 16px; margin-top: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🏷️</span>
        <h1>HTML to Text</h1>
        <p class="desc">Strip HTML tags and convert to plain text</p>
        
        <div class="btn-group">
            <button class="primary" onclick="convertHTML()">🔄 Convert</button>
            <button onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="input-group">
            <label>Enter HTML</label>
            <textarea id="htmlInput" placeholder="<p>Hello <b>World</b></p>"></textarea>
        </div>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <div class="stats">
                <span>Original: <span id="origLength">0</span> chars</span>
                <span>Plain: <span id="plainLength">0</span> chars</span>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        function convertHTML() {
            const html = document.getElementById('htmlInput').value;
            if (!html.trim()) {
                alert('Please enter some HTML');
                return;
            }
            
            // Create a temporary DOM element
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            // Get text content
            let text = temp.textContent || temp.innerText || '';
            
            // Clean up extra whitespace
            text = text.replace(/\s+/g, ' ').trim();
            
            document.getElementById('resultContent').textContent = text;
            document.getElementById('origLength').textContent = html.length;
            document.getElementById('plainLength').textContent = text.length;
            document.getElementById('result').classList.add('show');
        }
        
        function clearAll() {
            document.getElementById('htmlInput').value = '';
            document.getElementById('result').classList.remove('show');
        }
        
        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }
    </script>
</body>
</html>
