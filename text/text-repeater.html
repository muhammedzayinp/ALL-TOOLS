<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Repeater</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group textarea { min-height: 80px; resize: vertical; font-family: monospace; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-group button {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            flex: 1;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }
        .result.show { display: block; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .input-group { flex: 1; }
        .stats { display: flex; gap: 16px; margin-top: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔁</span>
        <h1>Text Repeater</h1>
        <p class="desc">Repeat text content a specified number of times</p>
        
        <div class="input-group">
            <label>Enter text to repeat</label>
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
        </div>
        
        <div class="flex-row">
            <div class="input-group">
                <label>Number of times</label>
                <input type="number" id="count" value="3" min="1" max="100">
            </div>
            <div class="input-group">
                <label>Separator</label>
                <input type="text" id="separator" value="" placeholder="e.g. , or space">
            </div>
        </div>
        
        <div class="btn-group">
            <button onclick="repeatText()">🔄 Repeat</button>
            <button onclick="repeatLines()">📄 Repeat Lines</button>
        </div>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <div class="stats">
                <span>Original: <span id="origLength">0</span> chars</span>
                <span>Repeated: <span id="repLength">0</span> chars</span>
                <span>Copies: <span id="copyCount">0</span></span>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

    <script>
        function repeatText() {
            const text = document.getElementById('textInput').value;
            const count = parseInt(document.getElementById('count').value) || 3;
            const separator = document.getElementById('separator').value || '';
            
            if (!text.trim()) {
                alert('Please enter some text');
                return;
            }
            
            if (count < 1 || count > 100) {
                alert('Please enter a number between 1 and 100');
                return;
            }
            
            const result = Array(count).fill(text).join(separator);
            
            document.getElementById('resultContent').textContent = result;
            document.getElementById('origLength').textContent = text.length;
            document.getElementById('repLength').textContent = result.length;
            document.getElementById('copyCount').textContent = count;
            document.getElementById('result').classList.add('show');
        }

        function repeatLines() {
            const text = document.getElementById('textInput').value;
            const count = parseInt(document.getElementById('count').value) || 3;
            
            if (!text.trim()) {
                alert('Please enter some text');
                return;
            }
            
            if (count < 1 || count > 100) {
                alert('Please enter a number between 1 and 100');
                return;
            }
            
            const lines = text.split('\n').filter(line => line.trim());
            if (lines.length === 0) {
                alert('No lines found');
                return;
            }
            
            let result = [];
            for (let i = 0; i < count; i++) {
                result = result.concat(lines);
            }
            
            const finalResult = result.join('\n');
            
            document.getElementById('resultContent').textContent = finalResult;
            document.getElementById('origLength').textContent = text.length;
            document.getElementById('repLength').textContent = finalResult.length;
            document.getElementById('copyCount').textContent = count;
            document.getElementById('result').classList.add('show');
        }
        
        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }
    </script>
</body>
</html>
