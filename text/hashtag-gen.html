<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashtag Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group textarea { min-height: 80px; resize: vertical; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn-group button {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            flex-wrap: wrap;
            gap: 8px;
        }
        .result.show { display: flex; }
        .result .hashtag {
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.85rem;
            color: #a78bfa;
            cursor: pointer;
            transition: all 0.3s;
        }
        .result .hashtag:hover { background: rgba(99,102,241,0.25); transform: scale(1.05); }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-all-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 6px 16px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            margin-top: 8px;
            width: 100%;
        }
        .copy-all-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .input-group { flex: 1; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">#️⃣</span>
        <h1>Hashtag Generator</h1>
        <p class="desc">Generate social media hashtags from keywords</p>
        
        <div class="input-group">
            <label>Enter keywords (comma separated)</label>
            <textarea id="keywordInput" placeholder="e.g. photography, sunset, nature, love"></textarea>
        </div>
        
        <div class="flex-row">
            <div class="input-group">
                <label>Number of hashtags</label>
                <input type="number" id="count" value="10" min="1" max="30">
            </div>
            <div class="input-group">
                <label>Style</label>
                <select id="style" style="width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:1rem;">
                    <option value="camel">#CamelCase</option>
                    <option value="lower">#lowercase</option>
                    <option value="title">#TitleCase</option>
                    <option value="snake">#snake_case</option>
                </select>
            </div>
        </div>
        
        <button class="btn" onclick="generateHashtags()">🔮 Generate Hashtags</button>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <button class="copy-all-btn" onclick="copyAll()">📋 Copy All Hashtags</button>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function generateHashtags() {
            const input = document.getElementById('keywordInput').value;
            const count = parseInt(document.getElementById('count').value) || 10;
            const style = document.getElementById('style').value;
            
            if (!input.trim()) {
                alert('Please enter some keywords');
                return;
            }
            
            const keywords = input.split(',').map(k => k.trim()).filter(k => k);
            const hashtags = [];
            const usedWords = new Set();
            
            // Generate from keywords
            keywords.forEach(keyword => {
                const cleaned = keyword.replace(/[^a-zA-Z0-9]/g, '');
                if (cleaned.length > 0) {
                    const formatted = formatHashtag(cleaned, style);
                    if (!usedWords.has(formatted)) {
                        usedWords.add(formatted);
                        hashtags.push(formatted);
                    }
                }
            });
            
            // Generate variations if we need more
            const commonWords = ['best', 'amazing', 'awesome', 'love', 'life', 'style', 'vibe', 'dream', 'happy', 'cool'];
            let attempts = 0;
            while (hashtags.length < count && attempts < 50) {
                attempts++;
                const word = keywords[Math.floor(Math.random() * keywords.length)];
                const prefix = commonWords[Math.floor(Math.random() * commonWords.length)];
                if (word && prefix) {
                    const combined = prefix + word;
                    const formatted = formatHashtag(combined, style);
                    if (!usedWords.has(formatted)) {
                        usedWords.add(formatted);
                        hashtags.push(formatted);
                    }
                }
            }
            
            // Add numbers if still need more
            attempts = 0;
            while (hashtags.length < count && attempts < 20) {
                attempts++;
                const keyword = keywords[Math.floor(Math.random() * keywords.length)];
                const num = Math.floor(Math.random() * 1000);
                const combined = keyword + num;
                const formatted = formatHashtag(combined, style);
                if (!usedWords.has(formatted)) {
                    usedWords.add(formatted);
                    hashtags.push(formatted);
                }
            }
            
            // Limit to count
            const finalHashtags = hashtags.slice(0, count);
            
            const resultDiv = document.getElementById('result');
            const content = document.getElementById('resultContent');
            
            content.innerHTML = finalHashtags.map(tag => 
                `<span class="hashtag" onclick="copyHashtag('${tag}')">#${tag}</span>`
            ).join('');
            
            // Store for copy all
            resultDiv.dataset.all = finalHashtags.map(t => '#' + t).join(' ');
            resultDiv.classList.add('show');
        }

        function formatHashtag(text, style) {
            text = text.replace(/[^a-zA-Z0-9]/g, '');
            switch(style) {
                case 'camel':
                    return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
                case 'lower':
                    return text.toLowerCase();
                case 'title':
                    return text.split(/(?=[A-Z])|_/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
                case 'snake':
                    return text.toLowerCase();
                default:
                    return text.toLowerCase();
            }
        }

        function copyHashtag(tag) {
            navigator.clipboard.writeText('#' + tag).then(() => alert('✅ #' + tag + ' copied!'));
        }

        function copyAll() {
            const resultDiv = document.getElementById('result');
            const text = resultDiv.dataset.all || '';
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ All hashtags copied!'));
            }
        }
    </script>
</body>
</html>
