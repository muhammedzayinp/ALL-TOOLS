<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Validator</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
        }
        .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn-group button {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            flex: 1;
            min-width: 80px;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-group button.primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            border: none;
        }
        .btn-group button.primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
        .btn-group button.success { background: #10b981; color: #fff; border: none; }
        .btn-group button.danger { background: #ef4444; color: #fff; border: none; }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .result.show { display: block; }
        .result.valid { border-color: #10b981; }
        .result.valid .status { color: #10b981; }
        .result.invalid { border-color: #ef4444; }
        .result.invalid .status { color: #ef4444; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-badge.valid { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-badge.invalid { background: rgba(239,68,68,0.2); color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">✅</span>
        <h1>JSON Validator</h1>
        <p class="desc">Validate and check JSON syntax</p>
        
        <div class="btn-group">
            <button class="primary" onclick="validateJSON()">✅ Validate</button>
            <button onclick="formatJSON()">✨ Format</button>
            <button onclick="minifyJSON()">🗜️ Minify</button>
            <button onclick="clearJSON()">🗑️ Clear</button>
        </div>
        
        <div class="input-group">
            <label>Enter your JSON</label>
            <textarea id="jsonInput" placeholder='Paste your JSON here... e.g. {"name":"John","age":30}'></textarea>
        </div>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        function validateJSON() {
            const input = document.getElementById('jsonInput').value;
            if (!input.trim()) {
                alert('Please enter some JSON to validate');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            const content = document.getElementById('resultContent');
            
            try {
                const parsed = JSON.parse(input);
                const pretty = JSON.stringify(parsed, null, 2);
                
                resultDiv.className = 'result show valid';
                content.innerHTML = `
                    <div class="status-badge valid">✅ Valid JSON</div>
                    <div style="margin-top: 8px; color: rgba(255,255,255,0.6);">
                        Type: ${Array.isArray(parsed) ? 'Array' : typeof parsed}
                        ${typeof parsed === 'object' && !Array.isArray(parsed) && parsed !== null ? 
                            ' with ' + Object.keys(parsed).length + ' keys' : ''}
                        ${Array.isArray(parsed) ? ' with ' + parsed.length + ' items' : ''}
                    </div>
                    <div style="margin-top: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.3);">
                        Formatted JSON:
                    </div>
                    <div style="margin-top: 4px; color: #a78bfa;">${pretty}</div>
                `;
            } catch (e) {
                resultDiv.className = 'result show invalid';
                content.innerHTML = `
                    <div class="status-badge invalid">❌ Invalid JSON</div>
                    <div style="margin-top: 8px; color: #ef4444;">
                        Error: ${e.message}
                    </div>
                    <div style="margin-top: 4px; font-size: 0.8rem; color: rgba(255,255,255,0.3);">
                        Check position ${e.position || 'unknown'} in your JSON
                    </div>
                `;
            }
        }

        function formatJSON() {
            const input = document.getElementById('jsonInput');
            try {
                const parsed = JSON.parse(input.value);
                input.value = JSON.stringify(parsed, null, 2);
                document.getElementById('result').classList.remove('show');
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }

        function minifyJSON() {
            const input = document.getElementById('jsonInput');
            try {
                const parsed = JSON.parse(input.value);
                input.value = JSON.stringify(parsed);
                document.getElementById('result').classList.remove('show');
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }

        function clearJSON() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('result').classList.remove('show');
        }

        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }
    </script>
</body>
</html>
