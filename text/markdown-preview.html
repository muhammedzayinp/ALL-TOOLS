<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
        }
        .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            max-height: 300px;
            overflow-y: auto;
            padding: 20px;
            line-height: 1.6;
        }
        .result.show { display: block; }
        .result h1 { font-size: 1.5rem; font-weight: 800; margin: 12px 0; }
        .result h2 { font-size: 1.3rem; font-weight: 700; margin: 10px 0; }
        .result h3 { font-size: 1.1rem; font-weight: 600; margin: 8px 0; }
        .result p { margin: 8px 0; color: rgba(255,255,255,0.8); }
        .result ul, .result ol { margin: 8px 0 8px 20px; }
        .result li { color: rgba(255,255,255,0.8); }
        .result code { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .result pre { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; overflow-x: auto; font-family: monospace; }
        .result blockquote { border-left: 3px solid #6366f1; padding-left: 16px; color: rgba(255,255,255,0.6); }
        .result a { color: #a78bfa; text-decoration: none; }
        .result a:hover { text-decoration: underline; }
        .result table { width: 100%; border-collapse: collapse; }
        .result th, .result td { border: 1px solid rgba(255,255,255,0.1); padding: 8px; text-align: left; }
        .result th { background: rgba(255,255,255,0.05); }
        .result img { max-width: 100%; border-radius: 8px; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .input-group { flex: 1; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📝</span>
        <h1>Markdown Preview</h1>
        <p class="desc">Live preview of Markdown syntax</p>
        
        <div class="input-group">
            <label>Enter Markdown</label>
            <textarea id="mdInput" placeholder="# Heading&#10;## Subheading&#10;&#10;This is **bold** and *italic* text."></textarea>
        </div>
        
        <button class="btn" onclick="previewMarkdown()">👁️ Preview</button>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <button class="copy-btn" onclick="copyHTML()">📋 Copy HTML</button>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function previewMarkdown() {
            const md = document.getElementById('mdInput').value;
            if (!md.trim()) {
                alert('Please enter some Markdown');
                return;
            }
            
            const html = marked.parse(md);
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('result').classList.add('show');
        }
        
        function copyHTML() {
            const html = document.getElementById('resultContent').innerHTML;
            if (html) {
                navigator.clipboard.writeText(html).then(() => alert('✅ Copied!'));
            }
        }

        // Simple Markdown parser (fallback if marked.js not loaded)
        function simpleMarkdown(md) {
            let html = md;
            
            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            // Bold and Italic
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Lists
            html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
            html = html.replace(/^(\d+)\. (.*$)/gim, '<li>$2</li>');
            
            // Code blocks
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            
            // Links
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>');
            
            // Blockquotes
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
            
            // Paragraphs
            html = html.replace(/^(?!<[^>]+>)(.+)$/gim, '<p>$1</p>');
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }

        // Load marked.js from CDN if available
        function loadMarked() {
            return new Promise((resolve) => {
                if (typeof marked !== 'undefined') {
                    resolve();
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
                script.onload = resolve;
                document.head.appendChild(script);
            });
        }

        // Override preview to use marked.js or fallback
        const originalPreview = previewMarkdown;
        previewMarkdown = async function() {
            await loadMarked();
            const md = document.getElementById('mdInput').value;
            if (!md.trim()) {
                alert('Please enter some Markdown');
                return;
            }
            
            let html;
            if (typeof marked !== 'undefined') {
                html = marked.parse(md);
            } else {
                html = simpleMarkdown(md);
            }
            
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('result').classList.add('show');
        };
    </script>
</body>
</html>
