<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
        }
        .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        .result.show { display: block; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .diff-added { background: rgba(16,185,129,0.2); color: #10b981; padding: 2px 4px; border-radius: 4px; }
        .diff-removed { background: rgba(239,68,68,0.2); color: #ef4444; padding: 2px 4px; border-radius: 4px; }
        .diff-same { color: rgba(255,255,255,0.5); }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .input-group { flex: 1; }
        .stats { display: flex; gap: 16px; margin-top: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔍</span>
        <h1>Diff Checker</h1>
        <p class="desc">Compare two texts and find differences</p>
        
        <div class="flex-row">
            <div class="input-group">
                <label>Original Text</label>
                <textarea id="text1" placeholder="Original text..."></textarea>
            </div>
            <div class="input-group">
                <label>Changed Text</label>
                <textarea id="text2" placeholder="Changed text..."></textarea>
            </div>
        </div>
        
        <button class="btn" onclick="checkDiff()">🔍 Compare</button>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function checkDiff() {
            const text1 = document.getElementById('text1').value;
            const text2 = document.getElementById('text2').value;
            
            if (!text1 && !text2) {
                alert('Please enter text in at least one field');
                return;
            }
            
            const lines1 = text1.split('\n');
            const lines2 = text2.split('\n');
            const maxLines = Math.max(lines1.length, lines2.length);
            
            let html = '';
            let added = 0, removed = 0, same = 0;
            
            for (let i = 0; i < maxLines; i++) {
                const line1 = lines1[i] || '';
                const line2 = lines2[i] || '';
                
                if (line1 === line2 && line1 !== '') {
                    html += `<div class="diff-same">  ${line1}</div>`;
                    same++;
                } else if (line1 === '') {
                    html += `<div class="diff-added">+ ${line2}</div>`;
                    added++;
                } else if (line2 === '') {
                    html += `<div class="diff-removed">- ${line1}</div>`;
                    removed++;
                } else {
                    html += `<div class="diff-removed">- ${line1}</div>`;
                    html += `<div class="diff-added">+ ${line2}</div>`;
                    removed++;
                    added++;
                }
            }
            
            const resultDiv = document.getElementById('result');
            document.getElementById('resultContent').innerHTML = html + 
                `<div class="stats">
                    <span>➕ Added: ${added}</span>
                    <span>➖ Removed: ${removed}</span>
                    <span>✅ Same: ${same}</span>
                </div>`;
            resultDiv.classList.add('show');
        }
        
        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }
    </script>
</body>
</html>
