<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: monospace;
        }
        .input-group textarea { min-height: 120px; resize: vertical; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn-group button {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        .result.show { display: block; }
        .result .match { color: #10b981; font-family: monospace; padding: 4px 0; }
        .result .no-match { color: rgba(255,255,255,0.3); }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .input-group { flex: 1; }
        .flags { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .flags label { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; color: rgba(255,255,255,0.5); cursor: pointer; }
        .flags input[type="checkbox"] { accent-color: #6366f1; width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🎯</span>
        <h1>Regex Tester</h1>
        <p class="desc">Test regular expressions with real-time matching</p>
        
        <div class="input-group">
            <label>Regular Expression</label>
            <input type="text" id="regexInput" placeholder="e.g. [a-z]+" value="[a-z]+">
        </div>
        
        <div class="flags">
            <label><input type="checkbox" id="flagG" checked> g (global)</label>
            <label><input type="checkbox" id="flagI"> i (case-insensitive)</label>
            <label><input type="checkbox" id="flagM"> m (multiline)</label>
            <label><input type="checkbox" id="flagS"> s (dot all)</label>
        </div>
        
        <div class="input-group">
            <label>Test Text</label>
            <textarea id="testInput" placeholder="Enter text to test against...">hello world 123 testing regex</textarea>
        </div>
        
        <button class="btn" onclick="testRegex()">🧪 Test Regex</button>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function testRegex() {
            const pattern = document.getElementById('regexInput').value;
            const text = document.getElementById('testInput').value;
            const flags = [];
            if (document.getElementById('flagG').checked) flags.push('g');
            if (document.getElementById('flagI').checked) flags.push('i');
            if (document.getElementById('flagM').checked) flags.push('m');
            if (document.getElementById('flagS').checked) flags.push('s');
            
            if (!pattern) {
                alert('Please enter a regex pattern');
                return;
            }
            
            if (!text) {
                alert('Please enter test text');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            const content = document.getElementById('resultContent');
            
            try {
                const regex = new RegExp(pattern, flags.join(''));
                const matches = text.match(regex);
                
                if (matches) {
                    let html = `<div style="color: #10b981; margin-bottom: 8px;">✅ Found ${matches.length} match(es)</div>`;
                    matches.forEach((match, index) => {
                        html += `<div class="match">${index + 1}. "${match}"</div>`;
                    });
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<div class="no-match">❌ No matches found</div>';
                }
                resultDiv.classList.add('show');
                
            } catch (e) {
                content.innerHTML = `<div style="color: #ef4444;">❌ Invalid regex: ${e.message}</div>`;
                resultDiv.classList.add('show');
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) testRegex();
        });
    </script>
</body>
</html>
