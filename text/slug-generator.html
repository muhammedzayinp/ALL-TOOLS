<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slug Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group textarea { min-height: 80px; resize: vertical; font-family: monospace; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.95rem;
            color: #a78bfa;
        }
        .result.show { display: block; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔗</span>
        <h1>Slug Generator</h1>
        <p class="desc">Create URL-friendly, SEO-optimized slugs</p>
        
        <div class="input-group">
            <label>Enter text to convert to slug</label>
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
        </div>
        
        <button class="btn" onclick="generateSlug()">🔄 Generate Slug</button>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

    <script>
        function generateSlug() {
            const input = document.getElementById('textInput').value;
            if (!input.trim()) {
                alert('Please enter some text');
                return;
            }
            
            let slug = input
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9\s-]/g, '') // Remove special chars
                .replace(/\s+/g, '-') // Replace spaces with -
                .replace(/-+/g, '-') // Remove multiple -
                .replace(/^-|-$/g, ''); // Remove leading/trailing -
            
            document.getElementById('resultContent').textContent = slug;
            document.getElementById('result').classList.add('show');
        }
        
        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) generateSlug();
        });
    </script>
</body>
</html>
