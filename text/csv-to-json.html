<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to JSON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
        }
        .input-group textarea:focus { outline: none; border-color: #6366f1; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn-group button {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            flex: 1;
            min-width: 80px;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-group button.primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            border: none;
        }
        .btn-group button.primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #a78bfa;
        }
        .result.show { display: block; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 8px; display: none; }
        .error-msg.show { display: block; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .input-group { flex: 1; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📊</span>
        <h1>CSV to JSON</h1>
        <p class="desc">Convert CSV spreadsheets to JSON format</p>
        
        <div class="flex-row">
            <div class="input-group">
                <label>Delimiter</label>
                <input type="text" id="delimiter" value="," placeholder="e.g. , or ;">
            </div>
            <div class="input-group">
                <label>Has Header?</label>
                <select id="hasHeader" style="width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:1rem;">
                    <option value="true">Yes (first row is header)</option>
                    <option value="false">No (use column numbers)</option>
                </select>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="primary" onclick="convertCSV()">🔄 Convert</button>
            <button onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="input-group">
            <label>Enter CSV Data</label>
            <textarea id="csvInput" placeholder="name,age,city&#10;John,30,NYC&#10;Jane,25,LA"></textarea>
        </div>
        
        <div class="error-msg" id="errorMsg">⚠️ Invalid CSV</div>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function convertCSV() {
            const csv = document.getElementById('csvInput').value;
            const delimiter = document.getElementById('delimiter').value || ',';
            const hasHeader = document.getElementById('hasHeader').value === 'true';
            const error = document.getElementById('errorMsg');
            
            if (!csv.trim()) {
                alert('Please enter some CSV data');
                return;
            }
            
            try {
                const lines = csv.split('\n').filter(line => line.trim());
                if (lines.length === 0) {
                    throw new Error('No data found');
                }
                
                const headers = hasHeader ? lines[0].split(delimiter).map(h => h.trim()) : [];
                const dataStart = hasHeader ? 1 : 0;
                
                const result = [];
                
                for (let i = dataStart; i < lines.length; i++) {
                    const values = lines[i].split(delimiter).map(v => v.trim());
                    const obj = {};
                    
                    if (hasHeader) {
                        headers.forEach((header, index) => {
                            obj[header] = values[index] || '';
                        });
                    } else {
                        values.forEach((value, index) => {
                            obj[`col${index + 1}`] = value;
                        });
                    }
                    
                    result.push(obj);
                }
                
                document.getElementById('resultContent').textContent = JSON.stringify(result, null, 2);
                document.getElementById('result').classList.add('show');
                error.classList.remove('show');
                
            } catch (e) {
                error.textContent = '⚠️ ' + e.message;
                error.classList.add('show');
                document.getElementById('result').classList.remove('show');
            }
        }
        
        function clearAll() {
            document.getElementById('csvInput').value = '';
            document.getElementById('result').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }
    </script>
</body>
</html>
