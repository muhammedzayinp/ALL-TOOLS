<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #6366f1; }
        .input-group select option { background: #1a1a2e; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-group button {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            flex: 1;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Georgia', serif;
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        .result.show { display: block; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .input-group { flex: 1; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📜</span>
        <h1>Lorem Ipsum Generator</h1>
        <p class="desc">Generate dummy text for designs and mockups</p>
        
        <div class="flex-row">
            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="amount" value="3" min="1" max="20">
            </div>
            <div class="input-group">
                <label>Unit</label>
                <select id="unit">
                    <option value="paragraphs">Paragraphs</option>
                    <option value="sentences">Sentences</option>
                    <option value="words">Words</option>
                </select>
            </div>
        </div>
        
        <div class="btn-group">
            <button onclick="generateLorem()">📝 Generate</button>
            <button onclick="copyLorem()">📋 Copy</button>
        </div>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        const loremWords = [
            'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
            'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
            'magna', 'aliqua', 'ut', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
            'exercitation', 'ullamco', 'laboris', 'nisi', 'ut', 'aliquip', 'ex', 'ea',
            'commodo', 'consequat', 'duis', 'aute', 'irure', 'dolor', 'in', 'reprehenderit',
            'in', 'voluptate', 'velit', 'esse', 'cillum', 'dolore', 'eu', 'fugiat', 'nulla',
            'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident',
            'sunt', 'in', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id',
            'est', 'laborum', 'fugiat', 'nisi', 'tempor', 'commodo', 'quis', 'ipsum',
            'dolore', 'eiusmod', 'adipiscing', 'incididunt', 'sed', 'labore'
        ];

        function generateLorem() {
            const amount = parseInt(document.getElementById('amount').value) || 3;
            const unit = document.getElementById('unit').value;
            
            let result = '';
            
            switch(unit) {
                case 'paragraphs':
                    result = generateParagraphs(amount);
                    break;
                case 'sentences':
                    result = generateSentences(amount);
                    break;
                case 'words':
                    result = generateWords(amount);
                    break;
            }
            
            document.getElementById('resultContent').textContent = result;
            document.getElementById('result').classList.add('show');
        }

        function generateWords(count) {
            const words = [];
            for (let i = 0; i < count; i++) {
                words.push(loremWords[Math.floor(Math.random() * loremWords.length)]);
            }
            return words.join(' ') + '.';
        }

        function generateSentences(count) {
            const sentences = [];
            for (let i = 0; i < count; i++) {
                const wordCount = 8 + Math.floor(Math.random() * 15);
                const words = [];
                for (let j = 0; j < wordCount; j++) {
                    let word = loremWords[Math.floor(Math.random() * loremWords.length)];
                    if (j === 0) word = word.charAt(0).toUpperCase() + word.slice(1);
                    words.push(word);
                }
                sentences.push(words.join(' ') + '.');
            }
            return sentences.join(' ');
        }

        function generateParagraphs(count) {
            const paragraphs = [];
            for (let i = 0; i < count; i++) {
                const sentenceCount = 3 + Math.floor(Math.random() * 5);
                paragraphs.push(generateSentences(sentenceCount));
            }
            return paragraphs.join('\n\n');
        }

        function copyLorem() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }

        // Auto-generate on load
        window.onload = generateLorem;
    </script>
</body>
</html>
