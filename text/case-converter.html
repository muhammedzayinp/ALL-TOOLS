<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: monospace;
        }
        .input-group textarea { min-height: 120px; resize: vertical; }
        .input-group textarea:focus, .input-group select:focus { outline: none; border-color: #6366f1; }
        .input-group select option { background: #1a1a2e; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn-group button {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
        }
        .btn-group button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.8);
            max-height: 200px;
            overflow-y: auto;
        }
        .result.show { display: block; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔤</span>
        <h1>Case Converter</h1>
        <p class="desc">Convert text between different cases</p>
        
        <div class="btn-group">
            <button onclick="convertCase('upper')">UPPER</button>
            <button onclick="convertCase('lower')">lower</button>
            <button onclick="convertCase('title')">Title</button>
            <button onclick="convertCase('sentence')">Sentence</button>
            <button onclick="convertCase('toggle')">tOGGLE</button>
            <button onclick="convertCase('camel')">camelCase</button>
            <button onclick="convertCase('snake')">snake_case</button>
            <button onclick="convertCase('kebab')">kebab-case</button>
        </div>
        
        <div class="input-group">
            <label>Enter your text</label>
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
        </div>
        
        <button class="btn" onclick="convertCase('selected')">Convert Selected Case</button>
        
        <div class="result" id="result">
            <div id="resultContent"></div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function convertCase(type) {
            const input = document.getElementById('textInput').value;
            if (!input.trim()) {
                alert('Please enter some text');
                return;
            }
            
            let result = '';
            
            switch(type) {
                case 'upper':
                    result = input.toUpperCase();
                    break;
                case 'lower':
                    result = input.toLowerCase();
                    break;
                case 'title':
                    result = input.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
                    break;
                case 'sentence':
                    result = input.charAt(0).toUpperCase() + input.slice(1).toLowerCase();
                    break;
                case 'toggle':
                    result = input.split('').map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join('');
                    break;
                case 'camel':
                    result = input.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (m, chr) => chr.toUpperCase());
                    break;
                case 'snake':
                    result = input.toLowerCase().replace(/\s+/g, '_');
                    break;
                case 'kebab':
                    result = input.toLowerCase().replace(/\s+/g, '-');
                    break;
                case 'selected':
                    const select = document.querySelector('select');
                    if (select) convertCase(select.value);
                    return;
            }
            
            document.getElementById('resultContent').textContent = result;
            document.getElementById('result').classList.add('show');
        }
        
        function copyResult() {
            const text = document.getElementById('resultContent').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
            }
        }
    </script>
</body>
</html>
