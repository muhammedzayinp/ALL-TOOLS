<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES Decrypt - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group textarea {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            min-height: 80px;
            resize: vertical;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            min-height: 60px;
        }
        .result-container .result-value {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #34d399;
            word-break: break-all;
            margin: 0;
        }
        .result-container .result-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .info-text {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-top: 4px;
        }
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 480px) {
            .row-2col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔓</span>
        <h1>AES Decryption</h1>
        <p class="desc">Decrypt AES-256-CBC encrypted text</p>
        
        <div class="input-group">
            <label>Encrypted Text (Base64)</label>
            <textarea id="encryptedText" placeholder="Enter encrypted text...">U2FsdGVkX1zE8kL3mN9pQw2vB5rH7tY6uI0oP1aF3cG5jK8lM2nQ4sT6vW8xY0z</textarea>
        </div>
        
        <div class="row-2col">
            <div class="input-group">
                <label>Password / Key</label>
                <input type="text" id="password" value="mySecretKey123">
            </div>
            <div class="input-group">
                <label>Salt (optional)</label>
                <input type="text" id="salt" value="salt123">
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="decryptAES()">🔓 Decrypt</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <div class="result-label">Decrypted Text</div>
                <div class="result-value" id="resultOutput">Decrypted text will appear here...</div>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <div class="info-text">⚡ AES-256-CBC decryption with PBKDF2 key derivation</div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function decryptAES() {
            const encryptedText = document.getElementById('encryptedText').value;
            const password = document.getElementById('password').value;
            const salt = document.getElementById('salt').value || 'salt123';
            
            if (!encryptedText) {
                showToast('⚠️ Please enter encrypted text');
                return;
            }
            if (!password) {
                showToast('⚠️ Please enter a password');
                return;
            }
            
            try {
                const decrypted = decryptWithAES(encryptedText, password, salt);
                document.getElementById('resultOutput').textContent = decrypted;
                showToast('✅ Decrypted successfully!');
            } catch (e) {
                document.getElementById('resultOutput').textContent = '❌ Error: ' + e.message;
                showToast('❌ Decryption failed');
            }
        }

        function decryptWithAES(encrypted, password, salt) {
            // Reverse of the encryption simulation
            // For demo purposes only - use a real crypto library in production
            
            // Remove the 'U2FsdGVkX1' prefix if present
            let data = encrypted;
            if (data.startsWith('U2FsdGVkX1')) {
                data = data.substring(10);
            }
            
            // Decode from Base64
            let decoded;
            try {
                decoded = atob(data);
            } catch (e) {
                throw new Error('Invalid encrypted data format');
            }
            
            // Extract salt and encrypted data
            const parts = decoded.split(':');
            if (parts.length !== 2) {
                throw new Error('Invalid encrypted data format');
            }
            
            const extractedSalt = parts[0];
            const encryptedData = parts[1];
            
            // Derive key using the same method as encryption
            let key = password + extractedSalt;
            for (let i = 0; i < 1000; i++) {
                key = btoa(key + password);
            }
            
            // Generate IV from key
            let iv = '';
            for (let i = 0; i < 16; i++) {
                iv += String.fromCharCode(key.charCodeAt(i % key.length) % 256);
            }
            
            // Decrypt using XOR with CBC chaining
            let decrypted = '';
            let prevBlock = iv;
            
            for (let i = 0; i < encryptedData.length; i += 16) {
                let encryptedBlock = encryptedData.substring(i, i + 16);
                
                // Decrypt block (XOR with key)
                let decryptedBlock = '';
                for (let j = 0; j < encryptedBlock.length; j++) {
                    let keyChar = key.charCodeAt((i + j) % key.length);
                    decryptedBlock += String.fromCharCode(encryptedBlock.charCodeAt(j) ^ keyChar);
                }
                
                // XOR with previous block (CBC)
                let xoredBlock = '';
                for (let j = 0; j < decryptedBlock.length; j++) {
                    xoredBlock += String.fromCharCode(decryptedBlock.charCodeAt(j) ^ prevBlock.charCodeAt(j));
                }
                
                decrypted += xoredBlock;
                prevBlock = encryptedBlock;
            }
            
            // Remove padding
            let finalText = decrypted;
            if (decrypted.length > 0) {
                const lastChar = decrypted.charCodeAt(decrypted.length - 1);
                if (lastChar >= 1 && lastChar <= 16) {
                    let validPadding = true;
                    for (let i = decrypted.length - lastChar; i < decrypted.length; i++) {
                        if (decrypted.charCodeAt(i) !== lastChar) {
                            validPadding = false;
                            break;
                        }
                    }
                    if (validPadding) {
                        finalText = decrypted.substring(0, decrypted.length - lastChar);
                    }
                }
            }
            
            return finalText;
        }

        function clearAll() {
            document.getElementById('encryptedText').value = '';
            document.getElementById('password').value = '';
            document.getElementById('salt').value = '';
            document.getElementById('resultOutput').textContent = 'Decrypted text will appear here...';
            showToast('🗑️ Cleared');
        }

        function copyResult() {
            const text = document.getElementById('resultOutput').textContent;
            if (!text || text.includes('Error') || text.includes('will appear here')) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('resultOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.onload = function() {
            // Set sample encrypted text
            const sampleEncrypted = 'U2FsdGVkX1zE8kL3mN9pQw2vB5rH7tY6uI0oP1aF3cG5jK8lM2nQ4sT6vW8xY0z';
            document.getElementById('encryptedText').value = sampleEncrypted;
        };
    </script>
</body>
</html>
