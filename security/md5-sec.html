<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD5 Hash Generator - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group textarea {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            min-height: 80px;
            resize: vertical;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            min-height: 60px;
        }
        .result-container .hash-value {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #34d399;
            word-break: break-all;
            margin: 0;
        }
        .result-container .hash-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .hash-info {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        .hash-info span {
            color: rgba(255,255,255,0.5);
        }
        .warning {
            color: #f59e0b;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .file-input-wrapper {
            margin-top: 8px;
        }
        .file-input-wrapper input[type="file"] {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .file-input-wrapper input[type="file"]::-webkit-file-upload-button {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 6px;
            color: #fff;
            padding: 6px 16px;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔑</span>
        <h1>MD5 Hash Generator</h1>
        <p class="desc">Generate MD5 hash from text or files</p>
        
        <div class="input-group">
            <label>Input Text</label>
            <textarea id="textInput" placeholder="Enter text to hash...">Hello World!</textarea>
        </div>
        
        <div class="file-input-wrapper">
            <label style="display:block; font-size:0.8rem; color:rgba(255,255,255,0.6); margin-bottom:4px;">Or upload a file</label>
            <input type="file" id="fileInput" onchange="handleFile()">
            <div style="font-size:0.8rem; color:rgba(255,255,255,0.3); margin-top:4px;" id="fileInfo">No file selected</div>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="generateMD5()">🔑 Generate MD5</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <div class="hash-label">MD5 Hash</div>
                <div class="hash-value" id="hashOutput">5eb63bbbe01eeed093cb22bb8f5acdc3</div>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <div class="hash-info">
            <span>Length: 32 characters</span>
            <span>Format: Hexadecimal</span>
        </div>
        <div class="warning">⚠️ MD5 is not cryptographically secure. Use SHA-256 for security.</div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        let fileData = null;

        function md5(string) {
            function md5RotateLeft(lValue, iShiftBits) {
                return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
            }

            function md5AddUnsigned(lX, lY) {
                let lX4, lY4, lX8, lY8, lResult;
                lX8 = (lX & 0x80000000);
                lY8 = (lY & 0x80000000);
                lX4 = (lX & 0x40000000);
                lY4 = (lY & 0x40000000);
                lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
                if (lX4 & lY4) {
                    return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
                }
                if (lX4 | lY4) {
                    if (lResult & 0x40000000) {
                        return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
                    } else {
                        return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
                    }
                } else {
                    return (lResult ^ lX8 ^ lY8);
                }
            }

            function md5FF(a, b, c, d, x, s, ac) {
                a = md5AddUnsigned(a, md5AddUnsigned(md5AddUnsigned((b & c) | ((~b) & d), x), ac));
                return md5AddUnsigned(md5RotateLeft(a, s), b);
            }

            function md5GG(a, b, c, d, x, s, ac) {
                a = md5AddUnsigned(a, md5AddUnsigned(md5AddUnsigned((b & d) | (c & (~d)), x), ac));
                return md5AddUnsigned(md5RotateLeft(a, s), b);
            }

            function md5HH(a, b, c, d, x, s, ac) {
                a = md5AddUnsigned(a, md5AddUnsigned(md5AddUnsigned(b ^ c ^ d, x), ac));
                return md5AddUnsigned(md5RotateLeft(a, s), b);
            }

            function md5II(a, b, c, d, x, s, ac) {
                a = md5AddUnsigned(a, md5AddUnsigned(md5AddUnsigned(c ^ (b | (~d)), x), ac));
                return md5AddUnsigned(md5RotateLeft(a, s), b);
            }

            function convertToWordArray(string) {
                let lWordCount;
                let lMessageLength = string.length;
                let lNumberOfWordsTemp1 = lMessageLength + 8;
                let lNumberOfWordsTemp2 = (lNumberOfWordsTemp1 - (lNumberOfWordsTemp1 % 64)) / 64;
                let lNumberOfWords = (lNumberOfWordsTemp2 + 1) * 16;
                let lWordArray = new Array(lNumberOfWords - 1);
                let lBytePosition = 0;
                let lByteCount = 0;
                while (lByteCount < lMessageLength) {
                    lWordCount = (lByteCount - (lByteCount % 4)) / 4;
                    lBytePosition = (lByteCount % 4) * 8;
                    lWordArray[lWordCount] = (lWordArray[lWordCount] | (string.charCodeAt(lByteCount) << lBytePosition));
                    lByteCount++;
                }
                lWordCount = (lByteCount - (lByteCount % 4)) / 4;
                lBytePosition = (lByteCount % 4) * 8;
                lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
                lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
                lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
                return lWordArray;
            }

            function wordToHex(lValue) {
                let wordToHexValue = "";
                let wordToHexValueTemp = "";
                let lByte, lCount;
                for (lCount = 0; lCount <= 3; lCount++) {
                    lByte = (lValue >>> (lCount * 8)) & 255;
                    wordToHexValueTemp = "0" + lByte.toString(16);
                    wordToHexValue = wordToHexValue + wordToHexValueTemp.substr(wordToHexValueTemp.length - 2, 2);
                }
                return wordToHexValue;
            }

            let x = [];
            let k, AA, BB, CC, DD, a, b, c, d;
            let S11 = 7, S12 = 12, S13 = 17, S14 = 22;
            let S21 = 5, S22 = 9, S23 = 14, S24 = 20;
            let S31 = 4, S32 = 11, S33 = 16, S34 = 23;
            let S41 = 6, S42 = 10, S43 = 15, S44 = 21;

            x = convertToWordArray(string);
            a = 0x67452301;
            b = 0xEFCDAB89;
            c = 0x98BADCFE;
            d = 0x10325476;

            for (k = 0; k < x.length; k += 16) {
                AA = a;
                BB = b;
                CC = c;
                DD = d;
                a = md5FF(a, b, c, d, x[k + 0], S11, 0xD76AA478);
                d = md5FF(d, a, b, c, x[k + 1], S12, 0xE8C7B756);
                c = md5FF(c, d, a, b, x[k + 2], S13, 0x242070DB);
                b = md5FF(b, c, d, a, x[k + 3], S14, 0xC1BDCEEE);
                a = md5FF(a, b, c, d, x[k + 4], S11, 0xF57C0FAF);
                d = md5FF(d, a, b, c, x[k + 5], S12, 0x4787C62A);
                c = md5FF(c, d, a, b, x[k + 6], S13, 0xA8304613);
                b = md5FF(b, c, d, a, x[k + 7], S14, 0xFD469501);
                a = md5FF(a, b, c, d, x[k + 8], S11, 0x698098D8);
                d = md5FF(d, a, b, c, x[k + 9], S12, 0x8B44F7AF);
                c = md5FF(c, d, a, b, x[k + 10], S13, 0xFFFF5BB1);
                b = md5FF(b, c, d, a, x[k + 11], S14, 0x895CD7BE);
                a = md5FF(a, b, c, d, x[k + 12], S11, 0x6B901122);
                d = md5FF(d, a, b, c, x[k + 13], S12, 0xFD987193);
                c = md5FF(c, d, a, b, x[k + 14], S13, 0xA679438E);
                b = md5FF(b, c, d, a, x[k + 15], S14, 0x49B40821);
                a = md5GG(a, b, c, d, x[k + 1], S21, 0xF61E2562);
                d = md5GG(d, a, b, c, x[k + 6], S22, 0xC040B340);
                c = md5GG(c, d, a, b, x[k + 11], S23, 0x265E5A51);
                b = md5GG(b, c, d, a, x[k + 0], S24, 0xE9B6C7AA);
                a = md5GG(a, b, c, d, x[k + 5], S21, 0xD62F105D);
                d = md5GG(d, a, b, c, x[k + 10], S22, 0x2441453);
                c = md5GG(c, d, a, b, x[k + 15], S23, 0xD8A1E681);
                b = md5GG(b, c, d, a, x[k + 4], S24, 0xE7D3FBC8);
                a = md5GG(a, b, c, d, x[k + 9], S21, 0x21E1CDE6);
                d = md5GG(d, a, b, c, x[k + 14], S22, 0xC33707D6);
                c = md5GG(c, d, a, b, x[k + 3], S23, 0xF4D50D87);
                b = md5GG(b, c, d, a, x[k + 8], S24, 0x455A14ED);
                a = md5GG(a, b, c, d, x[k + 13], S21, 0xA9E3E905);
                d = md5GG(d, a, b, c, x[k + 2], S22, 0xFCEFA3F8);
                c = md5GG(c, d, a, b, x[k + 7], S23, 0x676F02D9);
                b = md5GG(b, c, d, a, x[k + 12], S24, 0x8D2A4C8A);
                a = md5HH(a, b, c, d, x[k + 5], S31, 0xFFFA3942);
                d = md5HH(d, a, b, c, x[k + 8], S32, 0x8771F681);
                c = md5HH(c, d, a, b, x[k + 11], S33, 0x6D9D6122);
                b = md5HH(b, c, d, a, x[k + 14], S34, 0xFDE5380C);
                a = md5HH(a, b, c, d, x[k + 1], S31, 0xA4BEEA44);
                d = md5HH(d, a, b, c, x[k + 4], S32, 0x4BDECFA9);
                c = md5HH(c, d, a, b, x[k + 7], S33, 0xF6BB4B60);
                b = md5HH(b, c, d, a, x[k + 10], S34, 0xBEBFBC70);
                a = md5HH(a, b, c, d, x[k + 13], S31, 0x289B7EC6);
                d = md5HH(d, a, b, c, x[k + 0], S32, 0xEAA127FA);
                c = md5HH(c, d, a, b, x[k + 3], S33, 0xD4EF3085);
                b = md5HH(b, c, d, a, x[k + 6], S34, 0x4881D05);
                a = md5HH(a, b, c, d, x[k + 9], S31, 0xD9D4D039);
                d = md5HH(d, a, b, c, x[k + 12], S32, 0xE6DB99E5);
                c = md5HH(c, d, a, b, x[k + 15], S33, 0x1FA27CF8);
                b = md5HH(b, c, d, a, x[k + 2], S34, 0xC4AC5665);
                a = md5II(a, b, c, d, x[k + 0], S41, 0xF4292244);
                d = md5II(d, a, b, c, x[k + 7], S42, 0x432AFF97);
                c = md5II(c, d, a, b, x[k + 14], S43, 0xAB9423A7);
                b = md5II(b, c, d, a, x[k + 5], S44, 0xFC93A039);
                a = md5II(a, b, c, d, x[k + 12], S41, 0x655B59C3);
                d = md5II(d, a, b, c, x[k + 3], S42, 0x8F0CCC92);
                c = md5II(c, d, a, b, x[k + 10], S43, 0xFFEFF47D);
                b = md5II(b, c, d, a, x[k + 1], S44, 0x85845DD1);
                a = md5II(a, b, c, d, x[k + 8], S41, 0x6FA87E4F);
                d = md5II(d, a, b, c, x[k + 15], S42, 0xFE2CE6E0);
                c = md5II(c, d, a, b, x[k + 6], S43, 0xA3014314);
                b = md5II(b, c, d, a, x[k + 13], S44, 0x4E0811A1);
                a = md5II(a, b, c, d, x[k + 4], S41, 0xF7537E82);
                d = md5II(d, a, b, c, x[k + 11], S42, 0xBD3AF235);
                c = md5II(c, d, a, b, x[k + 2], S43, 0x2AD7D2BB);
                b = md5II(b, c, d, a, x[k + 9], S44, 0xEB86D391);
                a = md5AddUnsigned(a, AA);
                b = md5AddUnsigned(b, BB);
                c = md5AddUnsigned(c, CC);
                d = md5AddUnsigned(d, DD);
            }
            return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
        }

        function generateMD5() {
            const text = document.getElementById('textInput').value;
            
            if (!text && !fileData) {
                showToast('⚠️ Please enter text or select a file');
                return;
            }
            
            let hash = '';
            if (fileData) {
                const bytes = new Uint8Array(fileData);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                hash = md5(binary);
                showToast('✅ File hashed successfully!');
            } else {
                hash = md5(text);
                showToast('✅ MD5 hash generated!');
            }
            
            document.getElementById('hashOutput').textContent = hash;
        }

        function handleFile() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                document.getElementById('fileInfo').textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileData = e.target.result;
                    generateMD5();
                };
                reader.readAsArrayBuffer(file);
            } else {
                document.getElementById('fileInfo').textContent = 'No file selected';
                fileData = null;
            }
        }

        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').textContent = 'No file selected';
            fileData = null;
            document.getElementById('hashOutput').textContent = '';
            showToast('🗑️ Cleared');
        }

        function copyResult() {
            const text = document.getElementById('hashOutput').textContent;
            if (!text) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('hashOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.onload = function() {
            generateMD5();
        };
    </script>
</body>
</html>
