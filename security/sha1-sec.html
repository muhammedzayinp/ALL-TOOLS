<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-1 Hash Generator - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group textarea {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            min-height: 80px;
            resize: vertical;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            min-height: 60px;
        }
        .result-container .hash-value {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #34d399;
            word-break: break-all;
            margin: 0;
        }
        .result-container .hash-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .hash-info {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        .hash-info span {
            color: rgba(255,255,255,0.5);
        }
        .warning {
            color: #f59e0b;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .file-input-wrapper {
            margin-top: 8px;
        }
        .file-input-wrapper input[type="file"] {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .file-input-wrapper input[type="file"]::-webkit-file-upload-button {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 6px;
            color: #fff;
            padding: 6px 16px;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔑</span>
        <h1>SHA-1 Hash Generator</h1>
        <p class="desc">Generate SHA-1 hash from text or files</p>
        
        <div class="input-group">
            <label>Input Text</label>
            <textarea id="textInput" placeholder="Enter text to hash...">Hello World!</textarea>
        </div>
        
        <div class="file-input-wrapper">
            <label style="display:block; font-size:0.8rem; color:rgba(255,255,255,0.6); margin-bottom:4px;">Or upload a file</label>
            <input type="file" id="fileInput" onchange="handleFile()">
            <div style="font-size:0.8rem; color:rgba(255,255,255,0.3); margin-top:4px;" id="fileInfo">No file selected</div>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="generateSHA1()">🔑 Generate SHA-1</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <div class="hash-label">SHA-1 Hash</div>
                <div class="hash-value" id="hashOutput">2ef7bde608ce5404e97d5f042f95f89f1c232871</div>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <div class="hash-info">
            <span>Length: 40 characters</span>
            <span>Format: Hexadecimal</span>
        </div>
        <div class="warning">⚠️ SHA-1 is not cryptographically secure. Use SHA-256 for security.</div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        let fileData = null;

        function sha1(input) {
            function rotateLeft(n, s) {
                return (n << s) | (n >>> (32 - s));
            }

            function toHexStr(n) {
                let s = '', v;
                for (let i = 7; i >= 0; i--) {
                    v = (n >>> (i * 4)) & 0x0f;
                    s += v.toString(16);
                }
                return s;
            }

            let blockstart;
            let i, j;
            let W = new Array(80);
            let H0 = 0x67452301;
            let H1 = 0xEFCDAB89;
            let H2 = 0x98BADCFE;
            let H3 = 0x10325476;
            let H4 = 0xC3D2E1F0;
            let A, B, C, D, E;
            let temp;

            let str_len = input.length;
            let word_array = [];
            for (i = 0; i < str_len - 3; i += 4) {
                j = input.charCodeAt(i) << 24 | input.charCodeAt(i + 1) << 16 |
                    input.charCodeAt(i + 2) << 8 | input.charCodeAt(i + 3);
                word_array.push(j);
            }

            switch (str_len % 4) {
                case 0:
                    i = 0x080000000;
                    break;
                case 1:
                    i = input.charCodeAt(str_len - 1) << 24 | 0x0800000;
                    break;
                case 2:
                    i = input.charCodeAt(str_len - 2) << 24 | input.charCodeAt(str_len - 1) << 16 | 0x08000;
                    break;
                case 3:
                    i = input.charCodeAt(str_len - 3) << 24 | input.charCodeAt(str_len - 2) << 16 |
                        input.charCodeAt(str_len - 1) << 8 | 0x80;
                    break;
            }

            word_array.push(i);
            while ((word_array.length % 16) != 14) word_array.push(0);
            word_array.push(str_len >>> 29);
            word_array.push((str_len << 3) & 0x0ffffffff);

            for (blockstart = 0; blockstart < word_array.length; blockstart += 16) {
                for (i = 0; i < 16; i++) W[i] = word_array[blockstart + i];
                for (i = 16; i <= 79; i++) W[i] = rotateLeft(W[i - 3] ^ W[i - 8] ^ W[i - 14] ^ W[i - 16], 1);
                A = H0;
                B = H1;
                C = H2;
                D = H3;
                E = H4;
                for (i = 0; i <= 19; i++) {
                    temp = (rotateLeft(A, 5) + ((B & C) | (~B & D)) + E + W[i] + 0x5A827999) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotateLeft(B, 30);
                    B = A;
                    A = temp;
                }
                for (i = 20; i <= 39; i++) {
                    temp = (rotateLeft(A, 5) + (B ^ C ^ D) + E + W[i] + 0x6ED9EBA1) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotateLeft(B, 30);
                    B = A;
                    A = temp;
                }
                for (i = 40; i <= 59; i++) {
                    temp = (rotateLeft(A, 5) + ((B & C) | (B & D) | (C & D)) + E + W[i] + 0x8F1BBCDC) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotateLeft(B, 30);
                    B = A;
                    A = temp;
                }
                for (i = 60; i <= 79; i++) {
                    temp = (rotateLeft(A, 5) + (B ^ C ^ D) + E + W[i] + 0xCA62C1D6) & 0x0ffffffff;
                    E = D;
                    D = C;
                    C = rotateLeft(B, 30);
                    B = A;
                    A = temp;
                }
                H0 = (H0 + A) & 0x0ffffffff;
                H1 = (H1 + B) & 0x0ffffffff;
                H2 = (H2 + C) & 0x0ffffffff;
                H3 = (H3 + D) & 0x0ffffffff;
                H4 = (H4 + E) & 0x0ffffffff;
            }

            return (toHexStr(H0) + toHexStr(H1) + toHexStr(H2) + toHexStr(H3) + toHexStr(H4)).toLowerCase();
        }

        function generateSHA1() {
            const text = document.getElementById('textInput').value;
            
            if (!text && !fileData) {
                showToast('⚠️ Please enter text or select a file');
                return;
            }
            
            let hash = '';
            if (fileData) {
                const bytes = new Uint8Array(fileData);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                hash = sha1(binary);
                showToast('✅ File hashed successfully!');
            } else {
                hash = sha1(text);
                showToast('✅ SHA-1 hash generated!');
            }
            
            document.getElementById('hashOutput').textContent = hash;
        }

        function handleFile() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                document.getElementById('fileInfo').textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileData = e.target.result;
                    generateSHA1();
                };
                reader.readAsArrayBuffer(file);
            } else {
                document.getElementById('fileInfo').textContent = 'No file selected';
                fileData = null;
            }
        }

        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').textContent = 'No file selected';
            fileData = null;
            document.getElementById('hashOutput').textContent = '';
            showToast('🗑️ Cleared');
        }

        function copyResult() {
            const text = document.getElementById('hashOutput').textContent;
            if (!text) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('hashOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.onload = function() {
            generateSHA1();
        };
    </script>
</body>
</html>
