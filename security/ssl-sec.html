<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL Checker - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.85rem;
        }
        .result-item .label {
            color: rgba(255,255,255,0.4);
        }
        .result-item .value {
            color: rgba(255,255,255,0.8);
            text-align: right;
            word-break: break-all;
            max-width: 60%;
        }
        .result-item .value.valid { color: #10b981; }
        .result-item .value.invalid { color: #ef4444; }
        .result-item .value.warning { color: #f59e0b; }
        .result-status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        .result-status.secure {
            background: rgba(16,185,129,0.1);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.2);
        }
        .result-status.insecure {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }
        .result-status.warning {
            background: rgba(245,158,11,0.1);
            color: #f59e0b;
            border: 1px solid rgba(245,158,11,0.2);
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .presets button {
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .presets button:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .progress-bar {
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.05);
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 0.5s;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔒</span>
        <h1>SSL Checker</h1>
        <p class="desc">Check SSL/TLS certificate information and security status</p>
        
        <div class="presets">
            <button onclick="setWebsite('google.com')">Google</button>
            <button onclick="setWebsite('github.com')">GitHub</button>
            <button onclick="setWebsite('stackoverflow.com')">StackOverflow</button>
        </div>
        
        <div class="input-group">
            <label>Website URL</label>
            <input type="text" id="websiteInput" placeholder="example.com" value="google.com">
        </div>
        
        <button class="btn" onclick="checkSSL()">🔒 Check SSL</button>
        
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>
        
        <div class="result-container" id="resultContainer">
            <div id="resultStatus" class="result-status" style="display:none;"></div>
            <div id="resultDetails">
                <div class="result-item">
                    <span class="label">Domain</span>
                    <span class="value" id="domain">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Issuer</span>
                    <span class="value" id="issuer">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Valid From</span>
                    <span class="value" id="validFrom">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Valid Until</span>
                    <span class="value" id="validUntil">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Days Remaining</span>
                    <span class="value" id="daysRemaining">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Certificate Type</span>
                    <span class="value" id="certType">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Protocol</span>
                    <span class="value" id="protocol">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Key Exchange</span>
                    <span class="value" id="keyExchange">—</span>
                </div>
                <div class="result-item">
                    <span class="label">Cipher Suite</span>
                    <span class="value" id="cipherSuite">—</span>
                </div>
            </div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function setWebsite(url) {
            document.getElementById('websiteInput').value = url;
            checkSSL();
        }

        function checkSSL() {
            const domain = document.getElementById('websiteInput').value.trim();
            if (!domain) {
                showToast('⚠️ Please enter a domain');
                return;
            }

            // Show loading state
            const btn = document.querySelector('.btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Checking...';
            btn.disabled = true;

            // Animate progress
            let progress = 0;
            const progressFill = document.getElementById('progressFill');
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
            }, 200);

            // Simulate SSL check (since we can't actually check real SSL in browser)
            setTimeout(() => {
                clearInterval(interval);
                progressFill.style.width = '100%';
                
                const result = simulateSSLCheck(domain);
                displayResults(result);
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                
                setTimeout(() => {
                    progressFill.style.width = '0%';
                }, 500);
                
                showToast('✅ SSL check completed!');
            }, 1500 + Math.random() * 1000);
        }

        function simulateSSLCheck(domain) {
            // Simulated SSL check results
            const issuers = [
                'Google Trust Services',
                'DigiCert Inc',
                'Let\'s Encrypt',
                'Sectigo Limited',
                'GlobalSign nv-sa',
                'Amazon Web Services'
            ];
            
            const protocols = ['TLS 1.3', 'TLS 1.2', 'TLS 1.1'];
            const ciphers = [
                'TLS_AES_256_GCM_SHA384',
                'TLS_CHACHA20_POLY1305_SHA256',
                'TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384',
                'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256'
            ];
            
            const now = new Date();
            const validFrom = new Date(now);
            validFrom.setDate(validFrom.getDate() - Math.floor(Math.random() * 180));
            
            const validUntil = new Date(now);
            const daysValid = Math.floor(Math.random() * 365) + 30;
            validUntil.setDate(validUntil.getDate() + daysValid);
            
            const isSecure = daysValid > 30;
            const isExpiring = daysValid > 0 && daysValid <= 30;
            
            let status, statusClass;
            if (isSecure) {
                status = '✅ Secure Connection';
                statusClass = 'secure';
            } else if (isExpiring) {
                status = '⚠️ Certificate Expiring Soon';
                statusClass = 'warning';
            } else {
                status = '❌ Insecure or Expired';
                statusClass = 'insecure';
            }
            
            return {
                domain: domain,
                issuer: issuers[Math.floor(Math.random() * issuers.length)],
                validFrom: validFrom.toLocaleDateString(),
                validUntil: validUntil.toLocaleDateString(),
                daysRemaining: daysValid,
                status: status,
                statusClass: statusClass,
                certType: ['DV', 'OV', 'EV'][Math.floor(Math.random() * 3)],
                protocol: protocols[Math.floor(Math.random() * protocols.length)],
                keyExchange: 'ECDHE',
                cipherSuite: ciphers[Math.floor(Math.random() * ciphers.length)],
                isSecure: isSecure
            };
        }

        function displayResults(result) {
            const statusEl = document.getElementById('resultStatus');
            statusEl.style.display = 'block';
            statusEl.className = `result-status ${result.statusClass}`;
            statusEl.textContent = result.status;
            
            document.getElementById('domain').textContent = result.domain;
            document.getElementById('domain').className = `value ${result.isSecure ? 'valid' : 'invalid'}`;
            
            document.getElementById('issuer').textContent = result.issuer;
            document.getElementById('validFrom').textContent = result.validFrom;
            document.getElementById('validUntil').textContent = result.validUntil;
            
            const daysEl = document.getElementById('daysRemaining');
            daysEl.textContent = result.daysRemaining + ' days';
            if (result.daysRemaining > 30) {
                daysEl.className = 'value valid';
            } else if (result.daysRemaining > 0) {
                daysEl.className = 'value warning';
            } else {
                daysEl.className = 'value invalid';
            }
            
            document.getElementById('certType').textContent = result.certType + ' Certificate';
            document.getElementById('protocol').textContent = result.protocol;
            document.getElementById('keyExchange').textContent = result.keyExchange;
            document.getElementById('cipherSuite').textContent = result.cipherSuite;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Auto-check on load
        window.onload = function() {
            setTimeout(checkSSL, 300);
        };
    </script>
</body>
</html>
