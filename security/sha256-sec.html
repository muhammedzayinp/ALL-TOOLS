<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 Hash Generator - ToolShed Neo</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group textarea {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            min-height: 80px;
            resize: vertical;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            min-height: 60px;
        }
        .result-container .hash-value {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #34d399;
            word-break: break-all;
            margin: 0;
        }
        .result-container .hash-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .hash-info {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        .hash-info span {
            color: rgba(255,255,255,0.5);
        }
        .success {
            color: #10b981;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .file-input-wrapper {
            margin-top: 8px;
        }
        .file-input-wrapper input[type="file"] {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .file-input-wrapper input[type="file"]::-webkit-file-upload-button {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 6px;
            color: #fff;
            padding: 6px 16px;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔒</span>
        <h1>SHA-256 Hash Generator</h1>
        <p class="desc">Generate SHA-256 hash from text or files</p>
        
        <div class="input-group">
            <label>Input Text</label>
            <textarea id="textInput" placeholder="Enter text to hash...">Hello World!</textarea>
        </div>
        
        <div class="file-input-wrapper">
            <label style="display:block; font-size:0.8rem; color:rgba(255,255,255,0.6); margin-bottom:4px;">Or upload a file</label>
            <input type="file" id="fileInput" onchange="handleFile()">
            <div style="font-size:0.8rem; color:rgba(255,255,255,0.3); margin-top:4px;" id="fileInfo">No file selected</div>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="generateSHA256()">🔒 Generate SHA-256</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <div class="hash-label">SHA-256 Hash</div>
                <div class="hash-value" id="hashOutput">a591a6d40bf420404a011733cfb7b190d62c65bf0bcda32b57b277d9ad9f146e</div>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <div class="hash-info">
            <span>Length: 64 characters</span>
            <span>Format: Hexadecimal</span>
        </div>
        <div class="success">✅ SHA-256 is cryptographically secure</div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        let fileData = null;

        function sha256(input) {
            function rotateRight(n, s) {
                return (n >>> s) | (n << (32 - s));
            }

            function toHexStr(n) {
                let s = '', v;
                for (let i = 7; i >= 0; i--) {
                    v = (n >>> (i * 4)) & 0x0f;
                    s += v.toString(16);
                }
                return s;
            }

            let K = [
                0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
            ];

            let H = [
                0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
                0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
            ];

            let W = new Array(64);
            let a, b, c, d, e, f, g, h, i, j;
            let T1, T2;

            let str_len = input.length;
            let word_array = [];
            for (i = 0; i < str_len - 3; i += 4) {
                j = input.charCodeAt(i) << 24 | input.charCodeAt(i + 1) << 16 |
                    input.charCodeAt(i + 2) << 8 | input.charCodeAt(i + 3);
                word_array.push(j);
            }

            switch (str_len % 4) {
                case 0:
                    i = 0x080000000;
                    break;
                case 1:
                    i = input.charCodeAt(str_len - 1) << 24 | 0x0800000;
                    break;
                case 2:
                    i = input.charCodeAt(str_len - 2) << 24 | input.charCodeAt(str_len - 1) << 16 | 0x08000;
                    break;
                case 3:
                    i = input.charCodeAt(str_len - 3) << 24 | input.charCodeAt(str_len - 2) << 16 |
                        input.charCodeAt(str_len - 1) << 8 | 0x80;
                    break;
            }

            word_array.push(i);
            while ((word_array.length % 16) != 14) word_array.push(0);
            word_array.push(str_len >>> 29);
            word_array.push((str_len << 3) & 0x0ffffffff);

            for (let block = 0; block < word_array.length; block += 16) {
                for (i = 0; i < 16; i++) W[i] = word_array[block + i];
                for (i = 16; i < 64; i++) {
                    let s0 = rotateRight(W[i - 15], 7) ^ rotateRight(W[i - 15], 18) ^ (W[i - 15] >>> 3);
                    let s1 = rotateRight(W[i - 2], 17) ^ rotateRight(W[i - 2], 19) ^ (W[i - 2] >>> 10);
                    W[i] = (W[i - 16] + s0 + W[i - 7] + s1) & 0x0ffffffff;
                }

                a = H[0];
                b = H[1];
                c = H[2];
                d = H[3];
                e = H[4];
                f = H[5];
                g = H[6];
                h = H[7];

                for (i = 0; i < 64; i++) {
                    let S1 = rotateRight(e, 6) ^ rotateRight(e, 11) ^ rotateRight(e, 25);
                    let ch = (e & f) ^ ((~e) & g);
                    T1 = (h + S1 + ch + K[i] + W[i]) & 0x0ffffffff;
                    let S0 = rotateRight(a, 2) ^ rotateRight(a, 13) ^ rotateRight(a, 22);
                    let maj = (a & b) ^ (a & c) ^ (b & c);
                    T2 = (S0 + maj) & 0x0ffffffff;

                    h = g;
                    g = f;
                    f = e;
                    e = (d + T1) & 0x0ffffffff;
                    d = c;
                    c = b;
                    b = a;
                    a = (T1 + T2) & 0x0ffffffff;
                }

                H[0] = (H[0] + a) & 0x0ffffffff;
                H[1] = (H[1] + b) & 0x0ffffffff;
                H[2] = (H[2] + c) & 0x0ffffffff;
                H[3] = (H[3] + d) & 0x0ffffffff;
                H[4] = (H[4] + e) & 0x0ffffffff;
                H[5] = (H[5] + f) & 0x0ffffffff;
                H[6] = (H[6] + g) & 0x0ffffffff;
                H[7] = (H[7] + h) & 0x0ffffffff;
            }

            let result = '';
            for (i = 0; i < 8; i++) {
                result += toHexStr(H[i]);
            }
            return result.toLowerCase();
        }

        function generateSHA256() {
            const text = document.getElementById('textInput').value;
            
            if (!text && !fileData) {
                showToast('⚠️ Please enter text or select a file');
                return;
            }
            
            let hash = '';
            if (fileData) {
                const bytes = new Uint8Array(fileData);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                hash = sha256(binary);
                showToast('✅ File hashed successfully!');
            } else {
                hash = sha256(text);
                showToast('✅ SHA-256 hash generated!');
            }
            
            document.getElementById('hashOutput').textContent = hash;
        }

        function handleFile() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                document.getElementById('fileInfo').textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileData = e.target.result;
                    generateSHA256();
                };
                reader.readAsArrayBuffer(file);
            } else {
                document.getElementById('fileInfo').textContent = 'No file selected';
                fileData = null;
            }
        }

        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').textContent = 'No file selected';
            fileData = null;
            document.getElementById('hashOutput').textContent = '';
            showToast('🗑️ Cleared');
        }

        function copyResult() {
            const text = document.getElementById('hashOutput').textContent;
            if (!text) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('hashOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.onload = function() {
            generateSHA256();
        };
    </script>
</body>
</html>
