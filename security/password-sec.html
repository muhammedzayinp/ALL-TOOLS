<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        .input-group select option {
            background: #1a1d2e;
            color: #fff;
        }
        .result-container {
            margin: 16px 0;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            text-align: center;
            position: relative;
        }
        .result-value {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: #34d399;
            word-break: break-all;
            margin: 0;
            letter-spacing: 1px;
        }
        .result-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .options-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 4px;
        }
        .options-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .options-row input[type="checkbox"] {
            accent-color: #6366f1;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .strength-bar .fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s;
        }
        .strength-label {
            font-size: 0.7rem;
            margin-top: 4px;
            color: rgba(255,255,255,0.3);
        }
        @media (max-width: 480px) {
            .options-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔐</span>
        <h1>Password Generator</h1>
        <p class="desc">Generate strong, secure passwords with customizable options</p>
        
        <div class="input-group">
            <label>Password Length</label>
            <input type="number" id="length" value="16" min="4" max="128" oninput="generatePassword()">
        </div>
        
        <div class="options-row">
            <label>
                <input type="checkbox" id="uppercase" checked onchange="generatePassword()">
                Uppercase (A-Z)
            </label>
            <label>
                <input type="checkbox" id="lowercase" checked onchange="generatePassword()">
                Lowercase (a-z)
            </label>
            <label>
                <input type="checkbox" id="numbers" checked onchange="generatePassword()">
                Numbers (0-9)
            </label>
            <label>
                <input type="checkbox" id="symbols" checked onchange="generatePassword()">
                Symbols (!@#$%^&*)
            </label>
            <label>
                <input type="checkbox" id="excludeSimilar" onchange="generatePassword()">
                Exclude Similar Characters
            </label>
            <label>
                <input type="checkbox" id="excludeAmbiguous" onchange="generatePassword()">
                Exclude Ambiguous Characters
            </label>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="generatePassword()">🔄 Generate</button>
            <button class="btn btn-secondary" onclick="copyPassword()">📋 Copy</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container">
                <div class="result-label">Generated Password</div>
                <div class="result-value" id="passwordOutput">8x!KpL#7mQz$2wN</div>
                <div class="strength-bar">
                    <div class="fill" id="strengthFill" style="width: 100%; background: #10b981;"></div>
                </div>
                <div class="strength-label" id="strengthLabel">💪 Strong</div>
            </div>
            <button class="copy-btn" onclick="copyPassword()">📋 Copy</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function generatePassword() {
            const length = parseInt(document.getElementById('length').value) || 16;
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            const excludeSimilar = document.getElementById('excludeSimilar').checked;
            const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
            
            let chars = '';
            let upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let lower = 'abcdefghijklmnopqrstuvwxyz';
            let numbers = '0123456789';
            let symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            if (excludeSimilar) {
                upper = upper.replace(/[OIl]/g, '');
                lower = lower.replace(/[il]/g, '');
                numbers = numbers.replace(/[01]/g, '');
            }
            
            if (excludeAmbiguous) {
                upper = upper.replace(/[B]/g, '');
                lower = lower.replace(/[o]/g, '');
                symbols = symbols.replace(/[{}()\[\]]/g, '');
            }
            
            if (useUpper) chars += upper;
            if (useLower) chars += lower;
            if (useNumbers) chars += numbers;
            if (useSymbols) chars += symbols;
            
            if (chars.length === 0) {
                document.getElementById('passwordOutput').textContent = '❌ Select at least one option';
                document.getElementById('strengthFill').style.width = '0%';
                document.getElementById('strengthFill').style.background = '#ef4444';
                document.getElementById('strengthLabel').textContent = '⚠️ No character types selected';
                return;
            }
            
            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            // Ensure at least one of each selected type
            let finalPassword = password;
            if (useUpper && !/[A-Z]/.test(password)) {
                finalPassword = finalPassword.slice(0, -1) + upper.charAt(Math.floor(Math.random() * upper.length));
            }
            if (useLower && !/[a-z]/.test(password)) {
                finalPassword = finalPassword.slice(0, -1) + lower.charAt(Math.floor(Math.random() * lower.length));
            }
            if (useNumbers && !/[0-9]/.test(password)) {
                finalPassword = finalPassword.slice(0, -1) + numbers.charAt(Math.floor(Math.random() * numbers.length));
            }
            if (useSymbols && !/[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(password)) {
                const syms = '!@#$%^&*()_+-=[]{}|;:,.<>?';
                finalPassword = finalPassword.slice(0, -1) + syms.charAt(Math.floor(Math.random() * syms.length));
            }
            
            document.getElementById('passwordOutput').textContent = finalPassword;
            
            // Calculate strength
            let strength = 0;
            if (length >= 12) strength += 25;
            else if (length >= 8) strength += 15;
            else strength += 5;
            
            let types = 0;
            if (useUpper) types++;
            if (useLower) types++;
            if (useNumbers) types++;
            if (useSymbols) types++;
            strength += types * 18;
            
            if (length >= 20) strength += 10;
            if (excludeSimilar) strength += 5;
            if (excludeAmbiguous) strength += 5;
            
            strength = Math.min(strength, 100);
            
            let color, label;
            if (strength >= 80) {
                color = '#10b981';
                label = '💪 Strong';
            } else if (strength >= 60) {
                color = '#34d399';
                label = '👍 Good';
            } else if (strength >= 40) {
                color = '#fbbf24';
                label = '⚠️ Fair';
            } else {
                color = '#ef4444';
                label = '❌ Weak';
            }
            
            document.getElementById('strengthFill').style.width = strength + '%';
            document.getElementById('strengthFill').style.background = color;
            document.getElementById('strengthLabel').textContent = `${label} (${strength}%)`;
        }

        function copyPassword() {
            const text = document.getElementById('passwordOutput').textContent;
            if (!text || text.includes('Select') || text.includes('❌')) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('passwordOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.onload = function() {
            generatePassword();
        };
    </script>
</body>
</html>
