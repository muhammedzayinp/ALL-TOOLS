<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Formatter - ToolShed Neo</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            min-height: 120px;
            resize: vertical;
        }
        .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            max-height: 250px;
            overflow: auto;
        }
        .result-container pre {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }
        .result-container .error {
            color: #ef4444;
        }
        .result-container .selector { color: #818cf8; }
        .result-container .property { color: #34d399; }
        .result-container .value { color: #fbbf24; }
        .result-container .comment { color: #6b7280; font-style: italic; }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .options-row {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }
        .options-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .options-row input[type="checkbox"] {
            accent-color: #6366f1;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🎨</span>
        <h1>CSS Formatter</h1>
        <p class="desc">Format and beautify your CSS code with proper indentation</p>
        
        <div class="input-group">
            <label>Input CSS</label>
            <textarea id="cssInput" placeholder="body { color: #fff; background: #000; }"></textarea>
        </div>
        
        <div class="options-row">
            <label>
                <input type="checkbox" id="indentWithTabs">
                Indent with Tabs
            </label>
            <label>
                <input type="checkbox" id="spaceAfterColon" checked>
                Space after colon
            </label>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="formatCSS()">✨ Format</button>
            <button class="btn btn-secondary" onclick="minifyCSS()">📦 Minify</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <pre id="resultOutput"><span style="color: rgba(255,255,255,0.3);">Formatted CSS will appear here...</span></pre>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        function formatCSS() {
            const input = document.getElementById('cssInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some CSS');
                return;
            }
            
            try {
                const useTabs = document.getElementById('indentWithTabs').checked;
                const spaceAfter = document.getElementById('spaceAfterColon').checked;
                const indent = useTabs ? '\t' : '  ';
                
                let formatted = formatCSSCode(input, indent, spaceAfter);
                document.getElementById('resultOutput').innerHTML = formatted;
                document.getElementById('resultOutput').className = '';
                showToast('✅ CSS formatted successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Error: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Error formatting CSS');
            }
        }

        function minifyCSS() {
            const input = document.getElementById('cssInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some CSS');
                return;
            }
            
            try {
                let minified = input.replace(/\s+/g, ' ');
                minified = minified.replace(/\s*{\s*/g, '{');
                minified = minified.replace(/\s*}\s*/g, '}');
                minified = minified.replace(/\s*:\s*/g, ':');
                minified = minified.replace(/;\s*/g, ';');
                minified = minified.trim();
                document.getElementById('resultOutput').innerHTML = minified;
                document.getElementById('resultOutput').className = '';
                showToast('✅ CSS minified successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Error: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Error minifying CSS');
            }
        }

        function formatCSSCode(css, indent, spaceAfter) {
            let formatted = '';
            let indentLevel = 0;
            let inSelector = true;
            let inComment = false;
            
            // Remove extra whitespace
            css = css.replace(/\s+/g, ' ');
            
            // Handle comments
            let result = [];
            let current = '';
            let i = 0;
            
            while (i < css.length) {
                if (css[i] === '/' && css[i+1] === '*') {
                    // Start comment
                    if (current.trim()) {
                        result.push(current.trim());
                        current = '';
                    }
                    let comment = '';
                    while (i < css.length && !(css[i] === '*' && css[i+1] === '/')) {
                        comment += css[i];
                        i++;
                    }
                    comment += '*/';
                    i += 2;
                    result.push(comment);
                    continue;
                }
                current += css[i];
                i++;
            }
            if (current.trim()) {
                result.push(current.trim());
            }
            
            // Process each part
            let output = [];
            let insideBlock = false;
            let selectorLine = '';
            
            for (let part of result) {
                if (part.startsWith('/*')) {
                    // Comment
                    output.push(part);
                    continue;
                }
                
                // Check if it's a selector (contains {)
                if (part.includes('{')) {
                    if (selectorLine) {
                        // Previous selector was incomplete
                        selectorLine += ' ' + part;
                    } else {
                        selectorLine = part;
                    }
                    insideBlock = true;
                } else if (part.includes('}')) {
                    // End of block
                    if (part === '}') {
                        output.push(indent.repeat(Math.max(0, indentLevel - 1)) + '}');
                    } else {
                        // } with something else
                        const parts = part.split('}');
                        if (parts[0].trim()) {
                            output.push(indent.repeat(indentLevel) + parts[0].trim());
                        }
                        output.push(indent.repeat(Math.max(0, indentLevel - 1)) + '}');
                        if (parts[1] && parts[1].trim()) {
                            // Next selector
                            selectorLine = parts[1].trim();
                            insideBlock = false;
                        }
                    }
                    indentLevel = Math.max(0, indentLevel - 1);
                    insideBlock = false;
                } else if (part.includes(';')) {
                    // Property
                    const prop = part.trim();
                    if (spaceAfter) {
                        output.push(indent.repeat(indentLevel) + prop);
                    } else {
                        output.push(indent.repeat(indentLevel) + prop.replace(/:\s+/g, ':'));
                    }
                } else if (part.includes(':') && !part.includes(';')) {
                    // Property without semicolon
                    const prop = part.trim() + ';';
                    if (spaceAfter) {
                        output.push(indent.repeat(indentLevel) + prop);
                    } else {
                        output.push(indent.repeat(indentLevel) + prop.replace(/:\s+/g, ':'));
                    }
                } else {
                    // Could be text or selector
                    if (!insideBlock && part.trim()) {
                        selectorLine = part.trim();
                    }
                }
            }
            
            // Handle selectors
            let finalOutput = [];
            let currentSelector = '';
            
            for (let line of output) {
                if (line.includes('{')) {
                    // This is a selector line
                    if (line.includes('}')) {
                        // Empty rule
                        const parts = line.split('{');
                        if (parts[0].trim()) {
                            finalOutput.push(parts[0].trim() + ' {');
                        }
                        if (parts[1] && parts[1].includes('}')) {
                            const after = parts[1].split('}');
                            if (after[0] && after[0].trim()) {
                                finalOutput.push(indent + after[0].trim());
                            }
                            finalOutput.push('}');
                        }
                    } else {
                        finalOutput.push(line);
                        indentLevel++;
                    }
                } else if (line === '}') {
                    finalOutput.push('}');
                    indentLevel = Math.max(0, indentLevel - 1);
                } else if (line.trim()) {
                    finalOutput.push(line);
                }
            }
            
            formatted = finalOutput.join('\n');
            
            // Clean up
            formatted = formatted.replace(/;\s*;/g, ';');
            formatted = formatted.replace(/\n\s*\n/g, '\n');
            
            return formatted;
        }

        function clearAll() {
            document.getElementById('cssInput').value = '';
            document.getElementById('resultOutput').innerHTML = '<span style="color: rgba(255,255,255,0.3);">Formatted CSS will appear here...</span>';
            document.getElementById('resultOutput').className = '';
            showToast('🗑️ Cleared');
        }

        function copyResult() {
            const text = document.getElementById('resultOutput').textContent;
            if (!text || text.includes('will appear here')) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('resultOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Load sample data on load
        window.onload = function() {
            const sample = `.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 20px; border-radius: 12px; }
.header h1 { font-size: 2rem; color: #fff; margin: 0; }
.btn { display: inline-block; padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.btn:hover { background: #4f46e5; transform: translateY(-2px); }`;
            document.getElementById('cssInput').value = sample;
            formatCSS();
        };
    </script>
</body>
</html>
