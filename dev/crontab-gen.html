<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crontab Generator - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group select, .input-group input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group select:focus, .input-group input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .input-group select option {
            background: #1a1d2e;
            color: #fff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            min-height: 60px;
        }
        .result-container .cron-value {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #34d399;
            word-break: break-all;
            margin: 0;
        }
        .result-container .cron-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .cron-info {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        .cron-info span {
            color: rgba(255,255,255,0.5);
        }
        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .presets button {
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .presets button:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 600px) {
            .row-2col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">⏰</span>
        <h1>Crontab Generator</h1>
        <p class="desc">Generate cron expressions for scheduling tasks</p>
        
        <div class="presets">
            <button onclick="setPreset('* * * * *')">Every minute</button>
            <button onclick="setPreset('0 * * * *')">Every hour</button>
            <button onclick="setPreset('0 0 * * *')">Daily</button>
            <button onclick="setPreset('0 0 * * 0')">Weekly</button>
            <button onclick="setPreset('0 0 1 * *')">Monthly</button>
        </div>
        
        <div class="row-2col">
            <div class="input-group">
                <label>Minute (0-59)</label>
                <select id="minute">
                    <option value="*">* (Every minute)</option>
                    <option value="0" selected>0</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="25">25</option>
                    <option value="30">30</option>
                    <option value="35">35</option>
                    <option value="40">40</option>
                    <option value="45">45</option>
                    <option value="50">50</option>
                    <option value="55">55</option>
                </select>
            </div>
            <div class="input-group">
                <label>Hour (0-23)</label>
                <select id="hour">
                    <option value="*">* (Every hour)</option>
                    <option value="0" selected>0 (Midnight)</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13">13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                    <option value="16">16</option>
                    <option value="17">17</option>
                    <option value="18">18</option>
                    <option value="19">19</option>
                    <option value="20">20</option>
                    <option value="21">21</option>
                    <option value="22">22</option>
                    <option value="23">23</option>
                </select>
            </div>
        </div>
        
        <div class="row-2col">
            <div class="input-group">
                <label>Day of Month (1-31)</label>
                <select id="day">
                    <option value="*">* (Every day)</option>
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13">13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                    <option value="16">16</option>
                    <option value="17">17</option>
                    <option value="18">18</option>
                    <option value="19">19</option>
                    <option value="20">20</option>
                    <option value="21">21</option>
                    <option value="22">22</option>
                    <option value="23">23</option>
                    <option value="24">24</option>
                    <option value="25">25</option>
                    <option value="26">26</option>
                    <option value="27">27</option>
                    <option value="28">28</option>
                    <option value="29">29</option>
                    <option value="30">30</option>
                    <option value="31">31</option>
                </select>
            </div>
            <div class="input-group">
                <label>Month (1-12)</label>
                <select id="month">
                    <option value="*">* (Every month)</option>
                    <option value="1" selected>Jan</option>
                    <option value="2">Feb</option>
                    <option value="3">Mar</option>
                    <option value="4">Apr</option>
                    <option value="5">May</option>
                    <option value="6">Jun</option>
                    <option value="7">Jul</option>
                    <option value="8">Aug</option>
                    <option value="9">Sep</option>
                    <option value="10">Oct</option>
                    <option value="11">Nov</option>
                    <option value="12">Dec</option>
                </select>
            </div>
        </div>
        
        <div class="input-group">
            <label>Day of Week (0-6, 0=Sun)</label>
            <select id="weekday">
                <option value="*">* (Every day)</option>
                <option value="0">Sunday</option>
                <option value="1" selected>Monday</option>
                <option value="2">Tuesday</option>
                <option value="3">Wednesday</option>
                <option value="4">Thursday</option>
                <option value="5">Friday</option>
                <option value="6">Saturday</option>
            </select>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="generateCron()">⏰ Generate Cron</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <div class="cron-label">Cron Expression</div>
                <div class="cron-value" id="cronOutput">0 0 1 * *</div>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <div class="cron-info" id="cronInfo">
            <span>Schedule: Monthly</span>
            <span>Command: At 00:00 on day 1</span>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function generateCron() {
            const minute = document.getElementById('minute').value;
            const hour = document.getElementById('hour').value;
            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const weekday = document.getElementById('weekday').value;
            
            const cron = `${minute} ${hour} ${day} ${month} ${weekday}`;
            document.getElementById('cronOutput').textContent = cron;
            
            // Generate human-readable description
            const desc = getCronDescription(minute, hour, day, month, weekday);
            document.getElementById('cronInfo').innerHTML = `
                <span>Schedule: ${desc}</span>
                <span>Command: At ${getTimeDescription(hour, minute)} on ${getDayDescription(day, month, weekday)}</span>
            `;
            
            showToast('✅ Cron expression generated!');
        }

        function getCronDescription(minute, hour, day, month, weekday) {
            if (minute === '*' && hour === '*' && day === '*' && month === '*' && weekday === '*') {
                return 'Every minute';
            }
            if (minute === '0' && hour === '*' && day === '*' && month === '*' && weekday === '*') {
                return 'Every hour';
            }
            if (minute === '0' && hour === '0' && day === '*' && month === '*' && weekday === '*') {
                return 'Daily at midnight';
            }
            if (minute === '0' && hour === '0' && day === '*' && month === '*' && weekday !== '*') {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                return `Weekly on ${days[parseInt(weekday)]}`;
            }
            if (minute === '0' && hour === '0' && day !== '*' && month === '*' && weekday === '*') {
                return `Monthly on day ${day}`;
            }
            if (minute === '0' && hour === '0' && day === '1' && month === '*' && weekday === '*') {
                return 'Monthly';
            }
            return 'Custom schedule';
        }

        function getTimeDescription(hour, minute) {
            const h = parseInt(hour);
            const m = parseInt(minute);
            if (hour === '*' && minute === '*') return 'every minute';
            if (hour === '*' && minute !== '*') return `minute ${minute}`;
            if (hour !== '*' && minute === '*') return `every minute of hour ${h}`;
            if (h === 0) return `00:${String(m).padStart(2, '0')}`;
            if (h < 12) return `${h}:${String(m).padStart(2, '0')} AM`;
            if (h === 12) return `12:${String(m).padStart(2, '0')} PM`;
            return `${h-12}:${String(m).padStart(2, '0')} PM`;
        }

        function getDayDescription(day, month, weekday) {
            if (day === '*' && month === '*' && weekday === '*') return 'every day';
            if (day !== '*' && month === '*' && weekday === '*') return `day ${day} of every month`;
            if (day === '*' && month !== '*' && weekday === '*') return `every day of month ${month}`;
            if (day === '*' && month === '*' && weekday !== '*') {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                return `every ${days[parseInt(weekday)]}`;
            }
            return 'custom schedule';
        }

        function setPreset(cron) {
            const parts = cron.split(' ');
            if (parts.length === 5) {
                document.getElementById('minute').value = parts[0];
                document.getElementById('hour').value = parts[1];
                document.getElementById('day').value = parts[2];
                document.getElementById('month').value = parts[3];
                document.getElementById('weekday').value = parts[4];
                generateCron();
            }
        }

        function clearAll() {
            document.getElementById('minute').value = '*';
            document.getElementById('hour').value = '*';
            document.getElementById('day').value = '*';
            document.getElementById('month').value = '*';
            document.getElementById('weekday').value = '*';
            document.getElementById('cronOutput').textContent = '';
            document.getElementById('cronInfo').innerHTML = `
                <span>Schedule: -</span>
                <span>Command: -</span>
            `;
            showToast('🗑️ Cleared');
        }

        function copyResult() {
            const text = document.getElementById('cronOutput').textContent;
            if (!text) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('cronOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Auto-generate on change
        document.querySelectorAll('select').forEach(el => {
            el.addEventListener('change', generateCron);
        });

        window.onload = function() {
            generateCron();
        };
    </script>
</body>
</html>
