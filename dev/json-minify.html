<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Minifier - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            min-height: 120px;
            resize: vertical;
        }
        .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            max-height: 200px;
            overflow: auto;
        }
        .result-container pre {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }
        .result-container .error {
            color: #ef4444;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        .stats .saved {
            color: #10b981;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .result-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📦</span>
        <h1>JSON Minifier</h1>
        <p class="desc">Compress JSON data by removing all unnecessary whitespace</p>
        
        <div class="input-group">
            <label>Input JSON</label>
            <textarea id="jsonInput" placeholder='{"name":"John","age":30,"city":"New York"}'></textarea>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="minifyJSON()">📦 Minify</button>
            <button class="btn btn-secondary" onclick="formatJSON()">✨ Format</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="stats" id="stats">
            <span>Original: 0 chars</span>
            <span>Minified: 0 chars</span>
            <span class="saved">Saved: 0%</span>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <pre id="resultOutput"><span style="color: rgba(255,255,255,0.3);">Minified JSON will appear here...</span></pre>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        let minifiedResult = '';

        function minifyJSON() {
            const input = document.getElementById('jsonInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some JSON data');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                minifiedResult = JSON.stringify(parsed);
                document.getElementById('resultOutput').innerHTML = minifiedResult;
                document.getElementById('resultOutput').className = '';
                updateStats(input, minifiedResult);
                showToast('✅ JSON minified successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Invalid JSON: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Invalid JSON');
            }
        }

        function formatJSON() {
            const input = document.getElementById('jsonInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some JSON data');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, 2);
                document.getElementById('resultOutput').innerHTML = formatted;
                document.getElementById('resultOutput').className = '';
                updateStats(input, formatted);
                showToast('✅ JSON formatted successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Invalid JSON: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Invalid JSON');
            }
        }

        function clearAll() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('resultOutput').innerHTML = '<span style="color: rgba(255,255,255,0.3);">Minified JSON will appear here...</span>';
            document.getElementById('resultOutput').className = '';
            minifiedResult = '';
            updateStats('', '');
            showToast('🗑️ Cleared');
        }

        function updateStats(original, minified) {
            const origLen = original.length;
            const minLen = minified.length;
            const saved = origLen > 0 ? Math.round((1 - minLen / origLen) * 100) : 0;
            
            document.getElementById('stats').innerHTML = `
                <span>Original: ${origLen} chars</span>
                <span>Minified: ${minLen} chars</span>
                <span class="saved">Saved: ${saved}%</span>
            `;
        }

        function copyResult() {
            const text = document.getElementById('resultOutput').textContent;
            if (!text || text.includes('will appear here')) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                // Fallback
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('resultOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Load sample data on load
        window.onload = function() {
            const sample = {
                name: "John Doe",
                age: 30,
                email: "john@example.com",
                address: {
                    street: "123 Main St",
                    city: "New York",
                    zip: "10001"
                },
                hobbies: ["reading", "gaming", "hiking"],
                isActive: true
            };
            const pretty = JSON.stringify(sample, null, 2);
            document.getElementById('jsonInput').value = pretty;
            updateStats(pretty, '');
            minifyJSON();
        };
    </script>
</body>
</html>
