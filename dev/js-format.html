<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Formatter - ToolShed Neo</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            min-height: 120px;
            resize: vertical;
        }
        .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            max-height: 250px;
            overflow: auto;
        }
        .result-container pre {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }
        .result-container .error {
            color: #ef4444;
        }
        .result-container .keyword { color: #818cf8; }
        .result-container .string { color: #fbbf24; }
        .result-container .number { color: #f472b6; }
        .result-container .function { color: #34d399; }
        .result-container .comment { color: #6b7280; font-style: italic; }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .result-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .options-row {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }
        .options-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .options-row input[type="checkbox"] {
            accent-color: #6366f1;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">⚡</span>
        <h1>JavaScript Formatter</h1>
        <p class="desc">Format and beautify your JavaScript code with proper indentation</p>
        
        <div class="input-group">
            <label>Input JavaScript</label>
            <textarea id="jsInput" placeholder="function hello(){console.log('Hello World');}"></textarea>
        </div>
        
        <div class="options-row">
            <label>
                <input type="checkbox" id="indentWithTabs">
                Indent with Tabs
            </label>
            <label>
                <input type="checkbox" id="semicolons" checked>
                Add semicolons
            </label>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="formatJS()">✨ Format</button>
            <button class="btn btn-secondary" onclick="minifyJS()">📦 Minify</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-wrapper">
            <div class="result-container" id="resultContainer">
                <pre id="resultOutput"><span style="color: rgba(255,255,255,0.3);">Formatted JavaScript will appear here...</span></pre>
            </div>
            <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        function formatJS() {
            const input = document.getElementById('jsInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some JavaScript');
                return;
            }
            
            try {
                const useTabs = document.getElementById('indentWithTabs').checked;
                const addSemicolons = document.getElementById('semicolons').checked;
                const indent = useTabs ? '\t' : '  ';
                
                let formatted = formatJSCode(input, indent, addSemicolons);
                document.getElementById('resultOutput').innerHTML = formatted;
                document.getElementById('resultOutput').className = '';
                showToast('✅ JavaScript formatted successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Error: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Error formatting JavaScript');
            }
        }

        function minifyJS() {
            const input = document.getElementById('jsInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some JavaScript');
                return;
            }
            
            try {
                let minified = input.replace(/\s+/g, ' ');
                minified = minified.replace(/;\s*/g, ';');
                minified = minified.replace(/{\s*/g, '{');
                minified = minified.replace(/}\s*/g, '}');
                minified = minified.replace(/\(\s*/g, '(');
                minified = minified.replace(/\s*\)/g, ')');
                minified = minified.replace(/,\s*/g, ',');
                minified = minified.trim();
                document.getElementById('resultOutput').innerHTML = minified;
                document.getElementById('resultOutput').className = '';
                showToast('✅ JavaScript minified successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Error: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Error minifying JavaScript');
            }
        }

        function formatJSCode(js, indent, addSemicolons) {
            // Simple JS formatter
            let formatted = '';
            let indentLevel = 0;
            let inString = false;
            let stringChar = '';
            let inComment = false;
            let inBlockComment = false;
            let inRegex = false;
            
            // Split by lines and format
            let lines = js.split('\n');
            let result = [];
            let currentLine = '';
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                // Process line character by character
                let output = '';
                let i = 0;
                let lineIndent = indentLevel;
                let shouldIndent = false;
                
                while (i < line.length) {
                    let char = line[i];
                    
                    // Handle strings
                    if ((char === '"' || char === "'") && !inComment && !inBlockComment) {
                        if (!inString) {
                            inString = true;
                            stringChar = char;
                        } else if (char === stringChar && line[i-1] !== '\\') {
                            inString = false;
                        }
                        output += char;
                        i++;
                        continue;
                    }
                    
                    if (inString) {
                        output += char;
                        i++;
                        continue;
                    }
                    
                    // Handle comments
                    if (char === '/' && line[i+1] === '/' && !inBlockComment) {
                        // Single line comment
                        output += line.substring(i);
                        break;
                    }
                    
                    if (char === '/' && line[i+1] === '*') {
                        inBlockComment = true;
                        output += char;
                        i++;
                        continue;
                    }
                    
                    if (inBlockComment) {
                        output += char;
                        if (char === '*' && line[i+1] === '/') {
                            output += line[i+1];
                            i += 2;
                            inBlockComment = false;
                            continue;
                        }
                        i++;
                        continue;
                    }
                    
                    // Handle braces
                    if (char === '{') {
                        output += ' {';
                        shouldIndent = true;
                    } else if (char === '}') {
                        lineIndent = Math.max(0, indentLevel - 1);
                        if (output.trim() && output.trim() !== '}') {
                            // There's code before the closing brace
                            result.push(indent.repeat(lineIndent) + output.trim());
                            output = '';
                        }
                        output += '}';
                        indentLevel = Math.max(0, indentLevel - 1);
                        // Check if there's more after }
                        if (i < line.length - 1) {
                            // Continue processing
                        }
                    } else {
                        output += char;
                    }
                    
                    i++;
                }
                
                // Handle semicolons
                if (addSemicolons && output.trim() && !output.trim().endsWith(';') && 
                    !output.trim().endsWith('{') && !output.trim().endsWith('}') &&
                    !output.trim().startsWith('//') && !output.trim().startsWith('/*') &&
                    !output.trim().endsWith('(') && !output.trim().endsWith(',')) {
                    output += ';';
                }
                
                // Add line with proper indentation
                if (output.trim()) {
                    if (output.trim() === '}') {
                        // Closing brace already handled
                        result.push(indent.repeat(lineIndent) + output.trim());
                    } else if (output.trim().startsWith('}')) {
                        // } else if style
                        const parts = output.trim().split('}');
                        if (parts.length > 1) {
                            result.push(indent.repeat(lineIndent) + '}' + parts.slice(1).join('}').trim());
                        } else {
                            result.push(indent.repeat(lineIndent) + output.trim());
                        }
                    } else {
                        result.push(indent.repeat(lineIndent) + output.trim());
                    }
                }
                
                if (shouldIndent) {
                    indentLevel++;
                }
            }
            
            formatted = result.join('\n');
            
            // Clean up
            formatted = formatted.replace(/\n\s*\n/g, '\n');
            
            return formatted;
        }

        function clearAll() {
            document.getElementById('jsInput').value = '';
            document.getElementById('resultOutput').innerHTML = '<span style="color: rgba(255,255,255,0.3);">Formatted JavaScript will appear here...</span>';
            document.getElementById('resultOutput').className = '';
            showToast('🗑️ Cleared');
        }

        function copyResult() {
            const text = document.getElementById('resultOutput').textContent;
            if (!text || text.includes('will appear here')) {
                showToast('⚠️ Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Copied to clipboard!');
            }).catch(() => {
                const range = document.createRange();
                const selection = window.getSelection();
                const el = document.getElementById('resultOutput');
                range.selectNodeContents(el);
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                showToast('✅ Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Load sample data on load
        window.onload = function() {
            const sample = `function calculateTotal(items) {
    let total = 0;
    for (let i = 0; i < items.length; i++) {
        total += items[i].price * items[i].quantity;
    }
    return total;
}

const items = [
    { name: 'Apple', price: 1.5, quantity: 3 },
    { name: 'Banana', price: 0.8, quantity: 5 }
];

console.log('Total: $' + calculateTotal(items));`;
            document.getElementById('jsInput').value = sample;
            formatJS();
        };
    </script>
</body>
</html>
