<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            min-height: 150px;
            resize: vertical;
        }
        .input-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .result-container {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            max-height: 300px;
            overflow: auto;
        }
        .result-container pre {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }
        .result-container .error {
            color: #ef4444;
        }
        .result-container .success {
            color: #10b981;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📋</span>
        <h1>JSON Formatter</h1>
        <p class="desc">Format, validate, and beautify your JSON data</p>
        
        <div class="input-group">
            <label>Input JSON</label>
            <textarea id="jsonInput" placeholder='{"name":"John","age":30,"city":"New York"}'></textarea>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="formatJSON()">✨ Format</button>
            <button class="btn btn-secondary" onclick="minifyJSON()">📦 Minify</button>
            <button class="btn btn-secondary" onclick="clearJSON()">🗑️ Clear</button>
        </div>
        
        <div class="stats" id="stats">
            <span>Characters: 0</span>
            <span>Lines: 0</span>
        </div>
        
        <div class="result-container" id="resultContainer">
            <pre id="resultOutput"><span style="color: rgba(255,255,255,0.3);">Formatted JSON will appear here...</span></pre>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function formatJSON() {
            const input = document.getElementById('jsonInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some JSON data');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, 2);
                document.getElementById('resultOutput').innerHTML = formatted;
                document.getElementById('resultOutput').className = '';
                updateStats(formatted);
                showToast('✅ JSON formatted successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Invalid JSON: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Invalid JSON');
            }
        }

        function minifyJSON() {
            const input = document.getElementById('jsonInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter some JSON data');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                const minified = JSON.stringify(parsed);
                document.getElementById('resultOutput').innerHTML = minified;
                document.getElementById('resultOutput').className = '';
                updateStats(minified);
                showToast('✅ JSON minified successfully!');
            } catch (e) {
                document.getElementById('resultOutput').innerHTML = `<span class="error">❌ Invalid JSON: ${e.message}</span>`;
                document.getElementById('resultOutput').className = 'error';
                showToast('❌ Invalid JSON');
            }
        }

        function clearJSON() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('resultOutput').innerHTML = '<span style="color: rgba(255,255,255,0.3);">Formatted JSON will appear here...</span>';
            document.getElementById('resultOutput').className = '';
            updateStats('');
            showToast('🗑️ Cleared');
        }

        function updateStats(text) {
            document.getElementById('stats').innerHTML = `
                <span>Characters: ${text.length}</span>
                <span>Lines: ${text.split('\n').length}</span>
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Auto-update stats on input
        document.getElementById('jsonInput').addEventListener('input', function() {
            updateStats(this.value);
        });

        // Load sample data on load
        window.onload = function() {
            const sample = {
                name: "John Doe",
                age: 30,
                email: "john@example.com",
                address: {
                    street: "123 Main St",
                    city: "New York",
                    zip: "10001"
                },
                hobbies: ["reading", "gaming", "hiking"],
                isActive: true
            };
            document.getElementById('jsonInput').value = JSON.stringify(sample, null, 2);
            updateStats(document.getElementById('jsonInput').value);
            formatJSON();
        };
    </script>
</body>
</html>
