<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Quiz - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .question-container {
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
            margin: 16px 0;
            min-height: 250px;
        }
        .question-container .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.9);
            margin-bottom: 16px;
        }
        .question-container .question-number {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }
        .question-container .question-category {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .option-btn {
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            text-align: left;
        }
        .option-btn:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }
        .option-btn.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #10b981;
        }
        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
        }
        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .option-btn:active {
            transform: scale(0.95);
        }
        
        .result-display {
            text-align: center;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
        }
        .result-display.show {
            display: block;
        }
        .result-display.correct {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .result-display.wrong {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }
        .stat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        .stat-item .label {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }
        .stat-item .value.correct { color: #10b981; }
        .stat-item .value.wrong { color: #ef4444; }
        .stat-item .value.total { color: rgba(255,255,255,0.6); }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🧩</span>
        <h1>Trivia Quiz</h1>
        <p class="desc">Test your knowledge with random trivia questions</p>
        
        <div class="question-container" id="questionContainer">
            <div class="question-number" id="questionNumber">Question 1 of 10</div>
            <div class="question-category" id="questionCategory">🌍 Geography</div>
            <div class="question-text" id="questionText">What is the capital of France?</div>
            <div class="options" id="optionsContainer">
                <button class="option-btn" onclick="selectAnswer(0)">London</button>
                <button class="option-btn" onclick="selectAnswer(1)">Paris</button>
                <button class="option-btn" onclick="selectAnswer(2)">Berlin</button>
                <button class="option-btn" onclick="selectAnswer(3)">Madrid</button>
            </div>
            <div class="result-display" id="resultDisplay"></div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="label">Correct</div>
                <div class="value correct" id="correctCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Wrong</div>
                <div class="value wrong" id="wrongCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Total</div>
                <div class="value total" id="totalCount">0</div>
            </div>
        </div>
        
        <button class="btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
        <button class="btn-secondary" onclick="resetQuiz()">↺ Reset Quiz</button>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const questions = [
            // Geography
            { question: "What is the capital of France?", options: ["London", "Paris", "Berlin", "Madrid"], correct: 1, category: "🌍 Geography" },
            { question: "Which is the largest continent?", options: ["Africa", "Asia", "North America", "Europe"], correct: 1, category: "🌍 Geography" },
            { question: "What is the longest river in the world?", options: ["Amazon", "Nile", "Mississippi", "Yangtze"], correct: 1, category: "🌍 Geography" },
            { question: "Which country has the most population?", options: ["USA", "India", "China", "Indonesia"], correct: 1, category: "🌍 Geography" },
            
            // Science
            { question: "What is the chemical symbol for water?", options: ["H2O", "CO2", "NaCl", "HCl"], correct: 0, category: "🔬 Science" },
            { question: "How many planets are in our solar system?", options: ["7", "8", "9", "10"], correct: 1, category: "🔬 Science" },
            { question: "What is the largest organ in the human body?", options: ["Liver", "Brain", "Skin", "Heart"], correct: 2, category: "🔬 Science" },
            { question: "What gas do plants absorb from the atmosphere?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], correct: 2, category: "🔬 Science" },
            
            // History
            { question: "In which year did World War II end?", options: ["1943", "1944", "1945", "1946"], correct: 2, category: "📜 History" },
            { question: "Who was the first president of the United States?", options: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"], correct: 2, category: "📜 History" },
            { question: "What ancient civilization built the pyramids?", options: ["Romans", "Greeks", "Egyptians", "Persians"], correct: 2, category: "📜 History" },
            
            // Entertainment
            { question: "Which movie won the first Academy Award for Best Picture?", options: ["Wings", "Gone with the Wind", "Casablanca", "The Wizard of Oz"], correct: 0, category: "🎬 Entertainment" },
            { question: "Who wrote the Harry Potter series?", options: ["J.R.R. Tolkien", "J.K. Rowling", "Stephen King", "C.S. Lewis"], correct: 1, category: "🎬 Entertainment" },
            
            // Sports
            { question: "Which country has won the most FIFA World Cups?", options: ["Brazil", "Germany", "Italy", "Argentina"], correct: 0, category: "⚽ Sports" },
            { question: "What sport is played at Wimbledon?", options: ["Golf", "Tennis", "Cricket", "Badminton"], correct: 1, category: "⚽ Sports" },
            
            // Technology
            { question: "Which company created the first smartphone?", options: ["Apple", "Samsung", "IBM", "BlackBerry"], correct: 2, category: "💻 Technology" },
            { question: "What does 'HTML' stand for?", options: ["Hyper Text Markup Language", "High Tech Machine Learning", "Hyper Transfer Markup Language", "None of the above"], correct: 0, category: "💻 Technology" },
            
            // General
            { question: "How many colors are in a rainbow?", options: ["5", "6", "7", "8"], correct: 2, category: "🌈 General" },
            { question: "What is the hardest natural substance?", options: ["Gold", "Iron", "Diamond", "Platinum"], correct: 2, category: "🌈 General" },
            { question: "How many bones are in the human adult body?", options: ["106", "206", "306", "406"], correct: 1, category: "🌈 General" }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let correct = 0;
        let wrong = 0;
        let total = 0;
        let answered = false;

        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startQuiz() {
            const shuffled = shuffleArray(questions);
            currentQuestions = shuffled.slice(0, 10);
            currentIndex = 0;
            correct = 0;
            wrong = 0;
            total = 0;
            answered = false;
            updateStats();
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentQuestions.length) {
                endQuiz();
                return;
            }
            
            const q = currentQuestions[currentIndex];
            document.getElementById('questionNumber').textContent = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
            document.getElementById('questionCategory').textContent = q.category;
            document.getElementById('questionText').textContent = q.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const shuffledOptions = q.options.map((text, index) => ({ text, index }));
            const shuffled = shuffleArray(shuffledOptions);
            
            shuffled.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.text;
                btn.dataset.originalIndex = option.index;
                btn.onclick = () => selectAnswer(option.index);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('resultDisplay').className = 'result-display';
            document.getElementById('resultDisplay').textContent = '';
            
            document.getElementById('nextBtn').textContent = currentIndex === currentQuestions.length - 1 ? 'Finish Quiz' : 'Next Question →';
            answered = false;
        }

        function selectAnswer(selected) {
            if (answered) return;
            
            const q = currentQuestions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            // Disable all buttons
            buttons.forEach(btn => btn.classList.add('disabled'));
            
            // Highlight correct and wrong
            buttons.forEach(btn => {
                const index = parseInt(btn.dataset.originalIndex);
                if (index === q.correct) {
                    btn.classList.add('correct');
                }
                if (index === selected && selected !== q.correct) {
                    btn.classList.add('wrong');
                }
            });
            
            const resultDisplay = document.getElementById('resultDisplay');
            resultDisplay.className = 'result-display show';
            
            if (selected === q.correct) {
                resultDisplay.className += ' correct';
                resultDisplay.textContent = '✅ Correct! Well done!';
                correct++;
            } else {
                resultDisplay.className += ' wrong';
                resultDisplay.textContent = `❌ Wrong! The correct answer was: ${q.options[q.correct]}`;
                wrong++;
            }
            total++;
            answered = true;
            updateStats();
        }

        function nextQuestion() {
            if (!answered) {
                showToast('⚠️ Please answer the question first');
                return;
            }
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                endQuiz();
            }
        }

        function endQuiz() {
            const container = document.getElementById('questionContainer');
            const percentage = Math.round((correct / total) * 100);
            
            let emoji = '';
            let message = '';
            if (percentage >= 90) {
                emoji = '🌟';
                message = 'Brilliant! You\'re a trivia master!';
            } else if (percentage >= 70) {
                emoji = '👏';
                message = 'Great job! You know your stuff!';
            } else if (percentage >= 50) {
                emoji = '💪';
                message = 'Not bad! Keep learning!';
            } else {
                emoji = '📚';
                message = 'Keep studying! You\'ll get better!';
            }
            
            container.innerHTML = `
                <div style="text-align:center;padding:20px;">
                    <div style="font-size:4rem;">${emoji}</div>
                    <div style="font-size:1.5rem;font-weight:700;margin:12px 0;">Quiz Complete!</div>
                    <div style="font-size:1rem;color:rgba(255,255,255,0.6);">${message}</div>
                    <div style="font-size:2rem;font-weight:700;margin:12px 0;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
                        ${correct}/${total} (${percentage}%)
                    </div>
                    <div style="display:flex;justify-content:center;gap:20px;margin:12px 0;">
                        <span style="color:#10b981;">✅ ${correct} correct</span>
                        <span style="color:#ef4444;">❌ ${wrong} wrong</span>
                    </div>
                </div>
            `;
            
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('nextBtn').textContent = 'Quiz Complete!';
        }

        function updateStats() {
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('totalCount').textContent = total;
        }

        function resetQuiz() {
            document.getElementById('nextBtn').style.display = 'block';
            const container = document.getElementById('questionContainer');
            container.innerHTML = `
                <div class="question-number" id="questionNumber">Question 1 of 10</div>
                <div class="question-category" id="questionCategory">🌍 Geography</div>
                <div class="question-text" id="questionText">Loading question...</div>
                <div class="options" id="optionsContainer"></div>
                <div class="result-display" id="resultDisplay"></div>
            `;
            startQuiz();
            showToast('↺ Quiz reset!');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Start quiz on load
        window.onload = function() {
            startQuiz();
        };
    </script>
</body>
</html>
