<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .coin-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            perspective: 1000px;
        }
        .coin {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 700;
            transition: transform 1s ease;
            transform-style: preserve-3d;
            position: relative;
            cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #fbbf24, #d97706);
            box-shadow: 0 8px 40px rgba(251, 191, 36, 0.2);
            border: 4px solid rgba(255,255,255,0.1);
        }
        .coin.flipping {
            animation: flipCoin 1s ease-in-out;
        }
        @keyframes flipCoin {
            0% { transform: rotateY(0deg) scale(1); }
            25% { transform: rotateY(90deg) scale(1.1); }
            50% { transform: rotateY(180deg) scale(0.9); }
            75% { transform: rotateY(270deg) scale(1.1); }
            100% { transform: rotateY(360deg) scale(1); }
        }
        .coin .coin-text {
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            user-select: none;
        }
        .coin.tails {
            background: radial-gradient(circle at 30% 30%, #9ca3af, #4b5563);
            box-shadow: 0 8px 40px rgba(156, 163, 175, 0.2);
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .stat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .stat-item .label {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-item .value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }
        .stat-item .value.heads { color: #fbbf24; }
        .stat-item .value.tails { color: #9ca3af; }
        .stat-item .value.total { color: rgba(255,255,255,0.6); }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .history-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            min-height: 40px;
        }
        .history-item {
            padding: 2px 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .history-item.heads { color: #fbbf24; border-color: rgba(251, 191, 36, 0.2); }
        .history-item.tails { color: #9ca3af; border-color: rgba(156, 163, 175, 0.2); }
        .history-empty {
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            text-align: center;
            width: 100%;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🪙</span>
        <h1>Coin Flip</h1>
        <p class="desc">Flip a virtual coin with heads or tails</p>
        
        <div class="coin-container">
            <div class="coin" id="coin" onclick="flipCoin()">
                <span class="coin-text" id="coinText">👑</span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="label">Heads</div>
                <div class="value heads" id="headsCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Tails</div>
                <div class="value tails" id="tailsCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Total</div>
                <div class="value total" id="totalCount">0</div>
            </div>
        </div>
        
        <button class="btn" onclick="flipCoin()">🪙 Flip Coin</button>
        
        <div class="history-grid" id="historyGrid">
            <span class="history-empty">No flips yet</span>
        </div>
        
        <button class="btn-secondary" onclick="resetStats()">↺ Reset Stats</button>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        let heads = 0;
        let tails = 0;
        let total = 0;
        let history = [];
        let isFlipping = false;

        function flipCoin() {
            if (isFlipping) return;
            isFlipping = true;
            
            const result = Math.random() < 0.5 ? 'heads' : 'tails';
            const coin = document.getElementById('coin');
            const coinText = document.getElementById('coinText');
            
            // Animate
            coin.classList.remove('flipping');
            setTimeout(() => {
                coin.classList.add('flipping');
            }, 10);
            
            // Update result after animation
            setTimeout(() => {
                if (result === 'heads') {
                    coinText.textContent = '👑';
                    coin.className = 'coin';
                    heads++;
                } else {
                    coinText.textContent = '🪙';
                    coin.className = 'coin tails';
                    tails++;
                }
                total++;
                
                // Update stats
                document.getElementById('headsCount').textContent = heads;
                document.getElementById('tailsCount').textContent = tails;
                document.getElementById('totalCount').textContent = total;
                
                // Add to history
                history.push(result);
                if (history.length > 50) history.shift();
                renderHistory();
                
                isFlipping = false;
                showToast(`🪙 ${result === 'heads' ? 'Heads' : 'Tails'}!`);
            }, 1000);
        }

        function renderHistory() {
            const grid = document.getElementById('historyGrid');
            grid.innerHTML = '';
            
            if (history.length === 0) {
                grid.innerHTML = '<span class="history-empty">No flips yet</span>';
                return;
            }
            
            const reversed = [...history].reverse();
            reversed.forEach(result => {
                const item = document.createElement('span');
                item.className = `history-item ${result}`;
                item.textContent = result === 'heads' ? '👑' : '🪙';
                grid.appendChild(item);
            });
        }

        function resetStats() {
            heads = 0;
            tails = 0;
            total = 0;
            history = [];
            
            document.getElementById('headsCount').textContent = '0';
            document.getElementById('tailsCount').textContent = '0';
            document.getElementById('totalCount').textContent = '0';
            document.getElementById('coinText').textContent = '👑';
            document.getElementById('coin').className = 'coin';
            renderHistory();
            
            showToast('↺ Stats reset');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Keyboard shortcut
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === ' ' || e.key === 'Space' || e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                flipCoin();
            }
        });

        // Initial state
        window.onload = function() {
            renderHistory();
        };
    </script>
</body>
</html>
