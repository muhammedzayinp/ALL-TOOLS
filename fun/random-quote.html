<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .quote-container {
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 30px;
            margin: 16px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .quote-container .quote-text {
            font-size: 1.4rem;
            line-height: 1.8;
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-style: italic;
            transition: all 0.3s;
        }
        .quote-container .quote-text::before {
            content: '"';
            font-size: 2rem;
            color: rgba(99,102,241,0.4);
        }
        .quote-container .quote-text::after {
            content: '"';
            font-size: 2rem;
            color: rgba(99,102,241,0.4);
        }
        .quote-container .quote-author {
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            margin-top: 16px;
            text-align: center;
        }
        .quote-container .quote-author::before {
            content: "— ";
        }
        .quote-container .quote-category {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }
        .control-group {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
        }
        .control-group label {
            display: block;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .control-group select {
            width: 100%;
            padding: 6px 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            color: #fff;
            font-size: 0.85rem;
        }
        .control-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        .control-group select option {
            background: #1a1d2e;
            color: #fff;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">💬</span>
        <h1>Random Quote Generator</h1>
        <p class="desc">Get inspired with random quotes from famous thinkers</p>
        
        <div class="quote-container" id="quoteContainer">
            <div class="quote-text" id="quoteText">The only way to do great work is to love what you do.</div>
            <div class="quote-author" id="quoteAuthor">Steve Jobs</div>
            <div class="quote-category" id="quoteCategory">💡 Inspiration</div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>Category</label>
                <select id="categoryFilter" onchange="generateQuote()">
                    <option value="all">All Categories</option>
                    <option value="inspiration">Inspiration</option>
                    <option value="life">Life</option>
                    <option value="success">Success</option>
                    <option value="wisdom">Wisdom</option>
                    <option value="love">Love</option>
                    <option value="humor">Humor</option>
                    <option value="motivation">Motivation</option>
                </select>
            </div>
            <div class="control-group">
                <label>Style</label>
                <select id="styleFilter" onchange="generateQuote()">
                    <option value="all">All</option>
                    <option value="classic">Classic</option>
                    <option value="modern">Modern</option>
                    <option value="poetic">Poetic</option>
                </select>
            </div>
        </div>
        
        <button class="btn" onclick="generateQuote()">✨ New Quote</button>
        <button class="btn-secondary" onclick="copyQuote()">📋 Copy Quote</button>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const quotes = [
            // Inspiration
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs", category: "inspiration", style: "modern" },
            { text: "Innovation distinguishes between a leader and a follower.", author: "Steve Jobs", category: "inspiration", style: "modern" },
            { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt", category: "inspiration", style: "classic" },
            { text: "Dream big and dare to fail.", author: "Norman Vaughan", category: "inspiration", style: "modern" },
            
            // Life
            { text: "Life is what happens when you're busy making other plans.", author: "John Lennon", category: "life", style: "classic" },
            { text: "The purpose of our lives is to be happy.", author: "Dalai Lama", category: "life", style: "classic" },
            { text: "Life is 10% what happens to you and 90% how you react to it.", author: "Charles R. Swindoll", category: "life", style: "modern" },
            { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein", category: "life", style: "classic" },
            
            // Success
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill", category: "success", style: "classic" },
            { text: "Don't be afraid to give up the good to go for the great.", author: "John D. Rockefeller", category: "success", style: "modern" },
            { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau", category: "success", style: "classic" },
            { text: "The secret of success is to know something nobody else knows.", author: "Aristotle Onassis", category: "success", style: "classic" },
            
            // Wisdom
            { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates", category: "wisdom", style: "classic" },
            { text: "It is the mark of an educated mind to be able to entertain a thought without accepting it.", author: "Aristotle", category: "wisdom", style: "classic" },
            { text: "The unexamined life is not worth living.", author: "Socrates", category: "wisdom", style: "classic" },
            { text: "Wisdom is not a product of schooling but of the lifelong attempt to acquire it.", author: "Albert Einstein", category: "wisdom", style: "classic" },
            
            // Love
            { text: "The best thing to hold onto in life is each other.", author: "Audrey Hepburn", category: "love", style: "classic" },
            { text: "Love is not about how many days, months, or years you've been together. It's about how much you love each other every single day.", author: "Unknown", category: "love", style: "modern" },
            { text: "Where there is love there is life.", author: "Mahatma Gandhi", category: "love", style: "classic" },
            { text: "The only thing we never get enough of is love; and the only thing we never give enough of is love.", author: "Henry Miller", category: "love", style: "classic" },
            
            // Humor
            { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison", category: "humor", style: "classic" },
            { text: "If at first you don't succeed, try, try again. Then quit. No use being a damn fool about it.", author: "W.C. Fields", category: "humor", style: "classic" },
            { text: "I can resist everything except temptation.", author: "Oscar Wilde", category: "humor", style: "classic" },
            { text: "Behind every great man is a woman rolling her eyes.", author: "Jim Carrey", category: "humor", style: "modern" },
            
            // Motivation
            { text: "The only limit to our realization of tomorrow will be our doubts of today.", author: "Franklin D. Roosevelt", category: "motivation", style: "classic" },
            { text: "Act as if what you do makes a difference. It does.", author: "William James", category: "motivation", style: "classic" },
            { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis", category: "motivation", style: "classic" },
            { text: "What you get by achieving your goals is not as important as what you become by achieving your goals.", author: "Zig Ziglar", category: "motivation", style: "modern" },
            
            // More classic quotes
            { text: "To be or not to be, that is the question.", author: "William Shakespeare", category: "life", style: "poetic" },
            { text: "All the world's a stage, and all the men and women merely players.", author: "William Shakespeare", category: "life", style: "poetic" },
            { text: "The course of true love never did run smooth.", author: "William Shakespeare", category: "love", style: "poetic" },
            { text: "There is no charm equal to tenderness of heart.", author: "Jane Austen", category: "love", style: "poetic" },
            
            { text: "The only journey is the one within.", author: "Rainer Maria Rilke", category: "wisdom", style: "poetic" },
            { text: "Beauty is nothing but the beginning of terror.", author: "Rainer Maria Rilke", category: "wisdom", style: "poetic" }
        ];

        function generateQuote() {
            const category = document.getElementById('categoryFilter').value;
            const style = document.getElementById('styleFilter').value;
            
            let filtered = quotes;
            
            if (category !== 'all') {
                filtered = filtered.filter(q => q.category === category);
            }
            if (style !== 'all') {
                filtered = filtered.filter(q => q.style === style);
            }
            
            if (filtered.length === 0) {
                showToast('⚠️ No quotes match your filters');
                return;
            }
            
            const random = filtered[Math.floor(Math.random() * filtered.length)];
            
            document.getElementById('quoteText').textContent = random.text;
            document.getElementById('quoteAuthor').textContent = random.author;
            
            const categoryLabels = {
                inspiration: '💡 Inspiration',
                life: '🌱 Life',
                success: '🏆 Success',
                wisdom: '🧠 Wisdom',
                love: '❤️ Love',
                humor: '😄 Humor',
                motivation: '🚀 Motivation'
            };
            document.getElementById('quoteCategory').textContent = categoryLabels[random.category] || random.category;
            
            // Animation
            const container = document.getElementById('quoteContainer');
            container.style.opacity = '0';
            setTimeout(() => {
                container.style.transition = 'opacity 0.3s';
                container.style.opacity = '1';
            }, 50);
        }

        function copyQuote() {
            const text = document.getElementById('quoteText').textContent;
            const author = document.getElementById('quoteAuthor').textContent;
            const quote = `"${text}" — ${author}`;
            
            navigator.clipboard.writeText(quote).then(() => {
                showToast('✅ Quote copied to clipboard!');
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = quote;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('✅ Quote copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Generate on load
        window.onload = function() {
            generateQuote();
        };
    </script>
</body>
</html>
