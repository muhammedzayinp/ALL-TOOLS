<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman - ToolShed Neo</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .hangman-display {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            margin: 16px 0;
            min-height: 200px;
        }
        .hangman-ascii {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: rgba(255,255,255,0.6);
            white-space: pre;
            text-align: center;
        }
        .hangman-word {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 12px;
            margin: 12px 0;
            color: rgba(255,255,255,0.9);
        }
        .hangman-category {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hangman-hint {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
        }
        .hangman-status {
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .hangman-status.win { color: #10b981; }
        .hangman-status.lose { color: #ef4444; }
        
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin: 16px 0;
        }
        .letter-btn {
            padding: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .letter-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .letter-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        .letter-btn.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #10b981;
        }
        .letter-btn.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🪢</span>
        <h1>Hangman</h1>
        <p class="desc">Guess the word one letter at a time</p>
        
        <div class="hangman-display" id="hangmanDisplay">
            <div class="hangman-ascii" id="hangmanAscii"></div>
            <div class="hangman-category" id="hangmanCategory">🌍 Geography</div>
            <div class="hangman-word" id="hangmanWord">_ _ _ _ _</div>
            <div class="hangman-hint" id="hangmanHint">Hint: Capital city of France</div>
            <div class="hangman-status" id="hangmanStatus"></div>
        </div>
        
        <div class="letter-grid" id="letterGrid"></div>
        
        <button class="btn" id="newGameBtn" onclick="newGame()">🔄 New Game</button>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        const wordList = [
            // Geography
            { word: "LONDON", hint: "Capital city of the UK", category: "🌍 Geography" },
            { word: "PARIS", hint: "Capital of France", category: "🌍 Geography" },
            { word: "TOKYO", hint: "Capital of Japan", category: "🌍 Geography" },
            { word: "BERLIN", hint: "Capital of Germany", category: "🌍 Geography" },
            { word: "ROME", hint: "The eternal city", category: "🌍 Geography" },
            { word: "CAIRO", hint: "Capital of Egypt", category: "🌍 Geography" },
            { word: "DUBAI", hint: "City in the UAE", category: "🌍 Geography" },
            { word: "SYDNEY", hint: "City in Australia", category: "🌍 Geography" },
            { word: "MOSCOW", hint: "Capital of Russia", category: "🌍 Geography" },
            
            // Animals
            { word: "ELEPHANT", hint: "Largest land animal", category: "🐘 Animals" },
            { word: "GIRAFFE", hint: "Tallest land animal", category: "🐘 Animals" },
            { word: "DOLPHIN", hint: "Intelligent marine mammal", category: "🐘 Animals" },
            { word: "PENGUIN", hint: "Flightless bird that swims", category: "🐘 Animals" },
            { word: "KANGAROO", hint: "Australian animal that jumps", category: "🐘 Animals" },
            { word: "BUTTERFLY", hint: "Insect with colorful wings", category: "🐘 Animals" },
            { word: "CHEETAH", hint: "Fastest land animal", category: "🐘 Animals" },
            
            // Food
            { word: "PIZZA", hint: "Italian flatbread with toppings", category: "🍕 Food" },
            { word: "BURGER", hint: "Ground meat in a bun", category: "🍕 Food" },
            { word: "SUSHI", hint: "Japanese rice dish with fish", category: "🍕 Food" },
            { word: "PASTA", hint: "Italian noodles", category: "🍕 Food" },
            { word: "TACO", hint: "Mexican folded tortilla", category: "🍕 Food" },
            { word: "CHOCOLATE", hint: "Sweet brown treat", category: "🍕 Food" },
            { word: "BANANA", hint: "Yellow fruit", category: "🍕 Food" },
            
            // Technology
            { word: "COMPUTER", hint: "Electronic device for computing", category: "💻 Technology" },
            { word: "KEYBOARD", hint: "Input device with keys", category: "💻 Technology" },
            { word: "MONITOR", hint: "Display screen", category: "💻 Technology" },
            { word: "INTERNET", hint: "Global network of computers", category: "💻 Technology" },
            { word: "WEBSITE", hint: "Collection of web pages", category: "💻 Technology" },
            { word: "ROBOT", hint: "Automated machine", category: "💻 Technology" },
            { word: "SCREEN", hint: "Display panel", category: "💻 Technology" },
            
            // Science
            { word: "CHEMISTRY", hint: "Study of matter and its properties", category: "🔬 Science" },
            { word: "PHYSICS", hint: "Study of matter and energy", category: "🔬 Science" },
            { word: "BIOLOGY", hint: "Study of living organisms", category: "🔬 Science" },
            { word: "ASTRONOMY", hint: "Study of celestial objects", category: "🔬 Science" }
        ];

        const hangmanStages = [
            `  +---+\n  |   |\n      |\n      |\n      |\n      |\n=========`,
            `  +---+\n  |   |\n  O   |\n      |\n      |\n      |\n=========`,
            `  +---+\n  |   |\n  O   |\n  |   |\n      |\n      |\n=========`,
            `  +---+\n  |   |\n  O   |\n /|   |\n      |\n      |\n=========`,
            `  +---+\n  |   |\n  O   |\n /|\\  |\n      |\n      |\n=========`,
            `  +---+\n  |   |\n  O   |\n /|\\  |\n /    |\n      |\n=========`,
            `  +---+\n  |   |\n  O   |\n /|\\  |\n / \\  |\n      |\n=========`
        ];

        let currentWord = null;
        let displayWord = [];
        let guessedLetters = [];
        let wrongGuesses = [];
        let attempts = 0;
        let maxAttempts = 6;
        let gameOver = false;

        function newGame() {
            const random = wordList[Math.floor(Math.random() * wordList.length)];
            currentWord = random;
            displayWord = currentWord.word.split('').map(() => '_');
            guessedLetters = [];
            wrongGuesses = [];
            attempts = 0;
            gameOver = false;
            
            updateDisplay();
            renderLetters();
            document.getElementById('newGameBtn').textContent = '🔄 New Game';
            
            showToast('🎮 New game started!');
        }

        function guessLetter(letter) {
            if (gameOver) {
                showToast('⚠️ Game over! Start a new game.');
                return;
            }
            
            if (guessedLetters.includes(letter)) {
                showToast(`⚠️ You already guessed "${letter}"`);
                return;
            }
            
            guessedLetters.push(letter);
            
            if (currentWord.word.includes(letter)) {
                // Correct guess
                document.getElementById(`letter-${letter}`).classList.add('correct');
                for (let i = 0; i < currentWord.word.length; i++) {
                    if (currentWord.word[i] === letter) {
                        displayWord[i] = letter;
                    }
                }
                showToast(`✅ "${letter}" is correct!`);
                
                // Check win
                if (!displayWord.includes('_')) {
                    gameOver = true;
                    document.getElementById('hangmanStatus').className = 'hangman-status win';
                    document.getElementById('hangmanStatus').textContent = '🎉 You won! Congratulations!';
                    showToast('🎉 You won!');
                }
            } else {
                // Wrong guess
                document.getElementById(`letter-${letter}`).classList.add('wrong');
                wrongGuesses.push(letter);
                attempts++;
                showToast(`❌ "${letter}" is wrong. ${maxAttempts - attempts} attempts left.`);
                
                // Check lose
                if (attempts >= maxAttempts) {
                    gameOver = true;
                    document.getElementById('hangmanStatus').className = 'hangman-status lose';
                    document.getElementById('hangmanStatus').textContent = `💀 Game Over! The word was: ${currentWord.word}`;
                    showToast(`💀 Game Over! The word was: ${currentWord.word}`);
                }
            }
            
            updateDisplay();
        }

        function updateDisplay() {
            // Update hangman ASCII
            document.getElementById('hangmanAscii').textContent = hangmanStages[attempts];
            
            // Update word display
            document.getElementById('hangmanWord').textContent = displayWord.join(' ');
            
            // Update category and hint
            document.getElementById('hangmanCategory').textContent = currentWord.category;
            document.getElementById('hangmanHint').textContent = `Hint: ${currentWord.hint}`;
            
            // Update status if not game over
            if (!gameOver) {
                document.getElementById('hangmanStatus').className = 'hangman-status';
                document.getElementById('hangmanStatus').textContent = `Attempts: ${attempts}/${maxAttempts} | Wrong: ${wrongGuesses.join(', ') || 'none'}`;
            }
        }

        function renderLetters() {
            const grid = document.getElementById('letterGrid');
            grid.innerHTML = '';
            
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            alphabet.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.id = `letter-${letter}`;
                btn.textContent = letter;
                btn.onclick = () => guessLetter(letter);
                grid.appendChild(btn);
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Initialize
        window.onload = function() {
            newGame();
        };
    </script>
</body>
</html>
