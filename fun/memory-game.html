<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }
        .stat-box .label {
            font-size: 0.55rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-box .value {
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: rgba(255,255,255,0.8);
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .card-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.4s ease;
            transform-style: preserve-3d;
            position: relative;
        }
        .card-item .card-front, .card-item .card-back {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            backface-visibility: hidden;
            transition: all 0.4s ease;
        }
        .card-item .card-front {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.06);
            transform: rotateY(0deg);
        }
        .card-item .card-front .icon-placeholder {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.1);
        }
        .card-item .card-back {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.2));
            border: 2px solid rgba(99,102,241,0.2);
            transform: rotateY(180deg);
        }
        .card-item.flipped .card-front {
            transform: rotateY(-180deg);
        }
        .card-item.flipped .card-back {
            transform: rotateY(0deg);
        }
        .card-item.matched {
            opacity: 0.5;
            cursor: default;
        }
        .card-item.matched .card-back {
            border-color: #10b981;
            background: rgba(16,185,129,0.1);
        }
        .card-item:hover:not(.flipped):not(.matched) {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.15);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🧠</span>
        <h1>Memory Game</h1>
        <p class="desc">Find matching pairs of emojis. Test your memory!</p>
        
        <div class="stats-bar">
            <div class="stat-box">
                <div class="label">Moves</div>
                <div class="value" id="moves">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Matches</div>
                <div class="value" id="matches">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Pairs</div>
                <div class="value" id="pairs">0/8</div>
            </div>
            <div class="stat-box">
                <div class="label">Time</div>
                <div class="value" id="timer">0s</div>
            </div>
        </div>
        
        <div class="grid-container" id="gridContainer"></div>
        
        <button class="btn" onclick="startGame()">🔄 New Game</button>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const emojis = ['🎮', '🎯', '🎪', '🎨', '🎭', '🎵', '🎲', '🎳'];
        
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let isLocked = false;
        let gameStarted = false;

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function createCards() {
            const deck = [...emojis, ...emojis];
            return shuffleArray(deck).map((emoji, index) => ({
                id: index,
                emoji: emoji,
                flipped: false,
                matched: false
            }));
        }

        function renderCards() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            
            cards.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = 'card-item';
                if (card.flipped) div.classList.add('flipped');
                if (card.matched) div.classList.add('matched');
                
                div.innerHTML = `
                    <div class="card-front">
                        <span class="icon-placeholder">❓</span>
                    </div>
                    <div class="card-back">${card.emoji}</div>
                `;
                
                div.addEventListener('click', () => flipCard(index));
                container.appendChild(div);
            });
        }

        function flipCard(index) {
            if (isLocked) return;
            if (cards[index].flipped || cards[index].matched) return;
            
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }
            
            cards[index].flipped = true;
            flippedCards.push(index);
            renderCards();
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            const [i1, i2] = flippedCards;
            const card1 = cards[i1];
            const card2 = cards[i2];
            
            if (card1.emoji === card2.emoji) {
                // Match found
                card1.matched = true;
                card2.matched = true;
                matchedPairs++;
                flippedCards = [];
                isLocked = false;
                document.getElementById('matches').textContent = matchedPairs;
                document.getElementById('pairs').textContent = `${matchedPairs}/${emojis.length}`;
                
                if (matchedPairs === emojis.length) {
                    clearInterval(timerInterval);
                    showToast(`🎉 You won in ${moves} moves and ${timer} seconds!`);
                }
                renderCards();
            } else {
                // No match - flip back
                setTimeout(() => {
                    card1.flipped = false;
                    card2.flipped = false;
                    flippedCards = [];
                    isLocked = false;
                    renderCards();
                }, 800);
            }
        }

        function startTimer() {
            timer = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = `${timer}s`;
            }, 1000);
        }

        function startGame() {
            clearInterval(timerInterval);
            cards = createCards();
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            timer = 0;
            isLocked = false;
            gameStarted = false;
            
            document.getElementById('moves').textContent = '0';
            document.getElementById('matches').textContent = '0';
            document.getElementById('pairs').textContent = `0/${emojis.length}`;
            document.getElementById('timer').textContent = '0s';
            
            renderCards();
            showToast('🔄 New game started!');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Initialize
        window.onload = function() {
            startGame();
        };
    </script>
</body>
</html>
