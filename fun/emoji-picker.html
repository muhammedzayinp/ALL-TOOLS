    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .selected-display {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            margin: 16px 0;
        }
        .selected-display .emoji {
            font-size: 5rem;
        }
        .selected-display .name {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.6);
            margin-top: 8px;
        }
        .selected-display .copy-hint {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.2);
            margin-top: 4px;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin: 12px 0;
        }
        .search-box:focus {
            border-color: #6366f1;
        }
        .search-box::placeholder {
            color: rgba(255,255,255,0.2);
        }
        
        .category-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 4px 0;
            margin: 8px 0;
            scrollbar-width: thin;
        }
        .category-tabs::-webkit-scrollbar {
            height: 4px;
        }
        .category-tabs::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }
        .category-tabs::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        .category-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .category-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        .category-btn.active {
            background: rgba(99,102,241,0.2);
            border-color: #6366f1;
            color: #6366f1;
        }
        
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            margin: 12px 0;
            max-height: 350px;
            overflow-y: auto;
            padding: 4px;
        }
        .emoji-grid::-webkit-scrollbar {
            width: 4px;
        }
        .emoji-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }
        .emoji-grid::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        .emoji-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .emoji-item:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.15);
        }
        .emoji-item:active {
            transform: scale(0.95);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active {
            transform: scale(0.95);
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>

        let currentCategory = 'all';
        let selectedEmoji = { emoji: '😊', name: 'Smiling Face' };

        function renderEmojis(category = 'all', search = '') {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = '';
            
            let emojis = [];
            if (category === 'all') {
                Object.values(emojiData).forEach(cat => {
                    emojis = emojis.concat(cat);
                });
            } else {
                emojis = emojiData[category] || [];
            }
            
            if (search) {
                const lowerSearch = search.toLowerCase();
                emojis = emojis.filter(e => 
                    e.name.toLowerCase().includes(lowerSearch) || 
                    e.emoji.includes(search)
                );
            }
            
            if (emojis.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:rgba(255,255,255,0.2);">No emojis found</div>';
                return;
            }
            
            emojis.forEach(e => {
                const item = document.createElement('div');
                item.className = 'emoji-item';
                item.textContent = e.emoji;
                item.title = e.name;
                item.onclick = () => selectEmoji(e);
                grid.appendChild(item);
            });
        }

        function selectEmoji(emoji) {
            selectedEmoji = emoji;
            document.getElementById('selectedEmoji').textContent = emoji.emoji;
            document.getElementById('selectedName').textContent = emoji.name;
            showToast(`✅ Selected: ${emoji.emoji} ${emoji.name}`);
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                }
            });
            document.getElementById('searchBox').value = '';
            renderEmojis(category);
        }

        function searchEmojis() {
            const search = document.getElementById('searchBox').value;
            renderEmojis(currentCategory, search);
        }

        function copySelected() {
            const emoji = selectedEmoji.emoji;
            navigator.clipboard.writeText(emoji).then(() => {
                showToast(`✅ Copied: ${emoji}`);
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = emoji;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast(`✅ Copied: ${emoji}`);
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Initialize
        renderEmojis('all');
    </script>
