<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .result .big { font-size: 2rem; font-weight: 700; color: #a78bfa; }
        .result .sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-top: 4px; }
        .result .details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .result .details .item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; }
        .result .details .item .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .result .details .item .value { font-size: 1rem; font-weight: 600; color: #a78bfa; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🏠</span>
        <h1>EMI Calculator</h1>
        <p class="desc">Calculate monthly loan payments</p>
        
        <div class="input-group">
            <label>Loan Amount ($)</label>
            <input type="number" id="amount" placeholder="e.g. 10000" step="0.01">
        </div>
        <div class="input-group">
            <label>Interest Rate (% per year)</label>
            <input type="number" id="rate" placeholder="e.g. 8" step="0.1">
        </div>
        <div class="input-group">
            <label>Tenure (months)</label>
            <input type="number" id="tenure" placeholder="e.g. 12" min="1">
        </div>
        
        <button class="btn" onclick="calculateEMI()">Calculate EMI</button>
        
        <div class="result" id="result">
            <div class="big" id="resultBig">$0.00</div>
            <div class="sub" id="resultSub">Monthly EMI</div>
            <div class="details">
                <div class="item"><div class="label">Total Payment</div><div class="value" id="totalPayment">$0</div></div>
                <div class="item"><div class="label">Total Interest</div><div class="value" id="totalInterest">$0</div></div>
            </div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        function calculateEMI() {
            const p = parseFloat(document.getElementById('amount').value);
            const r = parseFloat(document.getElementById('rate').value) / 12 / 100;
            const n = parseInt(document.getElementById('tenure').value);
            
            if (!p || p <= 0 || !r || r <= 0 || !n || n <= 0) {
                alert('Please enter valid values');
                return;
            }
            
            const emi = p * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
            const totalPayment = emi * n;
            const totalInterest = totalPayment - p;
            
            document.getElementById('resultBig').textContent = `$${emi.toFixed(2)}`;
            document.getElementById('resultSub').textContent = `Monthly EMI for ${n} months`;
            document.getElementById('totalPayment').textContent = `$${totalPayment.toFixed(2)}`;
            document.getElementById('totalInterest').textContent = `$${totalInterest.toFixed(2)}`;
            document.getElementById('result').classList.add('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculateEMI();
        });
    </script>
</body>
</html>
