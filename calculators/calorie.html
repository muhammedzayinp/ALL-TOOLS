<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Burn Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #6366f1; }
        .input-group select option { background: #1a1a2e; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .result .big { font-size: 2rem; font-weight: 700; color: #a78bfa; }
        .result .sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-top: 4px; }
        .result .details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .result .details .item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; }
        .result .details .item .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .result .details .item .value { font-size: 1rem; font-weight: 600; color: #a78bfa; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔥</span>
        <h1>Calorie Burn Calculator</h1>
        <p class="desc">Estimate calories burned during exercise</p>
        
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 70" step="0.1">
        </div>
        <div class="input-group">
            <label>Activity</label>
            <select id="activity">
                <option value="3.5">Walking (3.5 MET)</option>
                <option value="5">Moderate Walking (5 MET)</option>
                <option value="7">Jogging (7 MET)</option>
                <option value="8">Running (8 MET)</option>
                <option value="6">Cycling (6 MET)</option>
                <option value="8">Swimming (8 MET)</option>
                <option value="4">Yoga (4 MET)</option>
                <option value="6">Dancing (6 MET)</option>
                <option value="5">Gardening (5 MET)</option>
                <option value="3">Housework (3 MET)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Duration (minutes)</label>
            <input type="number" id="duration" placeholder="e.g. 30" step="0.1">
        </div>
        
        <button class="btn" onclick="calculateCalories()">Calculate Calories</button>
        
        <div class="result" id="result">
            <div class="big" id="resultBig">0</div>
            <div class="sub" id="resultSub">Calories burned</div>
            <div class="details">
                <div class="item"><div class="label">MET Value</div><div class="value" id="metValue">0</div></div>
                <div class="item"><div class="label">Calories per min</div><div class="value" id="calPerMin">0</div></div>
            </div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

    <script>
        function calculateCalories() {
            const weight = parseFloat(document.getElementById('weight').value);
            const met = parseFloat(document.getElementById('activity').value);
            const duration = parseFloat(document.getElementById('duration').value);
            
            if (!weight || weight <= 0 || !duration || duration <= 0) {
                alert('Please enter valid values');
                return;
            }
            
            const caloriesPerMin = (met * 3.5 * weight) / 200;
            const totalCalories = caloriesPerMin * duration;
            
            document.getElementById('resultBig').textContent = Math.round(totalCalories);
            document.getElementById('resultSub').textContent = `Calories burned in ${duration} minutes`;
            document.getElementById('metValue').textContent = met.toFixed(1);
            document.getElementById('calPerMin').textContent = caloriesPerMin.toFixed(2);
            document.getElementById('result').classList.add('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculateCalories();
        });
    </script>
</body>
</html>
