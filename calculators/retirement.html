<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Calculator</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .result .big { font-size: 2rem; font-weight: 700; color: #a78bfa; }
        .result .sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-top: 4px; }
        .result .details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .result .details .item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; }
        .result .details .item .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .result .details .item .value { font-size: 1rem; font-weight: 600; color: #a78bfa; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🏖️</span>
        <h1>Retirement Calculator</h1>
        <p class="desc">Plan your retirement savings goal</p>
        
        <div class="input-group">
            <label>Current Age</label>
            <input type="number" id="currentAge" placeholder="e.g. 30" min="1">
        </div>
        <div class="input-group">
            <label>Retirement Age</label>
            <input type="number" id="retireAge" placeholder="e.g. 60" min="1">
        </div>
        <div class="input-group">
            <label>Current Savings ($)</label>
            <input type="number" id="currentSavings" placeholder="e.g. 10000" step="0.01">
        </div>
        <div class="input-group">
            <label>Monthly Contribution ($)</label>
            <input type="number" id="monthlyContribution" placeholder="e.g. 500" step="0.01">
        </div>
        <div class="input-group">
            <label>Annual Return Rate (%)</label>
            <input type="number" id="returnRate" placeholder="e.g. 7" value="7" step="0.1">
        </div>
        
        <button class="btn" onclick="calculateRetirement()">Calculate Retirement</button>
        
        <div class="result" id="result">
            <div class="big" id="resultBig">$0.00</div>
            <div class="sub" id="resultSub">Total at Retirement</div>
            <div class="details">
                <div class="item"><div class="label">Years to Retire</div><div class="value" id="yearsToRetire">0</div></div>
                <div class="item"><div class="label">Total Contributions</div><div class="value" id="totalContributions">$0</div></div>
            </div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        function calculateRetirement() {
            const currentAge = parseInt(document.getElementById('currentAge').value);
            const retireAge = parseInt(document.getElementById('retireAge').value);
            const currentSavings = parseFloat(document.getElementById('currentSavings').value);
            const monthlyContribution = parseFloat(document.getElementById('monthlyContribution').value);
            const returnRate = parseFloat(document.getElementById('returnRate').value) / 100 / 12;
            
            if (!currentAge || currentAge <= 0 || !retireAge || retireAge <= currentAge) {
                alert('Please enter valid ages (retirement age must be > current age)');
                return;
            }
            
            if (isNaN(currentSavings) || isNaN(monthlyContribution) || isNaN(returnRate)) {
                alert('Please enter valid numbers');
                return;
            }
            
            const months = (retireAge - currentAge) * 12;
            const monthlyRate = returnRate;
            
            // Future value of current savings
            const fvCurrent = currentSavings * Math.pow(1 + monthlyRate, months);
            
            // Future value of monthly contributions
            const fvContributions = monthlyContribution * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate);
            
            const total = fvCurrent + fvContributions;
            const totalContributions = currentSavings + (monthlyContribution * months);
            
            document.getElementById('resultBig').textContent = `$${total.toFixed(2)}`;
            document.getElementById('resultSub').textContent = `At age ${retireAge}`;
            document.getElementById('yearsToRetire').textContent = retireAge - currentAge;
            document.getElementById('totalContributions').textContent = `$${totalContributions.toFixed(2)}`;
            document.getElementById('result').classList.add('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculateRetirement();
        });
    </script>
</body>
</html>
