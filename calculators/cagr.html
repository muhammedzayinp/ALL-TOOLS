<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAGR Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .result .big { font-size: 2.5rem; font-weight: 800; color: #a78bfa; }
        .result .sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-top: 4px; }
        .result .details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .result .details .item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; }
        .result .details .item .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .result .details .item .value { font-size: 1rem; font-weight: 600; color: #a78bfa; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📊</span>
        <h1>CAGR Calculator</h1>
        <p class="desc">Calculate Compound Annual Growth Rate</p>
        
        <div class="input-group">
            <label>Initial Value ($)</label>
            <input type="number" id="initial" placeholder="e.g. 1000" step="0.01">
        </div>
        <div class="input-group">
            <label>Final Value ($)</label>
            <input type="number" id="final" placeholder="e.g. 2000" step="0.01">
        </div>
        <div class="input-group">
            <label>Number of Years</label>
            <input type="number" id="years" placeholder="e.g. 5" min="1">
        </div>
        
        <button class="btn" onclick="calculateCAGR()">Calculate CAGR</button>
        
        <div class="result" id="result">
            <div class="big" id="resultBig">0%</div>
            <div class="sub" id="resultSub">Compound Annual Growth Rate</div>
            <div class="details">
                <div class="item"><div class="label">Total Return</div><div class="value" id="totalReturn">0%</div></div>
                <div class="item"><div class="label">Absolute Gain</div><div class="value" id="absoluteGain">$0</div></div>
            </div>
        </div>
        
        <a href="file://fileserver/private/All%20Tools/index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function calculateCAGR() {
            const initial = parseFloat(document.getElementById('initial').value);
            const final = parseFloat(document.getElementById('final').value);
            const years = parseInt(document.getElementById('years').value);
            
            if (!initial || initial <= 0 || !final || final <= 0 || !years || years <= 0) {
                alert('Please enter valid values');
                return;
            }
            
            const cagr = (Math.pow(final / initial, 1 / years) - 1) * 100;
            const totalReturn = ((final - initial) / initial) * 100;
            const absoluteGain = final - initial;
            
            document.getElementById('resultBig').textContent = cagr.toFixed(2) + '%';
            document.getElementById('resultSub').textContent = `Over ${years} years`;
            document.getElementById('totalReturn').textContent = totalReturn.toFixed(2) + '%';
            document.getElementById('absoluteGain').textContent = `$${absoluteGain.toFixed(2)}`;
            document.getElementById('result').classList.add('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculateCAGR();
        });
    </script>
</body>
</html>
