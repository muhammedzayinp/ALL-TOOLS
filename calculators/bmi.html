<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .result .num { font-size: 2.5rem; font-weight: 800; color: #a78bfa; }
        .result .cat { font-size: 1.2rem; font-weight: 600; margin-top: 4px; }
        .result .advice { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-top: 8px; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
        .normal { color: #10b981; }
        .underweight { color: #f59e0b; }
        .overweight { color: #f97316; }
        .obese { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">⚖️</span>
        <h1>BMI Calculator</h1>
        <p class="desc">Calculate your Body Mass Index</p>
        
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 70" step="0.1">
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="e.g. 175" step="0.1">
        </div>
        
        <button class="btn" onclick="calculateBMI()">Calculate BMI</button>
        
        <div class="result" id="result">
            <div class="num" id="bmiValue">--</div>
            <div class="cat" id="bmiCategory">---</div>
            <div class="advice" id="bmiAdvice">---</div>
        </div>
        
        <a href="file://fileserver/private/All%20Tools/index.html" class="back">← Back to all tools</a>
    </div>

    <script>
        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value) / 100;
            
            if (!weight || !height) {
                alert('Please enter valid values');
                return;
            }
            
            const bmi = weight / (height * height);
            let category, advice, colorClass;
            
            if (bmi < 18.5) {
                category = 'Underweight';
                advice = 'You may need to gain weight';
                colorClass = 'underweight';
            } else if (bmi < 25) {
                category = 'Normal';
                advice = 'You are in a healthy range!';
                colorClass = 'normal';
            } else if (bmi < 30) {
                category = 'Overweight';
                advice = 'You may need to lose weight';
                colorClass = 'overweight';
            } else {
                category = 'Obese';
                advice = 'Please consult a doctor';
                colorClass = 'obese';
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result show ${colorClass}`;
            document.getElementById('bmiValue').textContent = bmi.toFixed(1);
            document.getElementById('bmiCategory').textContent = category;
            document.getElementById('bmiAdvice').textContent = advice;
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculateBMI();
        });
    </script>
</body>
</html>
