<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #6366f1; }
        .input-group select option { background: #1a1a2e; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .result .big { font-size: 2rem; font-weight: 700; color: #a78bfa; }
        .result .sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-top: 4px; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">💯</span>
        <h1>Percentage Calculator</h1>
        <p class="desc">5 different percentage calculations</p>
        
        <div class="input-group">
            <label>Calculation Type</label>
            <select id="type">
                <option value="1">What is X% of Y?</option>
                <option value="2">X is what % of Y?</option>
                <option value="3">Increase X by Y%</option>
                <option value="4">Decrease X by Y%</option>
                <option value="5">X is Y% of what number?</option>
            </select>
        </div>
        
        <div id="inputs">
            <div class="input-group">
                <label>Value 1</label>
                <input type="number" id="val1" placeholder="e.g. 20" step="any">
            </div>
            <div class="input-group">
                <label>Value 2</label>
                <input type="number" id="val2" placeholder="e.g. 200" step="any">
            </div>
        </div>
        
        <button class="btn" onclick="calculatePercentage()">Calculate</button>
        
        <div class="result" id="result">
            <div class="big" id="resultBig">--</div>
            <div class="sub" id="resultSub">Result</div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

    <script>
        function calculatePercentage() {
            const type = parseInt(document.getElementById('type').value);
            const val1 = parseFloat(document.getElementById('val1').value);
            const val2 = parseFloat(document.getElementById('val2').value);
            
            if (isNaN(val1) || isNaN(val2) || val2 === 0) {
                alert('Please enter valid numbers');
                return;
            }
            
            let result, label;
            
            switch(type) {
                case 1: // What is X% of Y?
                    result = (val1 / 100) * val2;
                    label = `${val1}% of ${val2} is:`;
                    break;
                case 2: // X is what % of Y?
                    result = (val1 / val2) * 100;
                    label = `${val1} is ${result.toFixed(2)}% of ${val2}`;
                    break;
                case 3: // Increase X by Y%
                    result = val1 * (1 + val2 / 100);
                    label = `${val1} increased by ${val2}% is:`;
                    break;
                case 4: // Decrease X by Y%
                    result = val1 * (1 - val2 / 100);
                    label = `${val1} decreased by ${val2}% is:`;
                    break;
                case 5: // X is Y% of what number?
                    result = (val1 / val2) * 100;
                    label = `${val1} is ${val2}% of ${result.toFixed(2)}`;
                    break;
            }
            
            document.getElementById('resultBig').textContent = typeof result === 'number' ? result.toFixed(2) : result;
            document.getElementById('resultSub').textContent = label;
            document.getElementById('result').classList.add('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculatePercentage();
        });
    </script>
</body>
</html>
