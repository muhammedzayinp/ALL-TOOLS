<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .result .big { font-size: 2rem; font-weight: 700; color: #a78bfa; }
        .result .sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-top: 4px; }
        .back { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.3); text-decoration: none; }
        .back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">💵</span>
        <h1>Tip Calculator</h1>
        <p class="desc">Calculate restaurant tips and split bills</p>
        
        <div class="input-group">
            <label>Bill Amount ($)</label>
            <input type="number" id="bill" placeholder="e.g. 50" step="0.01">
        </div>
        <div class="input-group">
            <label>Tip Percentage (%)</label>
            <input type="number" id="tip" placeholder="e.g. 15" value="15" step="0.1">
        </div>
        <div class="input-group">
            <label>Number of People</label>
            <input type="number" id="people" placeholder="e.g. 2" value="1" min="1">
        </div>
        
        <button class="btn" onclick="calculateTip()">Calculate Tip</button>
        
        <div class="result" id="result">
            <div class="big" id="resultBig">$0.00</div>
            <div class="sub" id="resultSub">Total per person</div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>

    <script>
        function calculateTip() {
            const bill = parseFloat(document.getElementById('bill').value);
            const tipPct = parseFloat(document.getElementById('tip').value);
            const people = parseInt(document.getElementById('people').value) || 1;
            
            if (!bill || bill <= 0) {
                alert('Please enter a valid bill amount');
                return;
            }
            
            const tip = bill * tipPct / 100;
            const total = bill + tip;
            const perPerson = total / people;
            
            document.getElementById('resultBig').textContent = `$${perPerson.toFixed(2)}`;
            document.getElementById('resultSub').textContent = 
                `Tip: $${tip.toFixed(2)} | Total: $${total.toFixed(2)} | ${people} person${people > 1 ? 's' : ''}`;
            document.getElementById('result').classList.add('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculateTip();
        });
    </script>
</body>
</html>
