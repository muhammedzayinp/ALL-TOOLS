<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Intake Calculator - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        .input-group select option {
            background: #1a1d2e;
            color: #fff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .result-container {
            margin: 16px 0;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            text-align: center;
        }
        .result-main {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-sub {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .result-detail {
            margin-top: 12px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 12px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">💧</span>
        <h1>Water Intake Calculator</h1>
        <p class="desc">Daily water needs based on weight, activity, and climate</p>
        
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" value="70" step="0.1" min="1">
        </div>
        
        <div class="input-group">
            <label>Activity Level</label>
            <select id="activity">
                <option value="sedentary">Sedentary</option>
                <option value="light" selected>Light (1-2 days/week)</option>
                <option value="moderate">Moderate (3-5 days/week)</option>
                <option value="heavy">Heavy (6-7 days/week)</option>
                <option value="athlete">Athlete (2x/day)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>Climate</label>
            <select id="climate">
                <option value="cold">Cold</option>
                <option value="moderate" selected>Moderate</option>
                <option value="hot">Hot</option>
                <option value="veryhot">Very Hot</option>
            </select>
        </div>
        
        <button class="btn" onclick="calcWater()">💧 Calculate Water Needs</button>
        
        <div class="result-container" id="resultContainer">
            <div class="result-main" id="waterMain">2.8</div>
            <div class="result-sub">Liters per day</div>
            <div class="result-detail" id="waterDetail">≈ 11 cups • Adjust based on thirst</div>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function calcWater() {
            const weight = parseFloat(document.getElementById('weight').value);
            const activity = document.getElementById('activity').value;
            const climate = document.getElementById('climate').value;
            
            if (!weight || weight <= 0) {
                showToast('⚠️ Please enter a valid weight');
                return;
            }
            
            // Base: 30-35 ml per kg
            let base = weight * 33;
            
            // Activity multiplier
            const actMult = {
                'sedentary': 1.0,
                'light': 1.1,
                'moderate': 1.2,
                'heavy': 1.4,
                'athlete': 1.6
            };
            base *= actMult[activity];
            
            // Climate multiplier
            const climMult = {
                'cold': 0.9,
                'moderate': 1.0,
                'hot': 1.15,
                'veryhot': 1.3
            };
            base *= climMult[climate];
            
            // Convert to liters
            let liters = base / 1000;
            liters = Math.round(liters * 10) / 10;
            
            // Ensure minimum
            if (liters < 1.5) liters = 1.5;
            
            // Cups (1 cup = 240ml)
            const cups = Math.round((liters * 1000) / 240);
            
            document.getElementById('waterMain').textContent = liters;
            document.getElementById('waterDetail').textContent = 
                `≈ ${cups} cups • ${liters >= 2.5 ? '💪 Good hydration' : '💧 Stay hydrated'}`;
            
            showToast('✅ Water intake calculated!');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        document.getElementById('weight').addEventListener('input', calcWater);
        document.getElementById('activity').addEventListener('change', calcWater);
        document.getElementById('climate').addEventListener('change', calcWater);

        window.onload = calcWater;
    </script>
</body>
</html>
