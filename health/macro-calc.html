<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Calculator - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        .input-group select option {
            background: #1a1d2e;
            color: #fff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        .btn:active { transform: scale(0.95); }
        .result-container {
            margin: 16px 0;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            text-align: center;
        }
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }
        .result-item {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px 8px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .result-item .label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-item .unit {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
        }
        .result-detail {
            margin-top: 12px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 12px;
        }
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        @media (max-width: 480px) {
            .result-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🥗</span>
        <h1>Macro Calculator</h1>
        <p class="desc">Calculate your daily macronutrient needs based on TDEE</p>
        
        <div class="input-group">
            <label>Age (years)</label>
            <input type="number" id="age" value="30" min="1" max="120">
        </div>
        
        <div class="input-group">
            <label>Gender</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" value="70" step="0.1" min="1">
        </div>
        
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" value="175" step="0.1" min="1">
        </div>
        
        <div class="input-group">
            <label>Activity Level</label>
            <select id="activity">
                <option value="sedentary">Sedentary (little/no exercise)</option>
                <option value="light" selected>Light (1-3 days/week)</option>
                <option value="moderate">Moderate (3-5 days/week)</option>
                <option value="heavy">Heavy (6-7 days/week)</option>
                <option value="athlete">Athlete (2x/day)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>Goal</label>
            <select id="goal">
                <option value="maintain">Maintain Weight</option>
                <option value="lose">Lose Weight</option>
                <option value="gain">Gain Weight</option>
            </select>
        </div>
        
        <button class="btn" onclick="calcMacros()">🥗 Calculate Macros</button>
        
        <div class="result-container" id="resultContainer">
            <div class="result-grid">
                <div class="result-item">
                    <div class="label">Protein</div>
                    <div class="value" id="protein">140</div>
                    <div class="unit">g</div>
                </div>
                <div class="result-item">
                    <div class="label">Carbs</div>
                    <div class="value" id="carbs">280</div>
                    <div class="unit">g</div>
                </div>
                <div class="result-item">
                    <div class="label">Fat</div>
                    <div class="value" id="fat">62</div>
                    <div class="unit">g</div>
                </div>
            </div>
            <div class="result-detail" id="macroDetail">Calories: 2200 kcal • Protein: 25% • Carbs: 50% • Fat: 25%</div>
        </div>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function calcMacros() {
            const age = parseInt(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const activity = document.getElementById('activity').value;
            const goal = document.getElementById('goal').value;
            
            if (!age || age <= 0 || !weight || weight <= 0 || !height || height <= 0) {
                showToast('⚠️ Please enter valid values');
                return;
            }
            
            // Calculate BMR using Mifflin-St Jeor
            let bmr;
            if (gender === 'male') {
                bmr = 10 * weight + 6.25 * height - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * height - 5 * age - 161;
            }
            
            // Activity multipliers
            const actMult = {
                'sedentary': 1.2,
                'light': 1.375,
                'moderate': 1.55,
                'heavy': 1.725,
                'athlete': 1.9
            };
            
            let tdee = bmr * actMult[activity];
            
            // Adjust for goal
            if (goal === 'lose') tdee *= 0.85;
            else if (goal === 'gain') tdee *= 1.15;
            
            tdee = Math.round(tdee);
            
            // Macros (standard split: 25% protein, 50% carbs, 25% fat)
            const proteinG = Math.round((tdee * 0.25) / 4);
            const carbsG = Math.round((tdee * 0.50) / 4);
            const fatG = Math.round((tdee * 0.25) / 9);
            
            // Ensure minimum protein
            const proteinMin = Math.round(weight * 1.6);
            const finalProtein = Math.max(proteinG, proteinMin);
            
            // Adjust carbs to maintain calories
            const proteinCal = finalProtein * 4;
            const fatCal = fatG * 9;
            const remainingCal = tdee - proteinCal - fatCal;
            const finalCarbs = Math.round(remainingCal / 4);
            
            document.getElementById('protein').textContent = finalProtein;
            document.getElementById('carbs').textContent = finalCarbs;
            document.getElementById('fat').textContent = fatG;
            
            const proteinPct = Math.round((finalProtein * 4 / tdee) * 100);
            const carbsPct = Math.round((finalCarbs * 4 / tdee) * 100);
            const fatPct = Math.round((fatG * 9 / tdee) * 100);
            
            document.getElementById('macroDetail').textContent = 
                `Calories: ${tdee} kcal • Protein: ${proteinPct}% • Carbs: ${carbsPct}% • Fat: ${fatPct}%`;
            
            showToast('✅ Macros calculated!');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', calcMacros);
            el.addEventListener('change', calcMacros);
        });

        window.onload = calcMacros;
    </script>
</body>
</html>
