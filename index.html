    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 20s ease-in-out infinite alternate;
            opacity: 0.5;
        }

        .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #6366f1, transparent 70%);
            top: -10%;
            left: -10%;
        }
        .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ec4899, transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }
        .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #14b8a6, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, -50px) scale(1.2); }
            100% { transform: translate(-80px, 80px) scale(0.8); }
        }

        .glass-header {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 0;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            animation: fadeUp 0.4s ease forwards;
            opacity: 0;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.1);
        }

        .tool-card .icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .tool-card .name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
        }

        .tool-card .desc {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .tool-card .badge {
            display: inline-block;
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.15);
            color: rgba(99, 102, 241, 0.8);
            margin-top: 8px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        
        .category-tab {
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .category-tab:hover {
            color: white;
            border-color: rgba(99, 102, 241, 0.3);
        }

        .category-tab.active {
            color: white;
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.15);
        }

        .category-tab .count {
            background: rgba(99, 102, 241, 0.2);
            padding: 1px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            margin-left: 6px;
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 10px 20px;
            color: white;
            width: 100%;
            max-width: 400px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .search-box:focus {
            outline: none;
            border-color: #6366f1;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;

        .stat-item {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .stat-item strong {
            color: white;
        }

        .stat-item .live {
            color: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .scroll-categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-categories::-webkit-scrollbar {
            height: 3px;
        }

        .scroll-categories::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 24px;
            color: white;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s;
            z-index: 9999;
            max-width: 90%;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .dark {
            background: #0a0a0f;
        }

        @media (max-width: 768px) {
            .tool-card { padding: 14px 10px; }

                {
                    id: "security",
                    name: "Security",
                    icon: "fa-shield",
                    color: "#8b5cf6",
                    tools: [
                        { id: "password-sec", name: "Password Generator", desc: "Secure passwords", icon: "🔑", file: "security/password-sec.html" },
                        { id: "password-strength", name: "Password Strength", desc: "Check strength", icon: "🛡️", file: "security/password-strength.html" },
                        { id: "md5-sec", name: "MD5 Hash", desc: "MD5 encryption", icon: "🔒", file: "security/md5-sec.html" },
                        { id: "sha1-sec", name: "SHA1 Hash", desc: "SHA1 encryption", icon: "🔒", file: "security/sha1-sec.html" },
                        { id: "sha256-sec", name: "SHA256 Hash", desc: "SHA256 encryption", icon: "🔒", file: "security/sha256-sec.html" },
                        { id: "aes-encrypt", name: "AES Encrypt", desc: "Encrypt text", icon: "🔐", file: "security/aes-encrypt.html" },
                        { id: "aes-decrypt", name: "AES Decrypt", desc: "Decrypt text", icon: "🔓", file: "security/aes-decrypt.html" },
                        { id: "ssl-sec", name: "SSL Checker", desc: "Check SSL certificate", icon: "🔒", file: "security/ssl-sec.html" }
                    ]
                }
            ]
        };

        // ============================================
        // 🧠 APP LOGIC
        // ============================================

        let currentCategory = 'all';
        let searchQuery = '';
        let favorites = JSON.parse(localStorage.getItem('toolFavorites') || '[]');
        let recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]');

        const toolGrid = document.getElementById('toolGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryTabs = document.getElementById('categoryTabs');
        const totalToolsEl = document.getElementById('totalTools');
        const totalCategoriesEl = document.getElementById('totalCategories');
        const totalFavoritesEl = document.getElementById('totalFavorites');
        const lastUsedEl = document.getElementById('lastUsed');
        const favCountEl = document.getElementById('favCount');
        const toast = document.getElementById('toast');

        // ============================================
        // 🏗️ BUILD CATEGORIES
        // ============================================
        function buildCategories() {
            categoryTabs.innerHTML = `
                <button class="category-tab active" data-category="all" onclick="filterCategory('all')">
                    🎯 All Tools
                </button>
            `;

            TOOL_DATA.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-tab';
                btn.dataset.category = cat.id;
                btn.innerHTML = `
                    <i class="fas ${cat.icon}"></i> ${cat.name}
                    <span class="count">${cat.tools.length}</span>
                `;
                btn.onclick = () => filterCategory(cat.id);
                categoryTabs.appendChild(btn);
            });
        }

        // ============================================
        // 📊 RENDER TOOLS
        // ============================================
        function renderTools() {
            let tools = [];

            if (currentCategory === 'all') {
                TOOL_DATA.categories.forEach(cat => {
                    tools = tools.concat(cat.tools.map(t => ({ ...t, category: cat.name })));
                });
            } else {
                const cat = TOOL_DATA.categories.find(c => c.id === currentCategory);
                if (cat) {
                    tools = cat.tools.map(t => ({ ...t, category: cat.name }));
                }
            }

            if (searchQuery.trim()) {
                const query = searchQuery.toLowerCase();
                tools = tools.filter(t => 
                    t.name.toLowerCase().includes(query) || 
                    t.desc.toLowerCase().includes(query)
                );
            }

            // Update stats
            const totalTools = TOOL_DATA.categories.reduce((acc, c) => acc + c.tools.length, 0);
            totalToolsEl.textContent = tools.length;
            totalCategoriesEl.textContent = TOOL_DATA.categories.length;
            totalFavoritesEl.textContent = favorites.length;
            favCountEl.textContent = favorites.length;

            if (recentTools.length > 0) {
                const last = findToolById(recentTools[0]);
                if (last) lastUsedEl.textContent = `Last: ${last.name}`;
            } else {
                lastUsedEl.textContent = 'Ready to explore';
            }

            if (tools.length === 0) {
                toolGrid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <div class="text-4xl mb-4">🔍</div>
                        <p>No tools found</p>
                        <p class="text-sm text-gray-600">Try adjusting your search</p>
                    </div>
                `;
                return;
            }

            toolGrid.innerHTML = tools.map(tool => {
                const isFavorite = favorites.includes(tool.id);
                return `
                    <div class="tool-card" onclick="useTool('${tool.id}', '${tool.file || '#'}')">
                        <div class="icon">${tool.icon || '🛠️'}</div>
                        <div class="name">${tool.name}</div>
                        <div class="desc">${tool.desc}</div>
                        <span class="badge">${tool.category || ''}</span>
                        <div style="margin-top:8px;font-size:0.7rem;color:${isFavorite ? '#f59e0b' : 'rgba(255,255,255,0.2)'}">
                            ${isFavorite ? '⭐' : '☆'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // 🔍 HELPER FUNCTIONS
        // ============================================
        function findToolById(id) {
            for (const cat of TOOL_DATA.categories) {
                const tool = cat.tools.find(t => t.id === id);
                if (tool) return { ...tool, category: cat.name };
            }
            return null;
        }

        function filterCategory(id) {
            currentCategory = id;
            document.querySelectorAll('.category-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === id);
            });
            renderTools();
        }

        function resetFilters() {
            currentCategory = 'all';
            searchQuery = '';
            searchInput.value = '';
            document.querySelectorAll('.category-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === 'all');
            });
            renderTools();
            showToast('Filters reset 🔄');
        }

        function useTool(id, filePath) {
            const tool = findToolById(id);
            if (!tool) return;
            
            recentTools = recentTools.filter(t => t !== id);
            recentTools.unshift(id);
            if (recentTools.length > 10) recentTools.pop();
            localStorage.setItem('recentTools', JSON.stringify(recentTools));
            
            // Navigate to the tool
            if (filePath && filePath !== '#') {
                window.location.href = filePath;
            } else {
                showToast(`🔧 Opening ${tool.name}...`);
            }
        }

        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
                showToast('Removed from favorites 💔');
            } else {
                favorites.push(id);
                showToast('Added to favorites ⭐');
            }
            localStorage.setItem('toolFavorites', JSON.stringify(favorites));
            renderTools();
        }

        function showFavorites() {
            if (favorites.length === 0) {
                showToast('No favorites yet! ⭐');
                return;
            }
            const favTools = favorites.map(id => findToolById(id)).filter(Boolean);
            const names = favTools.map(t => t.name).join(', ');
            showToast(`⭐ ${names}`);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            const btn = document.querySelector('[onclick="toggleDarkMode()"]');
            btn.textContent = isDark ? '☀️' : '🌙';
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast.timeout);
            toast.timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ============================================
        // 🔍 SEARCH
        // ============================================
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTools();
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                searchInput.value = '';
                searchQuery = '';
                renderTools();
                searchInput.blur();
            }
        });

        // ============================================
        // 🚀 INIT
        // ============================================
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.querySelector('[onclick="toggleDarkMode()"]').textContent = '☀️';
        }

        buildCategories();
        renderTools();

        setTimeout(() => showToast('🛸 Welcome to ToolShed Neo!'), 500);

        console.log('🚀 ToolShed Neo Loaded!');
        const totalTools = TOOL_DATA.categories.reduce((acc, c) => acc + c.tools.length, 0);
        console.log('📊 Total Tools:', totalTools);
        console.log('📂 Categories:', TOOL_DATA.categories.length);
        console.log('💡 Press Ctrl+/ to search');
    </script>
