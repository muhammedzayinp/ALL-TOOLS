  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #06060c;
      color: #f0f2fa;
      min-height: 100vh;
    }
    /* floating orbs */
    .bg-orb {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      animation: floatOrb 22s ease-in-out infinite alternate;
    }
    .orb:nth-child(1) {
      width: 550px; height: 550px;
      background: radial-gradient(circle, #6366f1, transparent 75%);
      top: -12%; left: -12%;
    }
    .orb:nth-child(2) {
      width: 450px; height: 450px;
      background: radial-gradient(circle, #ec4899, transparent 75%);
      bottom: -10%; right: -10%;
      animation-delay: -6s;
    }
    .orb:nth-child(3) {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #14b8a6, transparent 75%);
      top: 45%; left: 45%;
      transform: translate(-50%, -50%);
      animation-delay: -12s;
    }
    @keyframes floatOrb {
      0% { transform: translate(0,0) scale(1); }
      50% { transform: translate(70px, -40px) scale(1.2); }
      100% { transform: translate(-60px, 60px) scale(0.85); }
    }

    /* glass header */
    .glass-header {
      background: rgba(6,6,12,0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 14px 0;
    }

    /* cards — futuristic glassmorphism */
    .tool-card {
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 18px 12px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      opacity: 0;
      animation: fadeUp 0.45s ease forwards;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .tool-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 16px 48px rgba(99,102,241,0.15);
      background: rgba(255,255,255,0.045);
    }
    .tool-card .icon {
      font-size: 2.2rem;
      line-height: 1.2;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 6px rgba(99,102,241,0.2));
    }
    .tool-card .name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #ffffff;
      letter-spacing: -0.01em;
    }
    .tool-card .desc {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }
    .tool-card .badge {
      font-size: 0.55rem;
      font-weight: 600;
      padding: 2px 12px;
      border-radius: 40px;
      background: rgba(99,102,241,0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.15);
      margin-top: 8px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .tool-card .fav-star {
      margin-top: 6px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.15);
      transition: 0.2s;
    }
    .tool-card .fav-star.active {
      color: #fbbf24;
      text-shadow: 0 0 12px rgba(251,191,36,0.3);
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* category tabs */
    .category-tab {
      padding: 6px 18px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.05);
      white-space: nowrap;
      transition: all 0.25s;
      flex-shrink: 0;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .category-tab:hover {
      color: #fff;
      border-color: rgba(99,102,241,0.3);
      background: rgba(255,255,255,0.06);
    }
    .category-tab.active {
      color: #fff;
      border-color: #818cf8;
      background: rgba(99,102,241,0.15);
      box-shadow: 0 0 20px rgba(99,102,241,0.05);
    }
    .category-tab .count {
      background: rgba(99,102,241,0.15);
      padding: 0 8px;
      border-radius: 30px;
      font-size: 0.6rem;
      margin-left: 5px;
      color: rgba(255,255,255,0.5);
    }

    .search-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 60px;
      padding: 10px 22px;
      color: white;
      width: 100%;
      max-width: 400px;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .search-box::placeholder { color: rgba(255,255,255,0.25); }
    .search-box:focus { outline: none; border-color: #818cf8; background: rgba(255,255,255,0.06); }

    .stats-bar {
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 12px 22px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .stat-item {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }
    .stat-item strong { color: white; font-weight: 600; }
    .stat-item .live { color: #34d399; animation: pulse 2s infinite; }

    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

    .scroll-categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 14px 0;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-categories::-webkit-scrollbar { height: 3px; }
    .scroll-categories::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 20px; }

    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(10,10,18,0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 26px;
      color: white;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.2,0.9,0.3,1.2);
      z-index: 9999;
      max-width: 90%;
      font-weight: 500;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    .dark { background: #06060c; }

    @media (max-width: 640px) {
      .tool-card { padding: 14px 8px; }
      .tool-card .icon { font-size: 1.7rem; }
      .tool-card .name { font-size: 0.75rem; }
      .stats-bar { flex-direction: column; align-items: stretch; text-align: center; gap: 4px; }
      .category-tab { font-size: 0.7rem; padding: 5px 12px; }
      .search-box { max-width: 100%; }

        { id:"json-format", name:"JSON Formatter", desc:"Pretty print", icon:"📦", file:"dev/json-format.html" },
        { id:"json-minify", name:"JSON Minifier", desc:"Compress", icon:"🗜️", file:"dev/json-minify.html" },
        { id:"sql-format", name:"SQL Formatter", desc:"Pretty SQL", icon:"🗄️", file:"dev/sql-format.html" },
        { id:"html-format", name:"HTML Formatter", desc:"Pretty HTML", icon:"🌐", file:"dev/html-format.html" },
        { id:"css-format", name:"CSS Formatter", desc:"Pretty CSS", icon:"🎨", file:"dev/css-format.html" },
        { id:"js-format", name:"JS Formatter", desc:"Pretty JS", icon:"💻", file:"dev/js-format.html" },
        { id:"html-minify", name:"HTML Minifier", desc:"Compress HTML", icon:"🗜️", file:"dev/html-minify.html" },
        { id:"css-minify", name:"CSS Minifier", desc:"Compress CSS", icon:"🗜️", file:"dev/css-minify.html" },
        { id:"js-minify", name:"JS Minifier", desc:"Compress JS", icon:"🗜️", file:"dev/js-minify.html" },
        { id:"base64-encode", name:"Base64 Encode", desc:"Encode", icon:"🔐", file:"dev/base64-encode.html" },
        { id:"base64-decode", name:"Base64 Decode", desc:"Decode", icon:"🔓", file:"dev/base64-decode.html" },
        { id:"md5-hash", name:"MD5 Generator", desc:"Hash", icon:"🔑", file:"dev/md5-hash.html" },
        { id:"sha1-hash", name:"SHA1", desc:"Hash", icon:"🔑", file:"dev/sha1-hash.html" },
        { id:"sha256-hash", name:"SHA256", desc:"Hash", icon:"🔑", file:"dev/sha256-hash.html" },
        { id:"jwt-decode", name:"JWT Decoder", desc:"Decode JWT", icon:"🎫", file:"dev/jwt-decode.html" },
        { id:"uuid-gen", name:"UUID Generator", desc:"UUID", icon:"🆔", file:"dev/uuid-gen.html" },
        { id:"api-test", name:"API Tester", desc:"Test endpoints", icon:"⚡", file:"dev/api-test.html" },
        { id:"crontab-gen", name:"Crontab Gen", desc:"Cron schedules", icon:"⏰", file:"dev/crontab-gen.html" }
      ]},
      { id:"converters", name:"Converters", icon:"fa-arrows-rotate", color:"#14b8a6", tools:[
        { id:"unit-conv", name:"Unit Converter", desc:"All units", icon:"📏", file:"converters/unit-conv.html" },
        { id:"length-conv", name:"Length Converter", desc:"M, KM, Miles", icon:"📐", file:"converters/length-conv.html" },
        { id:"weight-conv", name:"Weight Converter", desc:"KG, LBS", icon:"⚖️", file:"converters/weight-conv.html" },
        { id:"temp-conv", name:"Temperature", desc:"C, F, K", icon:"🌡️", file:"converters/temp-conv.html" },
        { id:"area-conv", name:"Area Converter", desc:"Square units", icon:"📐", file:"converters/area-conv.html" },
        { id:"volume-conv", name:"Volume Converter", desc:"Liters/Gallons", icon:"🧪", file:"converters/volume-conv.html" },
        { id:"speed-conv", name:"Speed Converter", desc:"KMH/MPH", icon:"🚀", file:"converters/speed-conv.html" },
        { id:"pressure-conv", name:"Pressure Converter", desc:"PSI/Bar", icon:"💨", file:"converters/pressure-conv.html" },
        { id:"data-conv", name:"Data Storage", desc:"KB/MB/GB", icon:"💾", file:"converters/data-conv.html" },
        { id:"time-conv", name:"Time Converter", desc:"Hours/Min", icon:"⏰", file:"converters/time-conv.html" },
        { id:"number-sys", name:"Number System", desc:"Bin/Oct/Hex", icon:"🔢", file:"converters/number-sys.html" },
        { id:"roman-num", name:"Roman Numerals", desc:"Convert", icon:"🏛️", file:"converters/roman-num.html" }
      ]},
      { id:"security", name:"Security", icon:"fa-shield", color:"#8b5cf6", tools:[
        { id:"password-sec", name:"Password Generator", desc:"Secure", icon:"🔑", file:"security/password-sec.html" },
        { id:"password-strength", name:"Password Strength", desc:"Check strength", icon:"🛡️", file:"security/password-strength.html" },
        { id:"md5-sec", name:"MD5 Hash", desc:"MD5", icon:"🔒", file:"security/md5-sec.html" },
        { id:"sha1-sec", name:"SHA1", desc:"SHA1", icon:"🔒", file:"security/sha1-sec.html" },
        { id:"sha256-sec", name:"SHA256", desc:"SHA256", icon:"🔒", file:"security/sha256-sec.html" },
        { id:"aes-encrypt", name:"AES Encrypt", desc:"Encrypt", icon:"🔐", file:"security/aes-encrypt.html" },
        { id:"aes-decrypt", name:"AES Decrypt", desc:"Decrypt", icon:"🔓", file:"security/aes-decrypt.html" },
        { id:"ssl-sec", name:"SSL Checker", desc:"SSL cert", icon:"🔒", file:"security/ssl-sec.html" }
      ]}
    ]
  };

  // ========== STATE ==========
  let currentCategory = 'all';
  let searchQuery = '';
  let favorites = JSON.parse(localStorage.getItem('toolFavorites') || '[]');
  let recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]');

  const toolGrid = document.getElementById('toolGrid');
  const searchInput = document.getElementById('searchInput');
  const categoryTabs = document.getElementById('categoryTabs');
  const totalToolsEl = document.getElementById('totalTools');
  const totalCategoriesEl = document.getElementById('totalCategories');
  const totalFavoritesEl = document.getElementById('totalFavorites');
  const lastUsedEl = document.getElementById('lastUsed');
  const favCountEl = document.getElementById('favCount');
  const toast = document.getElementById('toast');

  // ========== HELPERS ==========
  function findToolById(id) {
    for (const cat of TOOL_DATA.categories) {
      const found = cat.tools.find(t => t.id === id);
      if (found) return { ...found, category: cat.name };
    }
    return null;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  // ========== BUILD CATEGORIES ==========
  function buildCategories() {
    categoryTabs.innerHTML = `<button class="category-tab active" data-category="all" onclick="filterCategory('all')">🎯 All Tools</button>`;
    TOOL_DATA.categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-tab';
      btn.dataset.category = cat.id;
      btn.innerHTML = `<i class="fas ${cat.icon}"></i> ${cat.name} <span class="count">${cat.tools.length}</span>`;
      btn.onclick = () => filterCategory(cat.id);
      categoryTabs.appendChild(btn);
    });
  }

  // ========== RENDER ==========
  function renderTools() {
    let tools = [];
    if (currentCategory === 'all') {
      TOOL_DATA.categories.forEach(cat => {
        tools = tools.concat(cat.tools.map(t => ({ ...t, category: cat.name })));
      });
    } else {
      const cat = TOOL_DATA.categories.find(c => c.id === currentCategory);
      if (cat) tools = cat.tools.map(t => ({ ...t, category: cat.name }));
    }

    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      tools = tools.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
    }

    // stats
    const totalAll = TOOL_DATA.categories.reduce((acc, c) => acc + c.tools.length, 0);
    totalToolsEl.textContent = tools.length;
    totalCategoriesEl.textContent = TOOL_DATA.categories.length;
    totalFavoritesEl.textContent = favorites.length;
    favCountEl.textContent = favorites.length;

    if (recentTools.length > 0) {
      const last = findToolById(recentTools[0]);
      if (last) lastUsedEl.textContent = `Last: ${last.name}`;
    } else {
      lastUsedEl.textContent = 'Ready';
    }

    if (tools.length === 0) {
      toolGrid.innerHTML = `<div class="col-span-full text-center py-14 text-gray-500"><div class="text-5xl mb-4">🔍</div><p class="text-lg">No tools found</p><p class="text-sm text-gray-600">try adjusting your search</p></div>`;
      return;
    }

    toolGrid.innerHTML = tools.map(tool => {
      const isFav = favorites.includes(tool.id);
      return `
        <div class="tool-card" onclick="useTool('${tool.id}', '${tool.file || '#'}')">
          <div class="icon">${tool.icon || '🛠️'}</div>
          <div class="name">${tool.name}</div>
          <div class="desc">${tool.desc}</div>
          <span class="badge">${tool.category || ''}</span>
          <div class="fav-star ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${tool.id}')">
            ${isFav ? '⭐' : '☆'}
          </div>
        </div>
      `;
    }).join('');
  }

  // ========== ACTIONS ==========
  function filterCategory(id) {
    currentCategory = id;
    document.querySelectorAll('.category-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.category === id);
    });
    renderTools();
  }

  function resetFilters() {
    currentCategory = 'all';
    searchQuery = '';
    searchInput.value = '';
    document.querySelectorAll('.category-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.category === 'all');
    });
    renderTools();
    showToast('Filters reset 🔄');
  }

  function useTool(id, filePath) {
    const tool = findToolById(id);
    if (!tool) return;
    recentTools = recentTools.filter(t => t !== id);
    recentTools.unshift(id);
    if (recentTools.length > 10) recentTools.pop();
    localStorage.setItem('recentTools', JSON.stringify(recentTools));
    if (filePath && filePath !== '#') {
      window.location.href = filePath;
    } else {
      showToast(`🔧 Opening ${tool.name} ...`);
    }
  }

  function toggleFavorite(id) {
    const idx = favorites.indexOf(id);
    if (idx > -1) { favorites.splice(idx, 1); showToast('Removed from favorites 💔'); }
    else { favorites.push(id); showToast('Added to favorites ⭐'); }
    localStorage.setItem('toolFavorites', JSON.stringify(favorites));
    renderTools();
  }

  function showFavorites() {
    if (favorites.length === 0) { showToast('No favorites yet ⭐'); return; }
    const names = favorites.map(id => findToolById(id)).filter(Boolean).map(t => t.name).join(', ');
    showToast(`⭐ ${names}`);
  }

  function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    const btn = document.querySelector('[onclick="toggleDarkMode()"]');
    btn.textContent = isDark ? '☀️' : '🌙';
  }

  // ========== SEARCH EVENTS ==========
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderTools();
  });

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === '/') { e.preventDefault(); searchInput.focus(); }
    if (e.key === 'Escape') { searchInput.value = ''; searchQuery = ''; renderTools(); searchInput.blur(); }
  });

  // ========== INIT ==========
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
    document.querySelector('[onclick="toggleDarkMode()"]').textContent = '☀️';
  }

  buildCategories();
  renderTools();
  setTimeout(() => showToast('🛸 ToolShed Neo · 200+ tools'), 400);

  console.log('🚀 ToolShed Neo loaded');
  console.log(`📊 ${TOOL_DATA.categories.reduce((a,c) => a + c.tools.length, 0)} tools, ${TOOL_DATA.categories.length} categories`);
  console.log('💡 Press Ctrl+/ to search');
</script>
</body>
