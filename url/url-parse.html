<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Parser - ToolShed Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 750px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
        }
        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }
        .btn {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        
        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .result-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
        }
        .result-item .label {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-item .value {
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            color: rgba(255,255,255,0.8);
        }
        .result-item .value.empty {
            color: rgba(255,255,255,0.2);
            font-style: italic;
        }
        .result-item.full-width {
            grid-column: 1 / -1;
        }
        
        .params-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 4px;
        }
        .params-list::-webkit-scrollbar {
            width: 4px;
        }
        .params-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }
        .params-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        .param-item {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
        }
        .param-item .param-key {
            color: #6366f1;
            font-weight: 600;
            min-width: 80px;
        }
        .param-item .param-value {
            color: rgba(255,255,255,0.6);
            word-break: break-all;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔍</span>
        <h1>URL Parser</h1>
        <p class="desc">Parse and analyze any URL into its components</p>
        
        <div class="input-group">
            <label>Enter URL</label>
            <input type="text" id="urlInput" placeholder="https://example.com:8080/path/to/page?query=123&name=test#section" value="https://example.com:8080/path/to/page?query=123&name=test#section">
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="parseURL()">🔍 Parse URL</button>
            <button class="btn-secondary" onclick="clearAll()">🗑️ Clear</button>
        </div>
        
        <div class="result-grid" id="resultGrid">
            <div class="result-item">
                <div class="label">Protocol</div>
                <div class="value" id="protocol">-</div>
            </div>
            <div class="result-item">
                <div class="label">Hostname</div>
                <div class="value" id="hostname">-</div>
            </div>
            <div class="result-item">
                <div class="label">Port</div>
                <div class="value" id="port">-</div>
            </div>
            <div class="result-item">
                <div class="label">Path</div>
                <div class="value" id="path">-</div>
            </div>
            <div class="result-item">
                <div class="label">Query String</div>
                <div class="value" id="query">-</div>
            </div>
            <div class="result-item">
                <div class="label">Hash / Fragment</div>
                <div class="value" id="hash">-</div>
            </div>
            <div class="result-item full-width">
                <div class="label">Query Parameters</div>
                <div class="params-list" id="paramsList">
                    <div style="color:rgba(255,255,255,0.2);font-style:italic;font-size:0.8rem;">No parameters found</div>
                </div>
            </div>
            <div class="result-item full-width">
                <div class="label">Full URL</div>
                <div class="value" id="fullURL">-</div>
            </div>
        </div>
        
        <button class="btn-secondary" onclick="copyResult()" style="width:100%;margin-top:8px;">📋 Copy Full URL</button>
        
        <a href="../index.html" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        function parseURL() {
            const input = document.getElementById('urlInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter a URL to parse');
                return;
            }
            
            try {
                // Add protocol if missing
                let urlString = input;
                if (!urlString.startsWith('http://') && !urlString.startsWith('https://')) {
                    urlString = 'https://' + urlString;
                }
                
                const url = new URL(urlString);
                
                // Update fields
                document.getElementById('protocol').textContent = url.protocol || '-';
                document.getElementById('hostname').textContent = url.hostname || '-';
                document.getElementById('port').textContent = url.port || 'default';
                document.getElementById('path').textContent = url.pathname || '/';
                document.getElementById('query').textContent = url.search || '(none)';
                document.getElementById('hash').textContent = url.hash || '(none)';
                document.getElementById('fullURL').textContent = url.href;
                
                // Parse query parameters
                const paramsList = document.getElementById('paramsList');
                paramsList.innerHTML = '';
                
                if (url.searchParams.size > 0) {
                    for (const [key, value] of url.searchParams) {
                        const item = document.createElement('div');
                        item.className = 'param-item';
                        item.innerHTML = `
                            <span class="param-key">${key}</span>
                            <span class="param-value">${value}</span>
                        `;
                        paramsList.appendChild(item);
                    }
                } else {
                    paramsList.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-style:italic;font-size:0.8rem;">No parameters found</div>';
                }
                
                showToast('✅ URL parsed successfully!');
            } catch (e) {
                showToast('❌ Invalid URL: ' + e.message);
                // Clear fields on error
                document.querySelectorAll('.result-item .value').forEach(el => {
                    el.textContent = '-';
                });
                document.getElementById('paramsList').innerHTML = '<div style="color:rgba(255,255,255,0.2);font-style:italic;font-size:0.8rem;">No parameters found</div>';
            }
        }

        function copyResult() {
            const fullURL = document.getElementById('fullURL').textContent;
            if (fullURL === '-' || fullURL === 'Invalid URL') {
                showToast('⚠️ Please parse a URL first');
                return;
            }
            
            navigator.clipboard.writeText(fullURL).then(() => {
                showToast('✅ URL copied to clipboard!');
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = fullURL;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('✅ URL copied to clipboard!');
            });
        }

        function clearAll() {
            document.getElementById('urlInput').value = '';
            document.querySelectorAll('.result-item .value').forEach(el => {
                el.textContent = '-';
            });
            document.getElementById('paramsList').innerHTML = '<div style="color:rgba(255,255,255,0.2);font-style:italic;font-size:0.8rem;">No parameters found</div>';
            showToast('🗑️ All fields cleared');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Parse on Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                parseURL();
            }
        });

        // Auto-parse on input with debounce
        let debounceTimer;
        document.getElementById('urlInput').addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (this.value) {
                    parseURL();
                }
            }, 800);
        });

        // Initial parse
        window.onload = function() {
            parseURL();
        };
    </script>
</body>
</html>
