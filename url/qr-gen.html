<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - ToolShed Neo</title>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        h1 { font-size: 1.8rem; font-weight: 800; }
        .desc { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 24px; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        .input-group select option {
            background: #1a1d2e;
            color: #fff;
        }
        
        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }
        
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            margin: 16px 0;
            min-height: 250px;
        }
        #qrcode {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #qrcode img, #qrcode canvas {
            border-radius: 8px;
        }
        .qr-placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
            text-align: center;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 32px rgba(99,102,241,0.3); 
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .back { 
            display: inline-block; 
            margin-top: 20px; 
            color: rgba(255,255,255,0.3); 
            text-decoration: none; 
        }
        .back:hover { color: #fff; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">📱</span>
        <h1>QR Code Generator</h1>
        <p class="desc">Generate QR codes for any text or URL instantly</p>
        
        <div class="input-group">
            <label>Enter Text or URL</label>
            <input type="text" id="qrInput" placeholder="https://example.com or any text" value="https://toolshedneo.com">
        </div>
        
        <div class="controls-row">
            <div class="input-group" style="margin-bottom:0;">
                <label>Size</label>
                <select id="qrSize">
                    <option value="100">Small (100x100)</option>
                    <option value="150">Medium (150x150)</option>
                    <option value="200" selected>Large (200x200)</option>
                    <option value="250">XL (250x250)</option>
                    <option value="300">XXL (300x300)</option>
                </select>
            </div>
            <div class="input-group" style="margin-bottom:0;">
                <label>Error Correction</label>
                <select id="qrError">
                    <option value="L">Low (7%)</option>
                    <option value="M" selected>Medium (15%)</option>
                    <option value="Q">Quartile (25%)</option>
                    <option value="H">High (30%)</option>
                </select>
            </div>
        </div>
        
        <div class="qr-container">
            <div id="qrcode">
                <span class="qr-placeholder">Enter text and click Generate</span>
            </div>
        </div>
        
        <button class="btn" onclick="generateQR()">🎯 Generate QR Code</button>
        
        <div style="display:flex;gap:12px;margin-top:8px;">
            <button class="btn-secondary" onclick="downloadQR()">💾 Download PNG</button>
            <button class="btn-secondary" onclick="clearQR()">🗑️ Clear</button>
        </div>
        
        <a href="/" class="back">← Back to all tools</a>
    </div>
    
    <div class="toast" id="toast"></div>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        let qrCodeInstance = null;

        function generateQR() {
            const input = document.getElementById('qrInput').value.trim();
            if (!input) {
                showToast('⚠️ Please enter text or URL to generate QR code');
                return;
            }
            
            const size = parseInt(document.getElementById('qrSize').value);
            const errorLevel = document.getElementById('qrError').value;
            
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            
            try {
                qrCodeInstance = new QRCode(container, {
                    text: input,
                    width: size,
                    height: size,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: getErrorLevel(errorLevel)
                });
                
                showToast('✅ QR Code generated successfully!');
            } catch (e) {
                showToast('❌ Error generating QR code: ' + e.message);
            }
        }

        function getErrorLevel(level) {
            switch(level) {
                case 'L': return QRCode.CorrectLevel.L;
                case 'M': return QRCode.CorrectLevel.M;
                case 'Q': return QRCode.CorrectLevel.Q;
                case 'H': return QRCode.CorrectLevel.H;
                default: return QRCode.CorrectLevel.M;
            }
        }

        function downloadQR() {
            const container = document.getElementById('qrcode');
            const canvas = container.querySelector('canvas');
            const img = container.querySelector('img');
            
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('✅ QR Code downloaded as PNG!');
            } else if (img) {
                // If QRCode.js created an img instead of canvas (some versions)
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = img.src;
                link.click();
                showToast('✅ QR Code downloaded as PNG!');
            } else {
                showToast('⚠️ Please generate a QR code first');
            }
        }

        function clearQR() {
            const container = document.getElementById('qrcode');
            container.innerHTML = '<span class="qr-placeholder">Enter text and click Generate</span>';
            qrCodeInstance = null;
            showToast('🗑️ QR Code cleared');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Generate on Enter key
        document.getElementById('qrInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQR();
            }
        });

        // Generate on size/error change
        document.getElementById('qrSize').addEventListener('change', generateQR);
        document.getElementById('qrError').addEventListener('change', generateQR);

        // Initial generation
        window.onload = function() {
            setTimeout(generateQR, 100);
        };
    </script>
</body>
</html>
